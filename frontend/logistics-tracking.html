<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GHOST SHELL • Logistics & Delivery</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { background: radial-gradient(circle at 20% 30%, #0a0000, #000000); font-family: 'Courier New', monospace; color: #ccc; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #8a0303; padding-bottom: 15px; margin-bottom: 30px; }
        .logo-img { height: 45px; filter: drop-shadow(0 0 5px red); }
        .site-name { font-size: 1.6rem; color: #c0392b; text-shadow: 0 0 8px #ff0000; }
        .card { background: rgba(10,5,5,0.9); border: 1px solid #8a0303; padding: 20px; border-radius: 8px; }
        .order-table { width: 100%; border-collapse: collapse; }
        .order-table th, .order-table td { border: 1px solid #3a1a1a; padding: 8px; text-align: left; }
        .order-table th { background: #2a0000; color: #ff8888; }
        .status-pending { color: #ffaa00; }
        .status-in_transit { color: #00aaff; }
        .status-delivered { color: #00ff41; }
        .btn { background: #1a0000; border: 1px solid #8a0303; color: #ff6666; padding: 6px 14px; cursor: pointer; }
        .btn:hover { background: #5e0000; color: white; }
    </style>
</head>
<body>
<canvas id="matrixCanvas" style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:0; opacity:0.3; pointer-events:none;"></canvas>
<div class="container" style="position:relative; z-index:10;">
    <div class="header">
        <div><img src="https://res.cloudinary.com/dkomucpin/image/upload/v1778394573/BDJEUqx_zqkyuc.png" class="logo-img"><span class="site-name"> GHOST SHELL • LOGISTICS</span></div>
        <button class="btn" onclick="window.location.href='index.html'">Back to Ops</button>
    </div>
    <div class="card">
        <h2>📦 Track Your Packages (Nationwide & International)</h2>
        <div id="ordersList"></div>
    </div>
</div>
<script>
    function loadOrders() {
        const orders = JSON.parse(localStorage.getItem('ghost_logistics') || '[]');
        const container = document.getElementById('ordersList');
        if (orders.length === 0) { container.innerHTML = '<p>No delivery orders yet.</p>'; return; }
        let html = '<table class="order-table"><thead><tr><th>Tracking ID</th><th>Sender</th><th>Receiver</th><th>Address</th><th>Package</th><th>Weight</th><th>Fee</th><th>Status</th></tr></thead><tbody>';
        orders.forEach(o => {
            let statusClass = '';
            if (o.status === 'pending') statusClass = 'status-pending';
            else if (o.status === 'in_transit') statusClass = 'status-in_transit';
            else if (o.status === 'delivered') statusClass = 'status-delivered';
            html += `<tr>
                        <td>${o.id.slice(-8)}</td>
                        <td>${o.sender}</td>
                        <td>${o.receiver}</td>
                        <td>${o.address}</td>
                        <td>${o.package}</td>
                        <td>${o.weight} kg</td>
                        <td>$${o.price}</td>
                        <td class="${statusClass}">${o.status.replace('_', ' ')}</td>
                     </tr>`;
        });
        html += '</tbody></table>';
        container.innerHTML = html;
    }
    loadOrders();
    // matrix rain
    (function() {
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');
        let w, h, drops = [];
        const chars = "💀☠️🔪🩸🔥⚡";
        function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; drops = Array(Math.floor(w/20)).fill(0); }
        function draw() {
            ctx.fillStyle = 'rgba(0,0,0,0.07)'; ctx.fillRect(0,0,w,h);
            ctx.fillStyle = '#aa2a2a'; ctx.font = 'bold 20px monospace';
            for(let i=0; i<drops.length; i++) { ctx.fillText(chars[Math.floor(Math.random()*chars.length)], i*20, drops[i]*22); if(drops[i]*22 > h && Math.random() > 0.98) drops[i] = 0; drops[i]++; }
            requestAnimationFrame(draw);
        }
        window.addEventListener('resize', resize); resize(); draw();
    })();
</script>
</body>
</html>
