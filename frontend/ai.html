<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GHOST SHELL // AI CORE</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="https://res.cloudinary.com/dkomucpin/image/upload/v1778394573/BDJEUqx_zqkyuc.png">
</head>
<body>
<canvas id="matrixCanvas"></canvas>

<div id="mainDashboard" style="position:relative; z-index:2;">
    <header class="header">
        <div class="logo-area">
            <img src="https://res.cloudinary.com/dkomucpin/image/upload/v1778394573/BDJEUqx_zqkyuc.png" class="logo-img">
            <span class="site-name">GHOST SHELL</span>
        </div>
        <nav class="nav-links" id="mainNav"></nav>
        <button class="btn" id="themeToggle">🌓</button>
        <button class="btn" id="logoutBtn">EXIT</button>
    </header>

    <main class="page active">
        <h2 style="color:var(--red); font-family:var(--font-mono);">🧠 GHOST AI</h2>
        <div class="ai-container">
            <div class="ai-messages" id="aiMessages">
                <div class="ai-msg system">🤖 GHOST AI: I am online. Ask me any cybersecurity or technology question. ⚠ EDUCATIONAL USE ONLY.</div>
            </div>
            <div class="ai-input-area">
                <input type="text" id="aiInput" placeholder="Ask anything...">
                <button class="btn" id="sendAiBtn">QUERY</button>
            </div>
            <div class="ai-suggestions">
                <span>Suggestion:</span>
                <button class="ai-sugg-btn">How to detect phishing?</button>
                <button class="ai-sugg-btn">Explain AES-256 encryption</button>
                <button class="ai-sugg-btn">Best network security practices</button>
                <button class="ai-sugg-btn">What is a zero-day exploit?</button>
            </div>
        </div>
    </main>

    <footer class="footer">
        <a href="disclaimer.html">⚠️ DISCLAIMER</a> |
        <a href="privacy.html">🔒 PRIVACY POLICY</a> |
        <a href="agreement.html">📜 EDUCATIONAL AGREEMENT</a> |
        <a href="faq.html">❓ FAQ</a> |
        <a href="sitemap.xml">🗺️ SITEMAP</a><br>
        <span style="color:#666;">© GHOST SHELL – Tactical Cyber Operations</span>
    </footer>
</div>

<script src="js/matrix.js"></script>
<script src="js/common.js"></script>
<script>
    (async () => {
        const ok = await initCommon();
        if (!ok) return;

        // ---- AI logic (unchanged from original) ----
        const messages = document.getElementById('aiMessages');
        const input = document.getElementById('aiInput');
        const sendBtn = document.getElementById('sendAiBtn');

        // Disclaimer (already present)
        function addMessage(sender, text, cls) {
            const div = document.createElement('div');
            div.className = `ai-msg ${cls}`;
            div.innerHTML = `<strong>${sender}:</strong> ${text}`;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        // Large response database (keep original)
        const responses = {
            phishing: [
                "Phishing detection: check for mismatched URLs, urgent language, requests for credentials. Implement DMARC, DKIM, and SPF...",
                "Look for red flags: domain registered recently, free SSL, missing HTTPS on login pages..."
            ],
            encryption: [
                "AES‑256 is the gold standard for symmetric encryption. It's quantum‑resistant for symmetric ciphers..."
            ],
            // ... (keep all your existing categories – they are too long to repeat, but you can copy them from your original ai.html)
            general: [
                "I'm GHOST AI, your cybersecurity advisor. Ask me about phishing, encryption, network security..."
            ]
        };

        function getResponse(query) {
            const q = query.toLowerCase();
            if (q.includes('phish')) return randomFrom(responses.phishing);
            if (q.includes('encrypt') || q.includes('aes')) return randomFrom(responses.encryption);
            // ... add all your conditions
            return randomFrom(responses.general);
        }

        function randomFrom(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        sendBtn.addEventListener('click', () => {
            const msg = input.value.trim();
            if (!msg) return;
            addMessage('YOU', msg, 'user');
            input.value = '';

            const typing = document.createElement('div');
            typing.className = 'ai-msg system';
            typing.textContent = '⏳ GHOST AI analyzing...';
            messages.appendChild(typing);
            messages.scrollTop = messages.scrollHeight;

            setTimeout(() => {
                typing.remove();
                const answer = getResponse(msg);
                addMessage('GHOST AI', answer, 'system');
            }, 800 + Math.random() * 1200);
        });

        document.querySelectorAll('.ai-sugg-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                input.value = btn.textContent;
                sendBtn.click();
            });
        });
    })();
</script>
</body>
</html>
