<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GHOST SHELL • DARK ADMIN (COMPLETE)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: radial-gradient(circle at 20% 30%, #0a0000, #000000);
            font-family: 'Courier New', 'Fira Code', monospace;
            color: #ccc;
            overflow-x: hidden;
        }
        /* Matrix canvas */
        #matrixCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.3;
            pointer-events: none;
        }
        /* Main container */
        .admin-wrapper {
            position: relative;
            z-index: 10;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        /* Header */
        .header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.8);
            border-bottom: 2px solid #8a0303;
            padding: 15px 20px;
            margin-bottom: 30px;
            backdrop-filter: blur(4px);
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .logo-img {
            height: 45px;
            filter: drop-shadow(0 0 5px red);
        }
        .site-name {
            font-size: 1.6rem;
            color: #c0392b;
            text-shadow: 0 0 8px #ff0000;
            letter-spacing: 3px;
        }
        .nav-buttons {
            display: flex;
            gap: 12px;
        }
        .btn {
            background: #1a0000;
            border: 1px solid #8a0303;
            color: #ff6666;
            padding: 6px 14px;
            font-family: monospace;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn:hover {
            background: #5e0000;
            color: white;
            box-shadow: 0 0 10px red;
        }
        /* Admin navigation tabs */
        .admin-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 25px;
            border-bottom: 1px solid #3a1a1a;
            padding-bottom: 8px;
        }
        .tab-btn {
            background: #0a0000;
            border: 1px solid #5a1a1a;
            color: #aa5555;
            padding: 8px 16px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        .tab-btn.active {
            background: #4a0000;
            color: white;
            border-color: #ff4444;
            box-shadow: 0 0 8px red;
        }
        /* Cards and tables */
        .card {
            background: rgba(10,5,5,0.9);
            border: 1px solid #8a0303;
            padding: 20px;
            margin-bottom: 25px;
            backdrop-filter: blur(2px);
        }
        .card h2, .card h3 {
            color: #ff6666;
            margin-bottom: 15px;
            letter-spacing: 2px;
        }
        input, select, textarea {
            background: #1a0a0a;
            border: 1px solid #8a0303;
            color: #ff9999;
            padding: 8px;
            width: 100%;
            margin: 6px 0;
            font-family: monospace;
        }
        .admin-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.75rem;
        }
        .admin-table th, .admin-table td {
            border: 1px solid #3a1a1a;
            padding: 8px;
            text-align: left;
        }
        .admin-table th {
            background: #2a0000;
            color: #ff8888;
        }
        .flex-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }
        .section {
            display: none;
        }
        .section.active {
            display: block;
        }
        .modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 500px;
            background: #0a0101;
            border: 2px solid #ff0000;
            padding: 20px;
            z-index: 1000;
            box-shadow: 0 0 50px rgba(255,0,0,0.5);
        }
        .modal-overlay {
            display: none;
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.8);
            z-index: 999;
        }
    </style>
</head>
<body>
<canvas id="matrixCanvas"></canvas>

<!-- LOGIN MODAL -->
<div id="loginModal" class="modal" style="display:flex; position:fixed; top:0; left:0; width:100%; height:100%; background:black; justify-content:center; align-items:center; z-index:2000;">
    <div style="background:#0a0000; border:2px solid #8a0303; padding:30px; max-width:400px; text-align:center;">
        <img src="https://res.cloudinary.com/dkomucpin/image/upload/v1778394573/BDJEUqx_zqkyuc.png" style="height:60px; filter:drop-shadow(0 0 8px red);">
        <h1 style="color:#ff4444;">⌧ ADMIN OVERRIDE ⌧</h1>
        <input type="email" id="loginEmail" placeholder="EMAIL" style="margin:10px 0;">
        <input type="password" id="loginPassword" placeholder="PASSWORD">
        <button class="btn" id="loginBtn" style="margin-top:15px; width:100%;">⛧ UNLOCK ⛧</button>
        <div id="loginError" style="color:red; margin-top:10px;"></div>
    </div>
</div>

<!-- MAIN ADMIN DASHBOARD (hidden until login) -->
<div id="adminDashboard" style="display:none;">
    <div class="admin-wrapper">
        <div class="header">
            <div class="logo-area">
                <img src="https://res.cloudinary.com/dkomucpin/image/upload/v1778394573/BDJEUqx_zqkyuc.png" class="logo-img">
                <span class="site-name">💀 GHOST SHELL • COMPLETE ADMIN 💀</span>
            </div>
            <div class="nav-buttons">
                <button class="btn" id="themeBtn">🌙 DARK MODE</button>
                <button class="btn" id="logoutBtn">⛧ EXIT</button>
            </div>
        </div>

        <div class="admin-tabs" id="adminTabs"></div>
        <div id="sectionsContainer"></div>
    </div>
</div>

<script>
    // ======================== DATA LAYER (localStorage) ========================
    function initData() {
        if (!localStorage.getItem('ghost_users')) {
            localStorage.setItem('ghost_users', JSON.stringify([
                { id: '1', email: 'admin@ghostshell.com', password: 'admin123', role: 'full_admin' }
            ]));
        }
        if (!localStorage.getItem('ghost_codes')) localStorage.setItem('ghost_codes', '[]');
        if (!localStorage.getItem('ghost_payments')) localStorage.setItem('ghost_payments', JSON.stringify([
            { id: 'p1', userId: '1', product: 'RAT Pro', amount: 199.99, status: 'pending' }
        ]));
        if (!localStorage.getItem('ghost_tools')) localStorage.setItem('ghost_tools', JSON.stringify([]));
        if (!localStorage.getItem('ghost_websites')) localStorage.setItem('ghost_websites', JSON.stringify([
            { id: 'w1', domain: 'hackersparadise.com', title: 'Hacker Forum', price: 499, category: 'Forum' }
        ]));
        if (!localStorage.getItem('ghost_esim')) localStorage.setItem('ghost_esim', JSON.stringify([
            { id: 'e1', name: '5GB 30 Days', duration: '1 month', price: 19.99, data: '5GB', voice: '100 mins' }
        ]));
        if (!localStorage.getItem('ghost_logistics')) localStorage.setItem('ghost_logistics', JSON.stringify([]));
        if (!localStorage.getItem('ghost_virtualnums')) localStorage.setItem('ghost_virtualnums', JSON.stringify([]));
        if (!localStorage.getItem('ghost_webrequests')) localStorage.setItem('ghost_webrequests', JSON.stringify([]));
        if (!localStorage.getItem('ghost_credforms')) localStorage.setItem('ghost_credforms', JSON.stringify([]));
        if (!localStorage.getItem('ghost_cloudreqs')) localStorage.setItem('ghost_cloudreqs', JSON.stringify([]));
        if (!localStorage.getItem('ghost_visitors')) localStorage.setItem('ghost_visitors', JSON.stringify([
            { ip: '127.0.0.1', time: new Date().toISOString(), page: '/admin.html' }
        ]));
        if (!localStorage.getItem('ghost_blog')) localStorage.setItem('ghost_blog', JSON.stringify([]));
    }
    initData();

    const get = (key) => JSON.parse(localStorage.getItem(key));
    const set = (key, val) => localStorage.setItem(key, JSON.stringify(val));

    // ======================== LOGIN ========================
    const loginModal = document.getElementById('loginModal');
    const dashboard = document.getElementById('adminDashboard');
    document.getElementById('loginBtn').addEventListener('click', () => {
        const email = document.getElementById('loginEmail').value.trim();
        const pwd = document.getElementById('loginPassword').value;
        const user = get('ghost_users').find(u => u.email === email && u.password === pwd && (u.role === 'full_admin' || u.role === 'admin'));
        if (user) {
            localStorage.setItem('adminSession', 'true');
            loginModal.style.display = 'none';
            dashboard.style.display = 'block';
            buildAdminUI();
        } else {
            document.getElementById('loginError').innerText = '❌ ACCESS DENIED';
        }
    });
    document.getElementById('logoutBtn').addEventListener('click', () => {
        localStorage.removeItem('adminSession');
        window.location.reload();
    });

    // ======================== BUILD ENTIRE ADMIN UI ========================
    function buildAdminUI() {
        const sections = [
            { id: 'users', label: '👥 USERS' },
            { id: 'codes', label: '🔑 CODES' },
            { id: 'payments', label: '💸 PAYMENTS' },
            { id: 'tools', label: '🔧 TOOLS' },
            { id: 'promos', label: '🔥 PROMO' },
            { id: 'websites', label: '🌐 WEBSITES' },
            { id: 'esim', label: '📱 eSIM' },
            { id: 'logistics', label: '📦 LOGISTICS' },
            { id: 'virtualnums', label: '📞 VIRTUAL NUMBERS' },
            { id: 'webrequest', label: '🌍 WEB BUILD REQ' },
            { id: 'credform', label: '📝 CRED FORM BUILDER' },
            { id: 'cloudreq', label: '☁️ CLOUD/DOMAIN REQ' },
            { id: 'visitors', label: '🌍 VISITORS' },
            { id: 'blog', label: '📜 BLOG' }
        ];

        // Create tabs
        const tabsContainer = document.getElementById('adminTabs');
        tabsContainer.innerHTML = '';
        sections.forEach(sec => {
            const btn = document.createElement('button');
            btn.className = 'tab-btn';
            btn.textContent = sec.label;
            btn.dataset.section = sec.id;
            btn.addEventListener('click', () => {
                document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
                document.getElementById(`section-${sec.id}`).classList.add('active');
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                // re-render active section
                if (sec.id === 'users') renderUsers();
                if (sec.id === 'codes') renderCodes();
                if (sec.id === 'payments') renderPayments();
                if (sec.id === 'tools') renderTools();
                if (sec.id === 'promos') renderPromoManager();
                if (sec.id === 'websites') renderWebsites();
                if (sec.id === 'esim') renderEsim();
                if (sec.id === 'logistics') renderLogistics();
                if (sec.id === 'virtualnums') renderVirtualNumbers();
                if (sec.id === 'webrequest') renderWebRequests();
                if (sec.id === 'credform') renderCredForms();
                if (sec.id === 'cloudreq') renderCloudRequests();
                if (sec.id === 'visitors') renderVisitors();
                if (sec.id === 'blog') renderBlog();
            });
            tabsContainer.appendChild(btn);
        });

        // Create sections container HTML (all sections)
        const container = document.getElementById('sectionsContainer');
        container.innerHTML = `
            <!-- USERS -->
            <div id="section-users" class="section active">
                <div class="card"><h2>👥 USER MANAGEMENT</h2>
                    <div class="flex-row">
                        <input type="email" id="newUserEmail" placeholder="Email">
                        <input type="password" id="newUserPass" placeholder="Password">
                        <select id="newUserRole"><option>user</option><option>full_admin</option></select>
                        <button class="btn" id="addUserBtn">➕ ADD USER</button>
                    </div>
                    <div id="usersTable"></div>
                    <button class="btn" id="exportCsvBtn">📀 EXPORT CSV</button>
                </div>
            </div>
            <!-- CODES -->
            <div id="section-codes" class="section"><div class="card"><h2>🔑 ACCESS CODES</h2><button class="btn" id="genCodesBtn">⚡ GENERATE 50 CODES</button><div id="codesTable"></div></div></div>
            <!-- PAYMENTS -->
            <div id="section-payments" class="section"><div class="card"><h2>💸 PAYMENTS</h2><button class="btn" id="addPaymentBtn">➕ ADD MOCK</button><div id="paymentsTable"></div></div></div>
            <!-- TOOLS -->
            <div id="section-tools" class="section"><div class="card"><h2>🔧 TOOLS</h2><button class="btn" id="addToolBtn">➕ ADD TOOL</button><div id="toolsTable"></div></div><div id="toolModal" class="modal"><h3>✍️ TOOL</h3><input type="text" id="toolName" placeholder="Name"><input type="number" id="toolPrice" placeholder="Price"><input type="text" id="toolPromoName" placeholder="Promo Name"><input type="number" id="toolPromoPrice" placeholder="Promo Price"><button class="btn" id="saveToolBtn">💀 SAVE</button><button class="btn" id="cancelToolBtn">CANCEL</button><input type="hidden" id="editingToolId"></div></div>
            <!-- PROMO -->
            <div id="section-promos" class="section"><div class="card"><h2>🔥 PROMOTIONS</h2><div id="promoTable"></div></div></div>
            <!-- WEBSITES -->
            <div id="section-websites" class="section"><div class="card"><h2>🌐 WEBSITES FOR SALE</h2><button class="btn" id="addWebsiteBtn">➕ ADD WEBSITE</button><div id="websitesTable"></div></div><div id="websiteModal" class="modal"><h3>✍️ WEBSITE</h3><input type="text" id="websiteDomain" placeholder="Domain"><input type="text" id="websiteTitle" placeholder="Title"><input type="number" id="websitePrice" placeholder="Price"><button class="btn" id="saveWebsiteBtn">💀 SAVE</button><button class="btn" id="cancelWebsiteBtn">CANCEL</button><input type="hidden" id="editingWebsiteId"></div></div>
            <!-- eSIM -->
            <div id="section-esim" class="section"><div class="card"><h2>📱 eSIM PLANS</h2><button class="btn" id="addEsimBtn">➕ ADD PLAN</button><div id="esimTable"></div></div><div id="esimModal" class="modal"><h3>✍️ eSIM PLAN</h3><input type="text" id="esimName" placeholder="Name"><select id="esimDuration"><option>1 month</option><option>3 months</option><option>6 months</option><option>1 year</option></select><input type="number" id="esimPrice" placeholder="Price"><input type="text" id="esimData" placeholder="Data (e.g., 10GB)"><input type="text" id="esimVoice" placeholder="Voice"><button class="btn" id="saveEsimBtn">💀 SAVE</button><button class="btn" id="cancelEsimBtn">CANCEL</button><input type="hidden" id="editingEsimId"></div></div>
            <!-- LOGISTICS -->
            <div id="section-logistics" class="section"><div class="card"><h2>📦 LOGISTICS (DELIVERY)</h2><button class="btn" id="addLogisticsBtn">➕ CREATE ORDER</button><div id="logisticsTable"></div></div><div id="logisticsModal" class="modal"><h3>✍️ DELIVERY ORDER</h3><input type="text" id="logSender" placeholder="Sender"><input type="text" id="logReceiver" placeholder="Receiver"><input type="text" id="logAddress" placeholder="Address"><input type="text" id="logPackage" placeholder="Package"><input type="number" id="logWeight" placeholder="Weight (kg)"><input type="number" id="logPrice" placeholder="Fee (USD)"><select id="logStatus"><option>pending</option><option>in_transit</option><option>delivered</option></select><button class="btn" id="saveLogisticsBtn">💀 SAVE</button><button class="btn" id="cancelLogisticsBtn">CANCEL</button><input type="hidden" id="editingLogisticsId"></div></div>
            <!-- VIRTUAL NUMBERS -->
            <div id="section-virtualnums" class="section"><div class="card"><h2>📞 VIRTUAL NUMBERS FOR SALE</h2><button class="btn" id="addVirtualBtn">➕ ADD NUMBER</button><div id="virtualTable"></div></div><div id="virtualModal" class="modal"><h3>✍️ VIRTUAL NUMBER</h3><input type="text" id="virtualNumber" placeholder="Phone Number"><input type="text" id="virtualCountry" placeholder="Country"><input type="text" id="virtualService" placeholder="Service"><input type="number" id="virtualPrice" placeholder="Price (USD)"><input type="text" id="virtualPartner" placeholder="Partner Site"><button class="btn" id="saveVirtualBtn">💀 SAVE</button><button class="btn" id="cancelVirtualBtn">CANCEL</button><input type="hidden" id="editingVirtualId"></div></div>
            <!-- WEB REQUESTS -->
            <div id="section-webrequest" class="section"><div class="card"><h2>🌍 WEB BUILD REQUESTS</h2><button class="btn" id="addWebReqBtn">➕ NEW REQUEST</button><div id="webReqsTable"></div></div><div id="webReqModal" class="modal"><h3>✍️ WEB REQUEST</h3><input type="text" id="webClient" placeholder="Client"><input type="email" id="webEmail" placeholder="Email"><input type="text" id="webType" placeholder="Type"><textarea id="webReqs" rows="3" placeholder="Requirements"></textarea><input type="number" id="webBudget" placeholder="Budget"><button class="btn" id="saveWebReqBtn">💀 SAVE</button><button class="btn" id="cancelWebReqBtn">CANCEL</button><input type="hidden" id="editingWebReqId"></div></div>
            <!-- CRED FORMS -->
            <div id="section-credform" class="section"><div class="card"><h2>📝 CREDENTIAL FORM BUILDER</h2><button class="btn" id="addCredFormBtn">➕ NEW FORM</button><div id="credFormsTable"></div></div><div id="credFormModal" class="modal"><h3>✍️ FORM</h3><input type="text" id="formName" placeholder="Form Name"><textarea id="formFields" rows="4" placeholder='[{"label":"Name","type":"text"}]'></textarea><button class="btn" id="saveCredFormBtn">💀 SAVE</button><button class="btn" id="cancelCredFormBtn">CANCEL</button><input type="hidden" id="editingCredFormId"></div></div>
            <!-- CLOUD REQUESTS -->
            <div id="section-cloudreq" class="section"><div class="card"><h2>☁️ CLOUD & DOMAIN REQUESTS</h2><button class="btn" id="addCloudReqBtn">➕ NEW REQUEST</button><div id="cloudReqsTable"></div><p style="color:#ff8888;">⚠️ Simulated Telegram Bot</p></div><div id="cloudReqModal" class="modal"><h3>✍️ CLOUD/DOMAIN REQUEST</h3><input type="text" id="cloudCustomer" placeholder="Customer"><input type="email" id="cloudEmail" placeholder="Email"><select id="cloudService"><option>Domain Registration</option><option>Web Hosting</option><option>VPS</option><option>SSL</option></select><input type="text" id="cloudDomain" placeholder="Domain"><textarea id="cloudDetails" rows="3" placeholder="Details"></textarea><button class="btn" id="saveCloudReqBtn">💀 SEND TO TELEGRAM</button><button class="btn" id="cancelCloudReqBtn">CANCEL</button><input type="hidden" id="editingCloudReqId"></div></div>
            <!-- VISITORS -->
            <div id="section-visitors" class="section"><div class="card"><h2>🌍 VISITOR LOGS</h2><div id="visitorsTable"></div></div></div>
            <!-- BLOG -->
            <div id="section-blog" class="section"><div class="card"><h2>📜 BLOG POSTS</h2><button class="btn" id="addPostBtn">➕ NEW POST</button><div id="blogTable"></div></div><div id="blogModal" class="modal"><h3>✍️ POST</h3><input type="text" id="postTitle" placeholder="Title"><textarea id="postContent" rows="8" placeholder="Content (HTML allowed)"></textarea><button class="btn" id="savePostBtn">💀 SAVE</button><button class="btn" id="cancelPostBtn">CANCEL</button><input type="hidden" id="editingPostId"></div></div>
        `;

        // Now attach all event listeners (using delegation where possible)
        attachAllEventListeners();
        // Render initial active section (users)
        renderUsers();
        renderCodes();
        renderPayments();
        renderTools();
        renderPromoManager();
        renderWebsites();
        renderEsim();
        renderLogistics();
        renderVirtualNumbers();
        renderWebRequests();
        renderCredForms();
        renderCloudRequests();
        renderVisitors();
        renderBlog();

        // activate first tab
        const firstTab = document.querySelector('.tab-btn');
        if (firstTab) firstTab.classList.add('active');
    }

    // ======================== RENDER FUNCTIONS (all use global get/set) ========================
    function renderUsers() {
        let users = get('ghost_users');
        let html = '<table class="admin-table"><tr><th>Email</th><th>Role</th><th>Actions</th></tr>';
        users.forEach(u => {
            html += `<tr><td>${u.email}</td><td>${u.role}</td><td><button class="btn" data-action="deleteUser" data-id="${u.id}">💀 DELETE</button> <button class="btn" data-action="promoteUser" data-id="${u.id}">👑 MAKE ADMIN</button></td></tr>`;
        });
        html += '</table>';
        document.getElementById('usersTable').innerHTML = html;
    }
    function renderCodes() {
        let codes = get('ghost_codes');
        let html = '<table class="admin-table"><tr><th>Code</th><th>Created</th></tr>';
        codes.forEach(c => { html += `<tr><td>${c.code}</td><td>${new Date(c.createdAt).toLocaleString()}</td></tr>`; });
        html += '</table>';
        document.getElementById('codesTable').innerHTML = html;
    }
    function renderPayments() {
        let payments = get('ghost_payments');
        let html = '<table class="admin-table"><tr><th>User</th><th>Product</th><th>Amount</th><th>Status</th><th>Actions</th></tr>';
        payments.forEach(p => {
            html += `<tr><td>${p.userId}</td><td>${p.product}</td><td>$${p.amount}</td><td>${p.status}</td><td><button class="btn" data-action="approvePayment" data-id="${p.id}">✅ Approve</button> <button class="btn" data-action="deletePayment" data-id="${p.id}">🗑️</button></td></tr>`;
        });
        html += '</table>';
        document.getElementById('paymentsTable').innerHTML = html;
    }
    function renderTools() {
        let tools = get('ghost_tools');
        let html = '<table class="admin-table"><tr><th>Name</th><th>Price</th><th>Promo</th><th>Actions</th></tr>';
        tools.forEach(t => {
            html += `<tr><td>${t.name}</td><td>$${t.price}</td><td>${t.promoName ? t.promoName+' $'+t.promoPrice : 'none'}</td><td><button class="btn" data-action="editTool" data-id="${t.id}">✏️</button> <button class="btn" data-action="deleteTool" data-id="${t.id}">🗑️</button></td></tr>`;
        });
        html += '</table>';
        document.getElementById('toolsTable').innerHTML = html;
    }
    function renderPromoManager() {
        let tools = get('ghost_tools');
        let html = '<table class="admin-table"><tr><th>Tool</th><th>Current Promo</th><th>New Promo Name</th><th>Sale Price</th><th>Apply</th></tr>';
        tools.forEach(t => {
            html += `<tr><td>${t.name}</td><td>${t.promoName ? t.promoName+' $'+t.promoPrice : 'none'}</td><td><input type="text" id="promoName_${t.id}" placeholder="Name"></td><td><input type="number" id="promoPrice_${t.id}" placeholder="Price"></td><td><button class="btn" data-action="applyPromo" data-id="${t.id}">🔥 APPLY</button></td></tr>`;
        });
        html += '</table>';
        document.getElementById('promoTable').innerHTML = html;
    }
    function renderWebsites() {
        let items = get('ghost_websites');
        let html = '<table class="admin-table"><tr><th>Domain</th><th>Title</th><th>Price</th><th>Actions</th></tr>';
        items.forEach(i => {
            html += `<tr><td>${i.domain}</td><td>${i.title}</td><td>$${i.price}</td><td><button class="btn" data-action="editWebsite" data-id="${i.id}">✏️</button> <button class="btn" data-action="deleteWebsite" data-id="${i.id}">🗑️</button></td></tr>`;
        });
        html += '</table>';
        document.getElementById('websitesTable').innerHTML = html;
    }
    function renderEsim() {
        let items = get('ghost_esim');
        let html = '<table class="admin-table"><tr><th>Name</th><th>Duration</th><th>Price</th><th>Data</th><th>Voice</th><th>Actions</th></tr>';
        items.forEach(i => {

    // Matrix rain effect
    (function() {
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');
        let w, h, drops = [];
        const chars = "💀☠️🔪🩸🔥⚡";
        function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; drops = Array(Math.floor(w/20)).fill(0); }
        function draw() {
            ctx.fillStyle = 'rgba(0,0,0,0.07)'; ctx.fillRect(0,0,w,h);
            ctx.fillStyle = '#aa2a2a'; ctx.font = 'bold 20px monospace';
            for(let i=0; i<drops.length; i++) { ctx.fillText(chars[Math.floor(Math.random()*chars.length)], i*20, drops[i]*22); if(drops[i]*22 > h && Math.random() > 0.98) drops[i] = 0; drops[i]++; }
            requestAnimationFrame(draw);
        }
        window.addEventListener('resize', resize); resize(); draw();
    })();
