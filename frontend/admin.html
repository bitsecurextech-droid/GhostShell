<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GHOST SHELL • ADMIN PANEL (PRODUCTION)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: radial-gradient(circle at 20% 30%, #0a0000, #000000);
            font-family: 'Courier New', 'Fira Code', monospace;
            color: #ccc;
            overflow-x: hidden;
        }
        #matrixCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.3;
            pointer-events: none;
        }
        .admin-wrapper {
            position: relative;
            z-index: 10;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.8);
            border-bottom: 2px solid #8a0303;
            padding: 15px 20px;
            margin-bottom: 30px;
            backdrop-filter: blur(4px);
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .logo-img {
            height: 45px;
            filter: drop-shadow(0 0 5px red);
        }
        .site-name {
            font-size: 1.6rem;
            color: #c0392b;
            text-shadow: 0 0 8px #ff0000;
            letter-spacing: 3px;
        }
        .nav-buttons {
            display: flex;
            gap: 12px;
        }
        .btn {
            background: #1a0000;
            border: 1px solid #8a0303;
            color: #ff6666;
            padding: 6px 14px;
            font-family: monospace;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn:hover {
            background: #5e0000;
            color: white;
            box-shadow: 0 0 10px red;
        }
        .admin-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 25px;
            border-bottom: 1px solid #3a1a1a;
            padding-bottom: 8px;
        }
        .tab-btn {
            background: #0a0000;
            border: 1px solid #5a1a1a;
            color: #aa5555;
            padding: 8px 16px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        .tab-btn.active {
            background: #4a0000;
            color: white;
            border-color: #ff4444;
            box-shadow: 0 0 8px red;
        }
        .card {
            background: rgba(10,5,5,0.9);
            border: 1px solid #8a0303;
            padding: 20px;
            margin-bottom: 25px;
            backdrop-filter: blur(2px);
        }
        .card h2, .card h3 {
            color: #ff6666;
            margin-bottom: 15px;
            letter-spacing: 2px;
        }
        input, select, textarea {
            background: #1a0a0a;
            border: 1px solid #8a0303;
            color: #ff9999;
            padding: 8px;
            width: 100%;
            margin: 6px 0;
            font-family: monospace;
        }
        .admin-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.75rem;
        }
        .admin-table th, .admin-table td {
            border: 1px solid #3a1a1a;
            padding: 8px;
            text-align: left;
        }
        .admin-table th {
            background: #2a0000;
            color: #ff8888;
        }
        .flex-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }
        .section {
            display: none;
        }
        .section.active {
            display: block;
        }
        .modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 600px;
            background: #0a0101;
            border: 2px solid #ff0000;
            padding: 20px;
            z-index: 1000;
            box-shadow: 0 0 50px rgba(255,0,0,0.5);
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-overlay {
            display: none;
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.8);
            z-index: 999;
        }
        .login-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .login-card {
            background: #0a0000;
            border: 2px solid #8a0303;
            padding: 30px;
            max-width: 400px;
            text-align: center;
        }
        .login-card input {
            margin: 10px 0;
        }
        .error-msg {
            color: #ff5555;
            margin-top: 10px;
        }
        .setup-msg {
            color: #ffaa00;
            font-size: 0.8rem;
            margin-top: 10px;
        }
    </style>
</head>
<body>
<canvas id="matrixCanvas"></canvas>

<!-- LOGIN / SETUP SCREEN -->
<div id="loginScreen" class="login-container">
    <div class="login-card">
        <img src="https://res.cloudinary.com/dkomucpin/image/upload/v1778394573/BDJEUqx_zqkyuc.png" style="height:60px; filter:drop-shadow(0 0 8px red);">
        <h1 style="color:#ff4444;">⌧ ADMIN OVERRIDE ⌧</h1>
        <input type="email" id="loginEmail" placeholder="EMAIL" autocomplete="off">
        <input type="password" id="loginPassword" placeholder="PASSWORD">
        <button class="btn" id="loginBtn" style="width:100%;">⛧ UNLOCK ⛧</button>
        <div id="loginError" class="error-msg"></div>
        <div id="setupInfo" class="setup-msg"></div>
    </div>
</div>

<!-- MAIN ADMIN DASHBOARD -->
<div id="adminDashboard" style="display:none;">
    <div class="admin-wrapper">
        <div class="header">
            <div class="logo-area">
                <img src="https://res.cloudinary.com/dkomucpin/image/upload/v1778394573/BDJEUqx_zqkyuc.png" class="logo-img">
                <span class="site-name">💀 GHOST SHELL • PRODUCTION ADMIN 💀</span>
            </div>
            <div class="nav-buttons">
                <button class="btn" id="themeBtn">🌙 DARK MODE</button>
                <button class="btn" id="logoutBtn">⛧ EXIT</button>
            </div>
        </div>

        <div class="admin-tabs" id="adminTabs"></div>
        <div id="sectionsContainer"></div>
    </div>
</div>

<script>
    // ======================== DATA LAYER (localStorage - PRODUCTION READY) ========================
    function initData() {
        // USERS: if no users exist, create a default admin (you can change email/password here)
        if (!localStorage.getItem('ghost_users')) {
            // CHANGE THESE TO YOUR REAL ADMIN CREDENTIALS
            const defaultAdmin = {
                id: '1',
                email: 'admin@ghostshell.com',    // <-- CHANGE TO YOUR EMAIL
                password: 'YourStrongPassword123', // <-- CHANGE TO YOUR PASSWORD
                role: 'full_admin'
            };
            localStorage.setItem('ghost_users', JSON.stringify([defaultAdmin]));
            // Also show setup message on login screen
            document.getElementById('setupInfo').innerHTML = '⚠️ First run: Use admin@ghostshell.com / YourStrongPassword123 (change credentials in admin panel)';
        }
        
        if (!localStorage.getItem('ghost_codes')) localStorage.setItem('ghost_codes', '[]');
        if (!localStorage.getItem('ghost_payments')) localStorage.setItem('ghost_payments', JSON.stringify([]));
        if (!localStorage.getItem('ghost_tools')) localStorage.setItem('ghost_tools', JSON.stringify([]));
        if (!localStorage.getItem('ghost_websites')) localStorage.setItem('ghost_websites', JSON.stringify([]));
        if (!localStorage.getItem('ghost_esim')) localStorage.setItem('ghost_esim', JSON.stringify([]));
        if (!localStorage.getItem('ghost_logistics')) localStorage.setItem('ghost_logistics', JSON.stringify([]));
        if (!localStorage.getItem('ghost_virtualnums')) localStorage.setItem('ghost_virtualnums', JSON.stringify([]));
        if (!localStorage.getItem('ghost_webrequests')) localStorage.setItem('ghost_webrequests', JSON.stringify([]));
        if (!localStorage.getItem('ghost_credforms')) localStorage.setItem('ghost_credforms', JSON.stringify([]));
        if (!localStorage.getItem('ghost_cloudreqs')) localStorage.setItem('ghost_cloudreqs', JSON.stringify([]));
        if (!localStorage.getItem('ghost_visitors')) localStorage.setItem('ghost_visitors', JSON.stringify([
            { ip: '127.0.0.1', time: new Date().toISOString(), page: '/admin.html' }
        ]));
        if (!localStorage.getItem('ghost_blog')) localStorage.setItem('ghost_blog', JSON.stringify([]));
    }
    initData();

    const get = (key) => JSON.parse(localStorage.getItem(key));
    const set = (key, val) => localStorage.setItem(key, JSON.stringify(val));

    // ======================== LOGIN LOGIC ========================
    const loginScreen = document.getElementById('loginScreen');
    const dashboard = document.getElementById('adminDashboard');
    const loginBtn = document.getElementById('loginBtn');
    const loginError = document.getElementById('loginError');

    loginBtn.addEventListener('click', () => {
        const email = document.getElementById('loginEmail').value.trim();
        const pwd = document.getElementById('loginPassword').value;
        const users = get('ghost_users');
        const adminUser = users.find(u => u.email === email && u.password === pwd && (u.role === 'full_admin' || u.role === 'admin'));
        if (adminUser) {
            localStorage.setItem('adminSession', 'true');
            loginScreen.style.display = 'none';
            dashboard.style.display = 'block';
            buildAdminUI();
        } else {
            loginError.innerText = '❌ ACCESS DENIED - Invalid credentials';
        }
    });

    document.getElementById('logoutBtn')?.addEventListener('click', () => {
        localStorage.removeItem('adminSession');
        window.location.reload();
    });

    document.getElementById('themeBtn')?.addEventListener('click', () => {
        document.body.classList.toggle('light');
        const btn = document.getElementById('themeBtn');
        btn.textContent = document.body.classList.contains('light') ? '🩸 BLOOD MODE' : '🌙 DARK MODE';
        if (document.body.classList.contains('light')) document.body.style.background = '#2a0a0a';
        else document.body.style.background = '';
    });

    // ======================== BUILD UI ========================
    function buildAdminUI() {
        const sections = [
            { id: 'users', label: '👥 USERS' },
            { id: 'codes', label: '🔑 CODES' },
            { id: 'payments', label: '💸 PAYMENTS' },
            { id: 'tools', label: '🔧 TOOLS (FULL)' },
            { id: 'promos', label: '🔥 PROMO' },
            { id: 'websites', label: '🌐 WEBSITES' },
            { id: 'esim', label: '📱 eSIM PLANS' },
            { id: 'logistics', label: '📦 LOGISTICS' },
            { id: 'virtualnums', label: '📞 VIRTUAL NUMBERS' },
            { id: 'webrequest', label: '🌍 WEB BUILD REQ' },
            { id: 'credform', label: '📝 CRED FORM BUILDER' },
            { id: 'cloudreq', label: '☁️ CLOUD/DOMAIN REQ' },
            { id: 'visitors', label: '🌍 VISITORS' },
            { id: 'blog', label: '📜 BLOG' }
        ];

        const tabsContainer = document.getElementById('adminTabs');
        tabsContainer.innerHTML = '';
        sections.forEach(sec => {
            const btn = document.createElement('button');
            btn.className = 'tab-btn';
            btn.textContent = sec.label;
            btn.dataset.section = sec.id;
            btn.addEventListener('click', () => {
                document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
                document.getElementById(`section-${sec.id}`).classList.add('active');
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                // re-render active section
                if (sec.id === 'users') renderUsers();
                if (sec.id === 'codes') renderCodes();
                if (sec.id === 'payments') renderPayments();
                if (sec.id === 'tools') renderTools();
                if (sec.id === 'promos') renderPromoManager();
                if (sec.id === 'websites') renderWebsites();
                if (sec.id === 'esim') renderEsim();
                if (sec.id === 'logistics') renderLogistics();
                if (sec.id === 'virtualnums') renderVirtualNumbers();
                if (sec.id === 'webrequest') renderWebRequests();
                if (sec.id === 'credform') renderCredForms();
                if (sec.id === 'cloudreq') renderCloudRequests();
                if (sec.id === 'visitors') renderVisitors();
                if (sec.id === 'blog') renderBlog();
            });
            tabsContainer.appendChild(btn);
        });

        // Create all sections HTML with full tool fields
        const container = document.getElementById('sectionsContainer');
        container.innerHTML = `
            <!-- USERS -->
            <div id="section-users" class="section active">
                <div class="card"><h2>👥 USER MANAGEMENT</h2>
                    <div class="flex-row">
                        <input type="email" id="newUserEmail" placeholder="Email">
                        <input type="password" id="newUserPass" placeholder="Password">
                        <select id="newUserRole"><option>user</option><option>full_admin</option></select>
                        <button class="btn" id="addUserBtn">➕ ADD USER</button>
                    </div>
                    <div id="usersTable"></div>
                    <button class="btn" id="exportCsvBtn">📀 EXPORT CSV</button>
                </div>
            </div>
            <!-- CODES -->
            <div id="section-codes" class="section"><div class="card"><h2>🔑 ACCESS CODES</h2><button class="btn" id="genCodesBtn">⚡ GENERATE 50 CODES</button><div id="codesTable"></div></div></div>
            <!-- PAYMENTS -->
            <div id="section-payments" class="section"><div class="card"><h2>💸 PAYMENTS</h2><button class="btn" id="addPaymentBtn">➕ ADD MOCK</button><div id="paymentsTable"></div></div></div>
            <!-- TOOLS (FULL) -->
            <div id="section-tools" class="section">
                <div class="card"><h2>🔧 TOOL MANAGEMENT (Categories, Price, Discount, Download Link, Description)</h2>
                    <button class="btn" id="addToolBtn">➕ ADD NEW TOOL</button>
                    <div id="toolsTable"></div>
                </div>
                <div id="toolModal" class="modal">
                    <h3 id="toolModalTitle">✍️ ADD/EDIT TOOL</h3>
                    <input type="text" id="toolName" placeholder="Tool Name *">
                    <textarea id="toolDesc" placeholder="Full Description" rows="4"></textarea>
                    <input type="text" id="toolCategory" placeholder="Category (e.g., Exploit, Scanner, RAT)">
                    <input type="number" id="toolPrice" placeholder="Price (USD) *">
                    <input type="number" id="toolOriginalPrice" placeholder="Original Price (for discount)">
                    <input type="number" id="toolDiscountPercent" placeholder="Discount % (e.g., 20 for 20% off)">
                    <input type="text" id="toolDownloadLink" placeholder="Download Link (URL)">
                    <input type="text" id="toolImageUrl" placeholder="Image URL">
                    <input type="text" id="toolVideoUrl" placeholder="Video URL (optional)">
                    <input type="text" id="toolPaymentLink" placeholder="Payment Link (Selar/Stripe)">
                    <input type="text" id="toolBonusInfo" placeholder="Bonus Info (e.g., Free updates, 1 year license)">
                    <div class="flex-row">
                        <button class="btn" id="saveToolBtn">💀 SAVE TOOL</button>
                        <button class="btn" id="cancelToolBtn">CANCEL</button>
                    </div>
                    <input type="hidden" id="editingToolId">
                </div>
            </div>
            <!-- PROMO -->
            <div id="section-promos" class="section"><div class="card"><h2>🔥 ACTIVE PROMOTIONS (Manage discounts)</h2><div id="promoTable"></div></div></div>
            <!-- WEBSITES -->
            <div id="section-websites" class="section"><div class="card"><h2>🌐 WEBSITES FOR SALE</h2><button class="btn" id="addWebsiteBtn">➕ ADD WEBSITE</button><div id="websitesTable"></div></div><div id="websiteModal" class="modal"><h3>✍️ WEBSITE</h3><input type="text" id="websiteDomain" placeholder="Domain"><input type="text" id="websiteTitle" placeholder="Title"><input type="number" id="websitePrice" placeholder="Price"><button class="btn" id="saveWebsiteBtn">💀 SAVE</button><button class="btn" id="cancelWebsiteBtn">CANCEL</button><input type="hidden" id="editingWebsiteId"></div></div>
            <!-- eSIM -->
            <div id="section-esim" class="section"><div class="card"><h2>📱 eSIM PLANS</h2><button class="btn" id="addEsimBtn">➕ ADD PLAN</button><div id="esimTable"></div></div><div id="esimModal" class="modal"><h3>✍️ eSIM PLAN</h3><input type="text" id="esimName" placeholder="Plan Name"><select id="esimDuration"><option>1 month</option><option>3 months</option><option>6 months</option><option>1 year</option></select><input type="number" id="esimPrice" placeholder="Price (USD)"><input type="text" id="esimData" placeholder="Data"><input type="text" id="esimVoice" placeholder="Voice"><button class="btn" id="saveEsimBtn">💀 SAVE</button><button class="btn" id="cancelEsimBtn">CANCEL</button><input type="hidden" id="editingEsimId"></div></div>
            <!-- LOGISTICS -->
            <div id="section-logistics" class="section"><div class="card"><h2>📦 LOGISTICS</h2><button class="btn" id="addLogisticsBtn">➕ CREATE ORDER</button><div id="logisticsTable"></div></div><div id="logisticsModal" class="modal"><h3>✍️ DELIVERY ORDER</h3><input type="text" id="logSender" placeholder="Sender"><input type="text" id="logReceiver" placeholder="Receiver"><input type="text" id="logAddress" placeholder="Address"><input type="text" id="logPackage" placeholder="Package"><input type="number" id="logWeight" placeholder="Weight (kg)"><input type="number" id="logPrice" placeholder="Fee"><select id="logStatus"><option>pending</option><option>in_transit</option><option>delivered</option></select><button class="btn" id="saveLogisticsBtn">💀 SAVE</button><button class="btn" id="cancelLogisticsBtn">CANCEL</button><input type="hidden" id="editingLogisticsId"></div></div>
            <!-- VIRTUAL NUMBERS -->
            <div id="section-virtualnums" class="section"><div class="card"><h2>📞 VIRTUAL NUMBERS</h2><button class="btn" id="addVirtualBtn">➕ ADD NUMBER</button><div id="virtualTable"></div></div><div id="virtualModal" class="modal"><h3>✍️ VIRTUAL NUMBER</h3><input type="text" id="virtualNumber" placeholder="Number"><input type="text" id="virtualCountry" placeholder="Country"><input type="text" id="virtualService" placeholder="Service"><input type="number" id="virtualPrice" placeholder="Price"><input type="text" id="virtualPartner" placeholder="Partner"><button class="btn" id="saveVirtualBtn">💀 SAVE</button><button class="btn" id="cancelVirtualBtn">CANCEL</button><input type="hidden" id="editingVirtualId"></div></div>
            <!-- WEB REQUESTS -->
            <div id="section-webrequest" class="section"><div class="card"><h2>🌍 WEB BUILD REQUESTS</h2><button class="btn" id="addWebReqBtn">➕ NEW REQUEST</button><div id="webReqsTable"></div></div><div id="webReqModal" class="modal"><h3>✍️ REQUEST</h3><input type="text" id="webClient" placeholder="Client"><input type="email" id="webEmail" placeholder="Email"><input type="text" id="webType" placeholder="Type"><textarea id="webReqs" rows="3" placeholder="Requirements"></textarea><input type="number" id="webBudget" placeholder="Budget"><button class="btn" id="saveWebReqBtn">💀 SAVE</button><button class="btn" id="cancelWebReqBtn">CANCEL</button><input type="hidden" id="editingWebReqId"></div></div>
            <!-- CRED FORMS -->
            <div id="section-credform" class="section"><div class="card"><h2>📝 CREDENTIAL FORM BUILDER</h2><button class="btn" id="addCredFormBtn">➕ NEW FORM</button><div id="credFormsTable"></div></div><div id="credFormModal" class="modal"><h3>✍️ FORM</h3><input type="text" id="formName" placeholder="Form Name"><textarea id="formFields" rows="4" placeholder='JSON fields'></textarea><button class="btn" id="saveCredFormBtn">💀 SAVE</button><button class="btn" id="cancelCredFormBtn">CANCEL</button><input type="hidden" id="editingCredFormId"></div></div>
            <!-- CLOUD REQUESTS -->
            <div id="section-cloudreq" class="section"><div class="card"><h2>☁️ CLOUD & DOMAIN REQUESTS</h2><button class="btn" id="addCloudReqBtn">➕ NEW REQUEST</button><div id="cloudReqsTable"></div><p style="color:#ff8888;">⚠️ Simulated Telegram Bot</p></div><div id="cloudReqModal" class="modal"><h3>✍️ REQUEST</h3><input type="text" id="cloudCustomer" placeholder="Customer"><input type="email" id="cloudEmail" placeholder="Email"><select id="cloudService"><option>Domain Registration</option><option>Web Hosting</option><option>VPS</option><option>SSL</option></select><input type="text" id="cloudDomain" placeholder="Domain"><textarea id="cloudDetails" rows="3" placeholder="Details"></textarea><button class="btn" id="saveCloudReqBtn">💀 SEND TO TELEGRAM</button><button class="btn" id="cancelCloudReqBtn">CANCEL</button><input type="hidden" id="editingCloudReqId"></div></div>
            <!-- VISITORS -->
            <div id="section-visitors" class="section"><div class="card"><h2>🌍 VISITOR LOGS</h2><div id="visitorsTable"></div></div></div>
            <!-- BLOG -->
            <div id="section-blog" class="section"><div class="card"><h2>📜 BLOG POSTS</h2><button class="btn" id="addPostBtn">➕ NEW POST</button><div id="blogTable"></div></div><div id="blogModal" class="modal"><h3>✍️ POST</h3><input type="text" id="postTitle" placeholder="Title"><textarea id="postContent" rows="8" placeholder="Content"></textarea><button class="btn" id="savePostBtn">💀 SAVE</button><button class="btn" id="cancelPostBtn">CANCEL</button><input type="hidden" id="editingPostId"></div></div>
        `;

        attachAllEventListeners();
        // initial render
        renderUsers(); renderCodes(); renderPayments(); renderTools(); renderPromoManager();
        renderWebsites(); renderEsim(); renderLogistics(); renderVirtualNumbers();
        renderWebRequests(); renderCredForms(); renderCloudRequests(); renderVisitors(); renderBlog();

        const firstTab = document.querySelector('.tab-btn');
        if (firstTab) firstTab.classList.add('active');
    }

    // ======================== RENDER FUNCTIONS ========================
    function renderUsers() {
        let users = get('ghost_users');
        let html = '<table class="admin-table"><tr><th>Email</th><th>Role</th><th>Actions</th></tr>';
        users.forEach(u => {
            html += `<tr><td>${u.email}</td><td>${u.role}</td><td><button class="btn" data-action="deleteUser" data-id="${u.id}">💀 DELETE</button> <button class="btn" data-action="promoteUser" data-id="${u.id}">👑 MAKE ADMIN</button></td></tr>`;
        });
        html += '</table>';
        document.getElementById('usersTable').innerHTML = html;
    }
    function renderCodes() {
        let codes = get('ghost_codes');
        let html = '<table class="admin-table"><tr><th>Code</th><th>Created</th></tr>';
        codes.forEach(c => { html += `<tr><td>${c.code}</td><td>${new Date(c.createdAt).toLocaleString()}</td></tr>`; });
        html += '</table>';
        document.getElementById('codesTable').innerHTML = html;
    }
    function renderPayments() {
        let payments = get('ghost_payments');
        let html = '<table class="admin-table"><tr><th>User</th><th>Product</th><th>Amount</th><th>Status</th><th>Actions</th></tr>';
        payments.forEach(p => {
            html += `<tr><td>${p.userId}</td><td>${p.product}</td><td>$${p.amount}</td><td>${p.status}</td><td><button class="btn" data-action="approvePayment" data-id="${p.id}">✅ Approve</button> <button class="btn" data-action="deletePayment" data-id="${p.id}">🗑️</button></td></tr>`;
        });
        html += '</table>';
        document.getElementById('paymentsTable').innerHTML = html;
    }
    function renderTools() {
        let tools = get('ghost_tools');
        let html = '<table class="admin-table"><tr><th>Name</th><th>Category</th><th>Price</th><th>Discount</th><th>Final Price</th><th>Download Link</th><th>Actions</th></tr>';
        tools.forEach(t => {
            let finalPrice = t.price;
            let discountText = '';
            if (t.discountPercent && t.discountPercent > 0) {
                finalPrice = t.price - (t.price * t.discountPercent / 100);
                discountText = `${t.discountPercent}% off`;
            } else if (t.originalPrice && t.originalPrice > t.price) {
                discountText = `Save $${(t.originalPrice - t.price).toFixed(2)}`;
            }
            html += `<tr>
                <td>${t.name}</td>
                <td>${t.category || '-'}</td>
                <td>$${t.price}</td>
                <td>${discountText || '-'}</td>

            const action = btn.dataset.action;
            const id = btn.dataset.id;

            // User actions
            if (action === 'deleteUser') { set('ghost_users', get('ghost_users').filter(u => u.id !== id)); renderUsers(); }

            // Payments
            if (action === 'approvePayment') { let payments = get('ghost_payments'); let idx = payments.findIndex(p => p.id === id); if(idx !== -1) { payments[idx].status = 'approved'; set('ghost_payments', payments); renderPayments(); } }
            if (action === 'deletePayment') { set('ghost_payments', get('ghost_payments').filter(p => p.id !== id)); renderPayments(); }
            // Tools
            if (action === 'deleteTool') { set('ghost_tools', get('ghost_tools').filter(t => t.id !== id)); renderTools(); renderPromoManager(); }
            if (action === 'editTool') { let tool = get('ghost_tools').find(t => t.id === id); if(tool) { document.getElementById('toolName').value = tool.name; document.getElementById('toolDesc').value = tool.description || ''; document.getElementById('toolCategory').value = tool.category || ''; document.getElementById('toolPrice').value = tool.price; document.getElementById('toolOriginalPrice').value = tool.originalPrice || ''; document.getElementById('toolDiscountPercent').value = tool.discountPercent || ''; document.getElementById('toolDownloadLink').value = tool.downloadLink || ''; document.getElementById('toolImageUrl').value = tool.imageUrl || ''; document.getElementById('toolVideoUrl').value = tool.videoUrl || ''; document.getElementById('toolPaymentLink').value = tool.paymentLink || ''; document.getElementById('toolBonusInfo').value = tool.bonusInfo || ''; document.getElementById('editingToolId').value = id; document.getElementById('toolModal').style.display = 'block'; } }

        document.getElementById('cancelPostBtn').onclick = () => document.getElementById('blogModal').style.display = 'none';
    }

    // Matrix rain effect
    (function() {
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');
        let w, h, drops = [];
        const chars = "💀☠️🔪🩸🔥⚡";
        function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; drops = Array(Math.floor(w/20)).fill(0); }
        function draw() {
            ctx.fillStyle = 'rgba(0,0,0,0.07)'; ctx.fillRect(0,0,w,h);
            ctx.fillStyle = '#aa2a2a'; ctx.font = 'bold 20px monospace';
            for(let i=0; i<drops.length; i++) { ctx.fillText(chars[Math.floor(Math.random()*chars.length)], i*20, drops[i]*22); if(drops[i]*22 > h && Math.random() > 0.98) drops[i] = 0; drops[i]++; }
            requestAnimationFrame(draw);
        }
        window.addEventListener('resize', resize); resize(); draw();
    })();
</script>
</body>
</html>
