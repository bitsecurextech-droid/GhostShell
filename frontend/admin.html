<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GHOST SHELL // ADMIN COMMAND</title>
    <meta name="description" content="GHOST SHELL Admin Panel – manage users, access codes, marketplace tools, and monitor platform activity.">
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="https://res.cloudinary.com/dkomucpin/image/upload/v1778394573/BDJEUqx_zqkyuc.png">
    <style>
        .admin-section { display:none; } .admin-section.active { display:block; }
        .admin-nav { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px; }
        .admin-nav-btn { background:rgba(20,0,0,0.6); border:1px solid #330000; color:#999; cursor:pointer; font-family:var(--font-mono); font-size:0.75rem; padding:8px 14px; border-radius:4px; transition:all 0.3s; }
        .admin-nav-btn:hover, .admin-nav-btn.active { border-color:var(--red); color:#fff; box-shadow:var(--red-glow); background:rgba(255,0,0,0.1); }
        .add-admin-form { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:15px; }
        .add-admin-form input, .add-admin-form select { width:auto; flex:1; min-width:150px; }
    </style>
</head>
<body>
    <canvas id="matrixCanvas"></canvas>

    <div id="adminLoginModal" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); display:flex; justify-content:center; align-items:center; z-index:2000;">
        <div class="card auth-card" style="text-align:center;">
            <img src="https://res.cloudinary.com/dkomucpin/image/upload/v1778394573/BDJEUqx_zqkyuc.png" style="height:55px; margin-bottom:10px;" alt="GHOST SHELL logo">
            <h1>ADMIN COMMAND</h1>
            <input type="email" id="adminEmail" placeholder="Admin Email" required aria-label="Admin email">
            <input type="password" id="adminPassword" placeholder="Admin Password" required aria-label="Admin password">
            <button class="btn" id="adminLoginBtn" style="width:100%;">AUTHENTICATE</button>
            <div id="adminLoginError" style="color:var(--red); margin-top:10px;"></div>
        </div>
    </div>

    <div id="adminDashboard" style="display:none; position:relative; z-index:10;">
        <header class="header">
            <div class="logo-area">
                <img src="https://res.cloudinary.com/dkomucpin/image/upload/v1778394573/BDJEUqx_zqkyuc.png" class="logo-img" alt="GHOST SHELL logo">
                <span class="site-name">GHOST SHELL</span>
            </div>
            <nav class="nav-links" id="mainNav" aria-label="Admin navigation">
                <button class="nav-link active" onclick="window.location.href='admin.html'">⚙️ Admin</button>
                <button class="nav-link" onclick="window.location.href='dashboard.html'">⌖ Ops Center</button>
            </nav>
            <button class="btn" id="themeToggle" style="border-color:#ffaa00; color:#ffaa00; margin-left:10px;">🌓</button>
            <button class="btn" id="logoutAdminBtn" style="margin-left:auto; border-color:#ffab00; color:#ffab00;" aria-label="Logout">EXIT</button>
        </header>

        <main class="page active">
            <h1 style="color:var(--red); font-family:var(--font-mono);">⚙️ ADMIN COMMAND CENTER</h1>
            <nav class="admin-nav" aria-label="Admin sections">
                <button class="admin-nav-btn active" data-section="users">👥 Users</button>
                <button class="admin-nav-btn" data-section="codes">🔑 Access Codes</button>
                <button class="admin-nav-btn" data-section="payments">💸 Payments</button>
                <button class="admin-nav-btn" data-section="tools">🔧 Manage Tools</button>
                <button class="admin-nav-btn" data-section="visitors">🌍 Visitors</button>
                <button class="admin-nav-btn" data-section="blog">📝 Blog</button>
            </nav>

            <!-- USERS -->
            <section id="section-users" class="admin-section active">
                <div class="card">
                    <h2>➕ ADD / PROMOTE ADMIN</h2>
                    <div class="add-admin-form">
                        <input type="email" id="newAdminEmail" placeholder="User Email" aria-label="User email to promote">
                        <input type="password" id="newAdminPassword" placeholder="Password (leave blank if existing user)" aria-label="New admin password">
                        <select id="newAdminRole" aria-label="Admin role">
                            <option value="full_admin">Full Admin</option>
                            <option value="tools_admin">Tools Admin</option>
                            <option value="user_admin">User Admin</option>
                        </select>
                        <button class="btn" onclick="addOrUpdateAdmin()">Save Admin</button>
                    </div>
                </div>
                <div class="card">
                    <h2>👥 User Management</h2>
                    <div id="userTableContainer" style="max-height:400px;overflow-y:auto;"></div>
                    <button class="btn" id="exportCsvBtn" style="margin-top:10px;">📥 Export Emails CSV</button>
                </div>
            </section>

            <!-- CODES -->
            <section id="section-codes" class="admin-section">
                <div class="card"><h2>🔑 Access Codes</h2><button class="btn" id="generateCodesBtn">Generate 50 Codes</button><div id="codesTableContainer" style="margin-top:15px; max-height:400px;overflow-y:auto;"></div></div>
            </section>

            <!-- PAYMENTS -->
            <section id="section-payments" class="admin-section">
                <div class="card"><h2>💸 Pending Payments</h2><div id="paymentsContainer"></div></div>
            </section>

            <!-- TOOLS -->
            <section id="section-tools" class="admin-section">
                <div class="card">
                    <h2>🔧 Manage Marketplace Tools</h2>
                    <button class="btn" id="addToolBtn">+ Add New Tool</button>
                    <div id="adminToolsContainer" style="margin-top:15px;"></div>
                </div>
                <div id="toolFormModal" style="display:none; margin-top:15px;" class="card">
                    <h3 id="toolFormTitle">Add New Tool</h3>
                    <input type="text" id="toolName" placeholder="Tool Name" aria-label="Tool name">
                    <textarea id="toolDesc" placeholder="Description" rows="3" aria-label="Tool description"></textarea>
                    <input type="number" id="toolPrice" placeholder="Price (USD)" aria-label="Price in USD">
                    <input type="text" id="toolCategory" placeholder="Category (e.g., Network, PDF, Exploit)" aria-label="Category">
                    <textarea id="toolImageUrls" placeholder="Image URLs (one per line)" rows="3" aria-label="Image URLs"></textarea>
                    <input type="text" id="toolVideoUrl" placeholder="Video URL (YouTube or direct link)" aria-label="Video URL">
                    <input type="text" id="toolDownloadUrl" placeholder="Download URL (Google Drive, direct link, or leave blank)" aria-label="Download URL">
                    <input type="text" id="toolPaymentLink" placeholder="Selar payment link (for PDF tools)" aria-label="Selar payment link">
                    <button class="btn" id="saveToolBtn">Save Tool</button>
                    <button class="btn" onclick="closeToolForm()">Cancel</button>
                    <input type="hidden" id="editingToolId" value="">
                </div>
            </section>

            <!-- VISITORS -->
            <section id="section-visitors" class="admin-section">
                <div class="card"><h2>🌍 Visitor Logs</h2><div id="visitorsTableContainer" style="max-height:400px;overflow-y:auto;"></div></div>
            </section>

            <!-- BLOG -->
            <section id="section-blog" class="admin-section">
                <div class="card">
                    <h2>📝 Manage Blog Posts</h2>
                    <button class="btn" id="addPostBtn">+ New Post</button>
                    <div id="blogPostsContainer" style="margin-top:15px;"></div>
                </div>
                <div id="postFormModal" style="display:none; margin-top:15px;" class="card">
                    <h3 id="postFormTitle">New Post</h3>
                    <input type="text" id="postTitle" placeholder="Post Title">
                    <select id="postCategory">
                        <option value="general">General</option>
                        <option value="changelog">Changelog</option>
                        <option value="tutorial">Tutorial</option>
                        <option value="news">News</option>
                    </select>
                    <textarea id="postContent" placeholder="Write your HTML content here..." rows="12"></textarea>
                    <button class="btn" id="savePostBtn">Save Post</button>
                    <button class="btn" onclick="document.getElementById('postFormModal').style.display='none'">Cancel</button>
                    <input type="hidden" id="editingPostId" value="">
                </div>
            </section>

            <button class="btn" id="logoutAdminBtnBottom" style="margin-top:20px;">Logout Admin</button>
        </main>
    </div>

    <script src="js/matrix.js"></script>
    <script>
        const API = '/api'; let adminToken = '';

        // Admin Login
        document.getElementById('adminLoginBtn').addEventListener('click', async () => {
            const email = document.getElementById('adminEmail').value.trim();
            const password = document.getElementById('adminPassword').value;
            const errorEl = document.getElementById('adminLoginError');
            try {
                const res = await fetch(`${API}/admin/login`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ email, password }) });
                const data = await res.json();
                if (data.token) { adminToken = data.token; localStorage.setItem('adminToken', adminToken); showAdminDashboard(); }
                else { errorEl.textContent = data.error || 'Invalid admin credentials'; }
            } catch(e) { errorEl.textContent = 'Connection failed – is the server running?'; }
        });

        function showAdminDashboard() {
            document.getElementById('adminLoginModal').style.display = 'none';
            document.getElementById('adminDashboard').style.display = 'block';
            loadSection('users');
            document.querySelectorAll('.admin-nav-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const section = btn.dataset.section; loadSection(section);
                    document.querySelectorAll('.admin-nav-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                });
            });
            document.getElementById('generateCodesBtn').addEventListener('click', generateCodes);
            document.getElementById('addToolBtn').addEventListener('click', () => openToolForm(null));
            document.getElementById('addPostBtn').addEventListener('click', () => openPostForm(null));
            document.getElementById('savePostBtn').addEventListener('click', savePost);
            document.getElementById('exportCsvBtn').addEventListener('click', () => window.open(`${API}/admin/users-csv`, '_blank'));
            document.getElementById('logoutAdminBtn').addEventListener('click', logoutAdmin);
            document.getElementById('logoutAdminBtnBottom').addEventListener('click', logoutAdmin);

            // Theme toggle
            const themeBtn = document.getElementById('themeToggle');
            if (localStorage.getItem('theme') === 'light') {
                document.body.classList.add('light');
                themeBtn.textContent = '☀️';
            }
            themeBtn.addEventListener('click', () => {
                document.body.classList.toggle('light');
                const isLight = document.body.classList.contains('light');
                themeBtn.textContent = isLight ? '☀️' : '🌓';
                localStorage.setItem('theme', isLight ? 'light' : 'dark');
            });
        }

        function logoutAdmin() { localStorage.removeItem('adminToken'); window.location.href = 'admin.html'; }

        function loadSection(section) {
            document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
            document.getElementById(`section-${section}`).classList.add('active');
            if (section === 'users') loadUsers();
            else if (section === 'codes') loadCodes();
            else if (section === 'payments') loadPayments();
            else if (section === 'tools') loadAdminTools();
            else if (section === 'visitors') loadVisitors();
            else if (section === 'blog') loadBlogPosts();
        }

        // ---------- BLOG MANAGEMENT ----------
        function openPostForm(post = null) {
            document.getElementById('postFormModal').style.display = 'block';
            if (post) {
                document.getElementById('postFormTitle').textContent = 'Edit Post';
                document.getElementById('postTitle').value = post.title || '';
                document.getElementById('postCategory').value = post.category || 'general';
                document.getElementById('postContent').value = post.content || '';
                document.getElementById('editingPostId').value = post.id;
            } else {
                document.getElementById('postFormTitle').textContent = 'New Post';
                document.getElementById('postTitle').value = '';
                document.getElementById('postCategory').value = 'general';
                document.getElementById('postContent').value = '';
                document.getElementById('editingPostId').value = '';
            }
        }

        async function savePost() {
            const title = document.getElementById('postTitle').value.trim();
            const content = document.getElementById('postContent').value.trim();
            const category = document.getElementById('postCategory').value;
            if (!title || !content) return alert('Title and content required.');
            const postData = { title, content, category };
            const editingId = document.getElementById('editingPostId').value;
            const url = editingId ? `${API}/admin/blog/${editingId}` : `${API}/admin/blog`;
            const method = editingId ? 'PUT' : 'POST';
            const res = await fetch(url, { method, headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${adminToken}` }, body: JSON.stringify(postData) });
            if (res.ok) {
                document.getElementById('postFormModal').style.display = 'none';
                loadBlogPosts();
            } else {
                alert('Save failed.');
            }
        }

        async function loadBlogPosts() {
            const res = await fetch(`${API}/blog`);
            const posts = await res.json();
            let html = '<table class="admin-table"><tr><th>Title</th><th>Category</th><th>Date</th><th>Actions</th></tr>';
            posts.forEach(p => {
                html += `<tr><td>${p.title}</td><td>${p.category}</td><td>${new Date(p.createdAt).toLocaleDateString()}</td>
                <td><button class="btn" onclick="editPost('${p.id}')">✏️</button> <button class="btn" onclick="deletePost('${p.id}')" style="border-color:var(--red);color:var(--red);">🗑️</button></td></tr>`;
            });
            html += '</table>';
            document.getElementById('blogPostsContainer').innerHTML = html;
        }

        async function editPost(id) {
            const res = await fetch(`${API}/blog/${id}`);
            const post = await res.json();
            if (post) openPostForm(post);
        }

        async function deletePost(id) {
            if (!confirm('Delete this post?')) return;
            await fetch(`${API}/admin/blog/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${adminToken}` } });
            loadBlogPosts();
        }

        // (Rest of admin functions: loadUsers, banUser, etc. – keep them exactly as before)
        // They are unchanged, just ensure they are included in this file.
        // For brevity, I've omitted them here, but you must keep them from your existing admin.html.
    </script>
</body>
</html>
