<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GHOST SHELL • ADMIN COMMAND</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="https://res.cloudinary.com/dkomucpin/image/upload/v1778394573/BDJEUqx_zqkyuc.png">
    <style>
        * { box-sizing: border-box; }
        body { background: radial-gradient(circle at 20% 30%, #0a0000, #000000); font-family: 'Courier New', monospace; color: #ccc; margin:0; padding:0; }
        .admin-wrapper { max-width: 1400px; margin: 0 auto; padding: 20px; position: relative; z-index: 10; }
        .header { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.8); border-bottom: 2px solid #8a0303; padding: 15px 20px; margin-bottom: 30px; }
        .logo-area { display: flex; align-items: center; gap: 15px; }
        .logo-img { height: 45px; filter: drop-shadow(0 0 5px red); }
        .site-name { font-size: 1.6rem; color: #c0392b; text-shadow: 0 0 8px #ff0000; }
        .btn { background: #1a0000; border: 1px solid #8a0303; color: #ff6666; padding: 6px 14px; cursor: pointer; font-family: monospace; font-weight: bold; margin: 4px; }
        .btn:hover { background: #5e0000; color: white; box-shadow: 0 0 10px red; }
        .admin-tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid #3a1a1a; padding-bottom: 8px; }
        .tab-btn { background: #0a0000; border: 1px solid #5a1a1a; color: #aa5555; padding: 8px 16px; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: #4a0000; color: white; border-color: #ff4444; box-shadow: 0 0 8px red; }
        .card { background: rgba(10,5,5,0.9); border: 1px solid #8a0303; padding: 20px; margin-bottom: 25px; }
        .card h2 { color: #ff6666; margin-bottom: 15px; }
        input, select, textarea { background: #1a0a0a; border: 1px solid #8a0303; color: #ff9999; padding: 8px; width: 100%; margin: 6px 0; font-family: monospace; }
        .admin-table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
        .admin-table th, .admin-table td { border: 1px solid #3a1a1a; padding: 8px; text-align: left; }
        .admin-table th { background: #2a0000; color: #ff8888; }
        .flex-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
        .section { display: none; }
        .section.active { display: block; }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 650px; background: #0a0101; border: 2px solid #ff0000; padding: 20px; z-index: 1000; max-height: 90vh; overflow-y: auto; }
        #matrixCanvas { position: fixed; top:0; left:0; width:100%; height:100%; z-index:0; opacity:0.3; pointer-events:none; }
        .login-container { position: fixed; top:0; left:0; width:100%; height:100%; background: black; display: flex; justify-content: center; align-items: center; z-index: 2000; }
        .login-card { background: #0a0000; border: 2px solid #8a0303; padding: 30px; max-width: 400px; text-align: center; }
        .error-msg { color: #ff5555; margin-top: 10px; }
    </style>
</head>
<body>
<canvas id="matrixCanvas"></canvas>

<!-- LOGIN SCREEN -->
<div id="loginScreen" class="login-container">
    <div class="login-card">
        <img src="https://res.cloudinary.com/dkomucpin/image/upload/v1778394573/BDJEUqx_zqkyuc.png" style="height:60px;">
        <h1 style="color:#ff4444;">ADMIN COMMAND</h1>
        <input type="email" id="loginEmail" placeholder="Admin Email">
        <input type="password" id="loginPassword" placeholder="Password">
        <button class="btn" id="loginBtn" style="width:100%;">AUTHENTICATE</button>
        <div id="loginError" class="error-msg"></div>
    </div>
</div>

<!-- MAIN DASHBOARD -->
<div id="adminDashboard" style="display:none;">
    <div class="admin-wrapper">
        <div class="header">
            <div class="logo-area"><img src="https://res.cloudinary.com/dkomucpin/image/upload/v1778394573/BDJEUqx_zqkyuc.png" class="logo-img"><span class="site-name">GHOST SHELL • ADMIN</span></div>
            <div><button class="btn" id="themeToggle">🌓</button><button class="btn" id="logoutBtn">EXIT</button></div>
        </div>
        <div class="admin-tabs" id="adminTabs"></div>
        <div id="sectionsContainer"></div>
    </div>
</div>

<script>
    // ========== GLOBALS ==========
    const API = '/api';
    let adminToken = localStorage.getItem('adminToken') || '';

    // Helper: API call with token
    async function apiCall(endpoint, options = {}) {
        const res = await fetch(`${API}${endpoint}`, {
            ...options,
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${adminToken}`,
                ...options.headers
            }
        });
        if (res.status === 401) {
            localStorage.removeItem('adminToken');
            window.location.reload();
            throw new Error('Unauthorized');
        }
        return res.json();
    }

    // ========== LOGIN ==========
    const loginScreen = document.getElementById('loginScreen');
    const dashboard = document.getElementById('adminDashboard');
    document.getElementById('loginBtn').addEventListener('click', async () => {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        try {
            const res = await fetch(`${API}/admin/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();
            if (data.token) {
                adminToken = data.token;
                localStorage.setItem('adminToken', adminToken);
                loginScreen.style.display = 'none';
                dashboard.style.display = 'block';
                buildAdminUI();
            } else {
                document.getElementById('loginError').innerText = data.error || 'Invalid credentials';
            }
        } catch (err) {
            document.getElementById('loginError').innerText = 'Connection failed – is backend running?';
        }
    });
    document.getElementById('logoutBtn').addEventListener('click', () => {
        localStorage.removeItem('adminToken');
        window.location.reload();
    });

    // ========== BUILD UI ==========
    function buildAdminUI() {
        const sections = [
            'users','codes','payments','tools','websites','esim','logistics','virtualnums',
            'webrequest','credform','cloudreq','visitors','blog'
        ];
        const labels = {
            users:'👥 Users', codes:'🔑 Codes', payments:'💸 Payments', tools:'🔧 Tools',
            websites:'🌐 Websites', esim:'📱 eSIM', logistics:'📦 Logistics', virtualnums:'📞 Virtual Numbers',
            webrequest:'🌍 Web Req', credform:'📝 Cred Forms', cloudreq:'☁️ Cloud/Domain',
            visitors:'🌍 Visitors', blog:'📝 Blog'
        };
        const tabsContainer = document.getElementById('adminTabs');
        tabsContainer.innerHTML = '';
        sections.forEach(sec => {
            const btn = document.createElement('button');
            btn.className = 'tab-btn';
            btn.textContent = labels[sec];
            btn.dataset.section = sec;
            btn.addEventListener('click', () => {
                document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
                document.getElementById(`section-${sec}`).classList.add('active');
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                refreshSection(sec);
            });
            tabsContainer.appendChild(btn);
        });

        // Create sections HTML
        const container = document.getElementById('sectionsContainer');
        container.innerHTML = `
            <!-- USERS -->
            <div id="section-users" class="section active"><div class="card"><h2>👥 Users</h2><div id="usersTable"></div><button class="btn" id="addUserBtn">+ Add User</button></div></div>
            <!-- CODES -->
            <div id="section-codes" class="section"><div class="card"><h2>🔑 Access Codes</h2><button class="btn" id="genCodesBtn">Generate 50 Codes</button><div id="codesTable"></div></div></div>
            <!-- PAYMENTS -->
            <div id="section-payments" class="section"><div class="card"><h2>💸 Payments</h2><div id="paymentsTable"></div><button class="btn" id="addPaymentBtn">+ Mock Payment</button></div></div>
            <!-- TOOLS -->
            <div id="section-tools" class="section"><div class="card"><h2>🔧 Tools</h2><button class="btn" id="addToolBtn">+ Add Tool</button><div id="toolsTable"></div></div>
            <div id="toolModal" class="modal"><h3>Tool</h3><input id="toolName" placeholder="Name"><input id="toolPrice" type="number" placeholder="Price"><input id="toolDiscount" type="number" placeholder="Discount %"><input id="toolDownload" placeholder="Download URL"><button class="btn" id="saveToolBtn">Save</button><button class="btn" id="cancelToolBtn">Cancel</button><input type="hidden" id="editingToolId"></div></div>
            <!-- WEBSITES -->
            <div id="section-websites" class="section"><div class="card"><h2>🌐 Websites</h2><button class="btn" id="addWebsiteBtn">+ Add</button><div id="websitesTable"></div></div>
            <div id="websiteModal" class="modal"><h3>Website</h3><input id="websiteDomain" placeholder="Domain"><input id="websiteTitle" placeholder="Title"><input id="websitePrice" type="number" placeholder="Price"><button class="btn" id="saveWebsiteBtn">Save</button><button class="btn" id="cancelWebsiteBtn">Cancel</button><input type="hidden" id="editingWebsiteId"></div></div>
            <!-- eSIM -->
            <div id="section-esim" class="section"><div class="card"><h2>📱 eSIM Plans</h2><button class="btn" id="addEsimBtn">+ Add</button><div id="esimTable"></div></div>
            <div id="esimModal" class="modal"><h3>eSIM Plan</h3><input id="esimName" placeholder="Name"><select id="esimDuration"><option>1 month</option><option>3 months</option><option>6 months</option><option>1 year</option></select><input id="esimPrice" type="number" placeholder="Price"><input id="esimData" placeholder="Data"><input id="esimVoice" placeholder="Voice"><button class="btn" id="saveEsimBtn">Save</button><button class="btn" id="cancelEsimBtn">Cancel</button><input type="hidden" id="editingEsimId"></div></div>
            <!-- LOGISTICS -->
            <div id="section-logistics" class="section"><div class="card"><h2>📦 Logistics</h2><button class="btn" id="addLogisticsBtn">+ Add Order</button><div id="logisticsTable"></div></div>
            <div id="logisticsModal" class="modal"><h3>Order</h3><input id="logSender" placeholder="Sender"><input id="logReceiver" placeholder="Receiver"><input id="logAddress" placeholder="Address"><input id="logPackage" placeholder="Package"><input id="logWeight" type="number" placeholder="Weight (kg)"><input id="logPrice" type="number" placeholder="Price"><select id="logStatus"><option>pending</option><option>in_transit</option><option>delivered</option></select><button class="btn" id="saveLogisticsBtn">Save</button><button class="btn" id="cancelLogisticsBtn">Cancel</button><input type="hidden" id="editingLogisticsId"></div></div>
            <!-- VIRTUAL NUMBERS -->
            <div id="section-virtualnums" class="section"><div class="card"><h2>📞 Virtual Numbers</h2><button class="btn" id="addVirtualBtn">+ Add</button><div id="virtualTable"></div></div>
            <div id="virtualModal" class="modal"><h3>Virtual Number</h3><input id="virtualNumber" placeholder="Number"><input id="virtualCountry" placeholder="Country"><input id="virtualService" placeholder="Service"><input id="virtualPrice" type="number" placeholder="Price"><input id="virtualPartner" placeholder="Partner"><button class="btn" id="saveVirtualBtn">Save</button><button class="btn" id="cancelVirtualBtn">Cancel</button><input type="hidden" id="editingVirtualId"></div></div>
            <!-- WEB REQUESTS -->
            <div id="section-webrequest" class="section"><div class="card"><h2>🌍 Web Requests</h2><button class="btn" id="addWebReqBtn">+ Add</button><div id="webReqsTable"></div></div>
            <div id="webReqModal" class="modal"><h3>Request</h3><input id="webClient" placeholder="Client"><input id="webEmail" placeholder="Email"><input id="webType" placeholder="Type"><textarea id="webReqs" rows="3" placeholder="Requirements"></textarea><input id="webBudget" type="number" placeholder="Budget"><button class="btn" id="saveWebReqBtn">Save</button><button class="btn" id="cancelWebReqBtn">Cancel</button><input type="hidden" id="editingWebReqId"></div></div>
            <!-- CREDENTIAL FORMS -->
            <div id="section-credform" class="section"><div class="card"><h2>📝 Credential Forms</h2><button class="btn" id="addCredFormBtn">+ Add</button><div id="credFormsTable"></div></div>
            <div id="credFormModal" class="modal"><h3>Form</h3><input id="formName" placeholder="Name"><textarea id="formFields" rows="4" placeholder='[{"label":"Name","type":"text"}]'></textarea><button class="btn" id="saveCredFormBtn">Save</button><button class="btn" id="cancelCredFormBtn">Cancel</button><input type="hidden" id="editingCredFormId"></div></div>
            <!-- CLOUD REQUESTS -->
            <div id="section-cloudreq" class="section"><div class="card"><h2>☁️ Cloud/Domain Reqs</h2><button class="btn" id="addCloudReqBtn">+ Add</button><div id="cloudReqsTable"></div></div>
            <div id="cloudReqModal" class="modal"><h3>Request</h3><input id="cloudCustomer" placeholder="Customer"><input id="cloudEmail" placeholder="Email"><select id="cloudService"><option>Domain</option><option>Hosting</option><option>VPS</option><option>SSL</option></select><input id="cloudDomain" placeholder="Domain"><textarea id="cloudDetails" rows="3"></textarea><button class="btn" id="saveCloudReqBtn">Save</button><button class="btn" id="cancelCloudReqBtn">Cancel</button><input type="hidden" id="editingCloudReqId"></div></div>
            <!-- VISITORS -->
            <div id="section-visitors" class="section"><div class="card"><h2>🌍 Visitors</h2><div id="visitorsTable"></div></div></div>
            <!-- BLOG -->
            <div id="section-blog" class="section"><div class="card"><h2>📝 Blog Posts</h2><button class="btn" id="addPostBtn">+ Add</button><div id="blogTable"></div></div>
            <div id="blogModal" class="modal"><h3>Post</h3><input id="postTitle" placeholder="Title"><textarea id="postContent" rows="8" placeholder="HTML content"></textarea><button class="btn" id="savePostBtn">Save</button><button class="btn" id="cancelPostBtn">Cancel</button><input type="hidden" id="editingPostId"></div></div>
        `;

        attachAllEventListeners();
        refreshSection('users');
        const firstTab = document.querySelector('.tab-btn');
        if (firstTab) firstTab.classList.add('active');
    }

    function refreshSection(section) {
        if (section === 'users') loadUsers();
        if (section === 'codes') loadCodes();
        if (section === 'payments') loadPayments();
        if (section === 'tools') loadTools();
        if (section === 'websites') loadWebsites();
        if (section === 'esim') loadEsim();
        if (section === 'logistics') loadLogistics();
        if (section === 'virtualnums') loadVirtual();
        if (section === 'webrequest') loadWebReqs();
        if (section === 'credform') loadCredForms();
        if (section === 'cloudreq') loadCloudReqs();
        if (section === 'visitors') loadVisitors();
        if (section === 'blog') loadBlog();
    }

    // ========== API CALLS FOR EACH SECTION ==========

    // USERS
    async function loadUsers() {
        const users = await apiCall('/admin/users');
        let html = '<table class="admin-table"><thead><tr><th>Email</th><th>Username</th><th>Access Code</th><th>Status</th><th>Actions</th></tr></thead><tbody>';
        users.forEach(u => {
            const status = u.banned ? '🚫 BANNED' : (u.approved ? '✅ ACTIVE' : '⏳ PENDING');
            html += `<tr>
                        <td>${u.email}</td>
                        <td>${u.username || '-'}</td>
                        <td>${u.accessCode || '—'}</td>
                        <td>${status}</td>
                        <td>
                            ${u.banned ? `<button class="btn" onclick="unbanUser('${u.id}')">UNBAN</button>` : `<button class="btn" onclick="banUser('${u.id}')">BAN</button>`}
                            <button class="btn" onclick="deleteUser('${u.id}')">DELETE</button>
                        </td>
                    </tr>`;
        });
        html += '</tbody></table>';
        document.getElementById('usersTable').innerHTML = html;
    }
    window.banUser = async (id) => { await apiCall(`/admin/ban/${id}`, { method: 'POST' }); loadUsers(); };
    window.unbanUser = async (id) => { await apiCall(`/admin/unban/${id}`, { method: 'POST' }); loadUsers(); };
    window.deleteUser = async (id) => { if (confirm('Delete user?')) await apiCall(`/admin/delete/${id}`, { method: 'DELETE' }); loadUsers(); };
    document.getElementById('addUserBtn')?.addEventListener('click', async () => {
        const email = prompt('Email:'); if (!email) return;
        const password = prompt('Password:'); if (!password) return;
        await apiCall('/admin/users', { method: 'POST', body: JSON.stringify({ email, password, role: 'user' }) });
        loadUsers();
    });

    // CODES
    async function loadCodes() {
        const codes = await apiCall('/admin/codes');
        let html = '<table class="admin-table"><thead><tr><th>Code</th><th>Status</th><th>Used By</th><th>Action</th></tr></thead><tbody>';
        codes.forEach(c => {
            html += `<tr>
                        <td>${c.code}</td>
                        <td>${c.usedBy ? 'USED' : 'ACTIVE'}</td>
                        <td>${c.usedBy ? c.usedBy.email : '—'}</td>
                        <td><button class="btn" onclick="revokeCode('${c.id}')">REVOKE</button></td>
                    </tr>`;
        });
        html += '</tbody></table>';
        document.getElementById('codesTable').innerHTML = html;
    }
    window.revokeCode = async (id) => { await apiCall('/admin/revoke-code', { method: 'POST', body: JSON.stringify({ codeId: id }) }); loadCodes(); };
    document.getElementById('genCodesBtn')?.addEventListener('click', async () => {
        await apiCall('/admin/generate-codes', { method: 'POST', body: JSON.stringify({ count: 50 }) });
        loadCodes();
    });

    // PAYMENTS
    async function loadPayments() {
        const payments = await apiCall('/admin/payments');
        let html = '<table class="admin-table"><thead><tr><th>User</th><th>Product</th><th>Amount</th><th>Status</th><th>Action</th></tr></thead><tbody>';
        payments.forEach(p => {
            html += `<tr>
                        <td>${p.userId?.email || '—'}</td>
                        <td>${p.product || 'Access Code'}</td>
                        <td>$${p.amountUSD}</td>
                        <td>${p.status}</td>
                        <td><button class="btn" onclick="confirmPayment('${p.id}')">CONFIRM</button></td>
                    </tr>`;
        });
        html += '</tbody></table>';
        document.getElementById('paymentsTable').innerHTML = html;
    }
    window.confirmPayment = async (id) => { await apiCall('/admin/confirm-payment', { method: 'POST', body: JSON.stringify({ paymentId: id }) }); loadPayments(); };
    document.getElementById('addPaymentBtn')?.addEventListener('click', async () => {
        await apiCall('/admin/payments', { method: 'POST', body: JSON.stringify({ userId: 'guest', amount: 99, product: 'Test Product' }) });
        loadPayments();
    });

    // TOOLS
    async function loadTools() {
        const tools = await apiCall('/tools');
        let html = '<table class="admin-table"><thead><tr><th>Name</th><th>Price</th><th>Discount</th><th>Download</th><th>Actions</th></tr></thead><tbody>';
        tools.forEach(t => {
            html += `<tr>
                        <td>${t.name}</td>
                        <td>$${t.priceUSD}</td>
                        <td>${t.discountPercent || 0}%</td>
                        <td><a href="${t.downloadUrl || '#'}" target="_blank">Link</a></td>
                        <td><button class="btn" onclick="editTool('${t.id}')">Edit</button> <button class="btn" onclick="deleteTool('${t.id}')">Delete</button></td>
                    </tr>`;
        });
        html += '</tbody><table>';
        document.getElementById('toolsTable').innerHTML = html;
    }
    window.editTool = async (id) => {
        const tools = await apiCall('/tools');
        const t = tools.find(t => t.id === id);
        if (t) {
            document.getElementById('toolName').value = t.name;
            document.getElementById('toolPrice').value = t.priceUSD;
            document.getElementById('toolDiscount').value = t.discountPercent || 0;
            document.getElementById('toolDownload').value = t.downloadUrl || '';
            document.getElementById('editingToolId').value = id;
            document.getElementById('toolModal').style.display = 'block';
        }
    };
    window.deleteTool = async (id) => { if (confirm('Delete tool?')) await apiCall(`/admin/tool/${id}`, { method: 'DELETE' }); loadTools(); };
    document.getElementById('addToolBtn')?.addEventListener('click', () => {
        document.getElementById('toolModal').style.display = 'block';
        document.getElementById('editingToolId').value = '';
        document.getElementById('toolName').value = '';
        document.getElementById('toolPrice').value = '';
        document.getElementById('toolDiscount').value = '';
        document.getElementById('toolDownload').value = '';
    });
    document.getElementById('saveToolBtn')?.addEventListener('click', async () => {
        const id = document.getElementById('editingToolId').value;
        const data = {
            name: document.getElementById('toolName').value,
            priceUSD: parseFloat(document.getElementById('toolPrice').value),
            discountPercent: parseInt(document.getElementById('toolDiscount').value) || 0,
            downloadUrl: document.getElementById('toolDownload').value
        };
        if (!data.name) return alert('Name required');
        if (id) {
            await apiCall(`/admin/tool/${id}`, { method: 'PUT', body: JSON.stringify(data) });
        } else {
            await apiCall('/admin/tool', { method: 'POST', body: JSON.stringify(data) });
        }
        document.getElementById('toolModal').style.display = 'none';
        loadTools();
    });
    document.getElementById('cancelToolBtn')?.addEventListener('click', () => document.getElementById('toolModal').style.display = 'none');

    // WEBSITES (backend CRUD)
    async function loadWebsites() {
        const items = await apiCall('/admin/websites');
        let html = '<table class="admin-table"><thead><tr><th>Domain</th><th>Title</th><th>Price</th><th>Actions</th></tr></thead><tbody>';
        items.forEach(i => {
            html += `<tr>
                        <td>${i.domain}</td>
                        <td>${i.title}</td>
                        <td>$${i.price}</td>
                        <td><button class="btn" onclick="editWebsite('${i.id}')">Edit</button> <button class="btn" onclick="deleteWebsite('${i.id}')">Delete</button></td>
                    </tr>`;
        });
        html += '</tbody></table>';
        document.getElementById('websitesTable').innerHTML = html;
    }
    window.editWebsite = async (id) => {
        const items = await apiCall('/admin/websites');
        const item = items.find(i => i.id === id);
        if (item) {
            document.getElementById('websiteDomain').value = item.domain;
            document.getElementById('websiteTitle').value = item.title;
            document.getElementById('websitePrice').value = item.price;
            document.getElementById('editingWebsiteId').value = id;
            document.getElementById('websiteModal').style.display = 'block';
        }
    };
    window.deleteWebsite = async (id) => { if (confirm('Delete?')) await apiCall(`/admin/websites/${id}`, { method: 'DELETE' }); loadWebsites(); };
    document.getElementById('addWebsiteBtn')?.addEventListener('click', () => {
        document.getElementById('websiteModal').style.display = 'block';
        document.getElementById('editingWebsiteId').value = '';
        document.getElementById('websiteDomain').value = '';
        document.getElementById('websiteTitle').value = '';
        document.getElementById('websitePrice').value = '';
    });
    document.getElementById('saveWebsiteBtn')?.addEventListener('click', async () => {
        const id = document.getElementById('editingWebsiteId').value;
        const data = {
            domain: document.getElementById('websiteDomain').value,
            title: document.getElementById('websiteTitle').value,
            price: parseFloat(document.getElementById('websitePrice').value)
        };
        if (!data.domain) return alert('Domain required');
        if (id) {
            await apiCall(`/admin/websites/${id}`, { method: 'PUT', body: JSON.stringify(data) });
        } else {
            await apiCall('/admin/websites', { method: 'POST', body: JSON.stringify(data) });
        }
        document.getElementById('websiteModal').style.display = 'none';
        loadWebsites();
    });
    document.getElementById('cancelWebsiteBtn')?.addEventListener('click', () => document.getElementById('websiteModal').style.display = 'none');

    // eSIM (backend)
    async function loadEsim() {
        const items = await apiCall('/admin/esim');
        let html = '<table class="admin-table"><thead><tr><th>Name</th><th>Duration</th><th>Price</th><th>Data</th><th>Voice</th><th>Actions</th></tr></thead><tbody>';
        items.forEach(i => {
            html += `<tr>
                        <td>${i.name}</td>
                        <td>${i.duration}</td>
                        <td>$${i.price}</td>
                        <td>${i.data}</td>
                        <td>${i.voice}</td>
                        <td><button class="btn" onclick="editEsim('${i.id}')">Edit</button> <button class="btn" onclick="deleteEsim('${i.id}')">Delete</button></td>
                    </tr>`;
        });
        html += '</tbody></tr>';
        document.getElementById('esimTable').innerHTML = html;
    }
    window.editEsim = async (id) => {
        const items = await apiCall('/admin/esim');
        const item = items.find(i => i.id === id);

    // ========== UTILITIES ==========
    function attachAllEventListeners() {
        // All listeners are already attached via addEventListener above.
        // Theme toggle
        const themeBtn = document.getElementById('themeToggle');
        if (localStorage.getItem('theme') === 'light') document.body.classList.add('light');
        themeBtn.addEventListener('click', () => {
            document.body.classList.toggle('light');
            themeBtn.textContent = document.body.classList.contains('light') ? '☀️' : '🌓';
            localStorage.setItem('theme', document.body.classList.contains('light') ? 'light' : 'dark');
        });
    }

    // Matrix rain effect
    (function() {
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');
        let w, h, drops = [];
        const chars = "💀☠️🔪🩸🔥⚡";
        function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; drops = Array(Math.floor(w/20)).fill(0); }
        function draw() {
            ctx.fillStyle = 'rgba(0,0,0,0.07)'; ctx.fillRect(0,0,w,h);
            ctx.fillStyle = '#aa2a2a'; ctx.font = 'bold 20px monospace';
            for(let i=0; i<drops.length; i++) { ctx.fillText(chars[Math.floor(Math.random()*chars.length)], i*20, drops[i]*22); if(drops[i]*22 > h && Math.random() > 0.98) drops[i] = 0; drops[i]++; }
            requestAnimationFrame(draw);
        }
        window.addEventListener('resize', resize); resize(); draw();
    })();
