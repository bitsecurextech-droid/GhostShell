<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GHOST SHELL // ADMIN PANEL</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --blood: #8a0303;
            --glow-red: #ff0a0a;
        }
        body {
            background: radial-gradient(circle at 20% 30%, #0a0000, #000000);
            font-family: 'Courier New', 'Fira Code', monospace;
            color: #9e9e9e;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, rgba(139,0,0,0.08) 0px, rgba(139,0,0,0.08) 2px, transparent 2px, transparent 6px);
            pointer-events: none;
            z-index: 1;
        }
        canvas#matrixCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.35;
            pointer-events: none;
        }
        .header, .card, .admin-nav-btn, .btn, input, select, textarea, .auth-card {
            backdrop-filter: blur(2px);
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid var(--blood);
            box-shadow: 0 0 8px rgba(139, 0, 0, 0.6);
            transition: 0.2s;
        }
        .card:hover, .admin-nav-btn:hover {
            border-color: var(--glow-red);
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.8);
        }
        .btn {
            background: #150000;
            color: #ff4444;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 2px;
            cursor: pointer;
            padding: 6px 12px;
            border: none;
            margin: 4px;
        }
        .btn:hover {
            background: #5e0000;
            color: white;
            text-shadow: 0 0 5px red;
            box-shadow: 0 0 12px red;
        }
        input, select, textarea {
            background: #0d0000;
            color: #ff9999;
            border-color: #8a0303;
            padding: 8px;
            width: 100%;
            margin: 5px 0;
        }
        h1, h2, h3 {
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 5px red;
        }
        .admin-nav {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            margin: 25px 0;
        }
        .admin-nav-btn {
            background: #080000;
            padding: 8px 14px;
            cursor: pointer;
            font-weight: bold;
        }
        .admin-nav-btn.active {
            background: #4a0000;
            color: white;
            border-color: #ff4d4d;
            box-shadow: 0 0 12px red;
        }
        .admin-section {
            display: none;
        }
        .admin-section.active {
            display: block;
        }
        .admin-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.75rem;
        }
        .admin-table th {
            background: #2a0000;
            color: #ff6a6a;
            border: 1px solid #8a0303;
            padding: 8px;
        }
        .admin-table td {
            border: 1px solid #3a1a1a;
            padding: 6px;
        }
        #adminLoginModal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.98);
            backdrop-filter: blur(6px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .auth-card {
            background: #0a0101;
            border: 2px solid #a00000;
            padding: 30px;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 0 40px rgba(255,0,0,0.4);
        }
        .header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            margin-bottom: 25px;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-img {
            height: 45px;
            filter: drop-shadow(0 0 5px red);
        }
        .site-name {
            color: #c0392b;
            text-shadow: 0 0 10px #ff0000;
            font-size: 1.6rem;
        }
        .flex-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
    </style>
</head>
<body>
<canvas id="matrixCanvas"></canvas>

<!-- LOGIN MODAL -->
<div id="adminLoginModal">
    <div class="auth-card">
        <img src="https://res.cloudinary.com/dkomucpin/image/upload/v1778394573/BDJEUqx_zqkyuc.png" style="height:65px; filter: drop-shadow(0 0 12px red);" alt="skull">
        <h1>⌧ ADMIN OVERRIDE ⌧</h1>
        <input type="email" id="adminEmail" placeholder="CLASSIFIED EMAIL" autocomplete="off">
        <input type="password" id="adminPassword" placeholder="DECRYPT KEY">
        <button class="btn" id="adminLoginBtn" style="width:100%; margin-top:12px;">⛧ UNLOCK DARKNESS ⛧</button>
        <div id="adminLoginError" style="color:#ff5555; margin-top:12px;"></div>
    </div>
</div>

<!-- MAIN DASHBOARD -->
<div id="adminDashboard" style="display:none; position:relative; z-index:10; padding:0 20px 40px;">
    <header class="header">
        <div class="logo-area">
            <img src="https://res.cloudinary.com/dkomucpin/image/upload/v1778394573/BDJEUqx_zqkyuc.png" class="logo-img">
            <span class="site-name">💀 GHOST SHELL • COMPLETE ADMIN (ALL CLICKABLE) 💀</span>
        </div>
        <nav class="nav-links">
            <button class="nav-link" onclick="window.location.href='dashboard.html'">⌖ OPS</button>
            <button class="nav-link" onclick="window.location.href='tools.html'">⚔️ TOOLS</button>
        </nav>
        <button class="btn" id="themeToggle">🌙 BLOOD MODE</button>
        <button class="btn" id="logoutAdminBtn">⛧ EXIT</button>
    </header>

    <h1 style="color:#ff3333; text-align:center;">⚡ COMPLETE ADMIN OVERLORD (ALL SECTIONS ACTIVE) ⚡</h1>
    <div class="admin-nav" id="adminNavButtons">
        <!-- buttons injected via JS, but we'll hardcode them here too for clarity -->
    </div>

    <!-- All sections will be generated by JS, but we'll pre-create containers -->
    <div id="sectionsContainer"></div>
</div>

<script>
    // --------------------------------------------------------------
    // 1. DATA LAYER (localStorage with defaults)
    // --------------------------------------------------------------
    function initData() {
        if (!localStorage.getItem('ghost_users')) {
            localStorage.setItem('ghost_users', JSON.stringify([
                { id: '1', email: 'admin@ghostshell.com', password: 'admin123', role: 'full_admin' }
            ]));
        }
        if (!localStorage.getItem('ghost_codes')) localStorage.setItem('ghost_codes', '[]');
        if (!localStorage.getItem('ghost_payments')) localStorage.setItem('ghost_payments', JSON.stringify([
            { id: 'p1', userId: '1', product: 'RAT Pro', amount: 199.99, status: 'pending' }
        ]));
        if (!localStorage.getItem('ghost_tools')) localStorage.setItem('ghost_tools', JSON.stringify([]));
        if (!localStorage.getItem('ghost_websites')) localStorage.setItem('ghost_websites', JSON.stringify([
            { id: 'w1', domain: 'hackersparadise.com', title: 'Hacker Forum', price: 499, category: 'Forum' }
        ]));
        if (!localStorage.getItem('ghost_esim')) localStorage.setItem('ghost_esim', JSON.stringify([
            { id: 'e1', name: '5GB 30 Days', duration: '1 month', price: 19.99, data: '5GB', voice: '100 mins' }
        ]));
        if (!localStorage.getItem('ghost_logistics')) localStorage.setItem('ghost_logistics', JSON.stringify([]));
        if (!localStorage.getItem('ghost_virtualnums')) localStorage.setItem('ghost_virtualnums', JSON.stringify([]));
        if (!localStorage.getItem('ghost_webrequests')) localStorage.setItem('ghost_webrequests', JSON.stringify([]));
        if (!localStorage.getItem('ghost_credforms')) localStorage.setItem('ghost_credforms', JSON.stringify([]));
        if (!localStorage.getItem('ghost_cloudreqs')) localStorage.setItem('ghost_cloudreqs', JSON.stringify([]));
        if (!localStorage.getItem('ghost_visitors')) localStorage.setItem('ghost_visitors', JSON.stringify([
            { ip: '192.168.1.1', time: new Date().toISOString(), page: '/admin.html' }
        ]));
        if (!localStorage.getItem('ghost_blog')) localStorage.setItem('ghost_blog', JSON.stringify([]));
    }
    initData();

    const get = (key) => JSON.parse(localStorage.getItem(key));
    const set = (key, val) => localStorage.setItem(key, JSON.stringify(val));

    // --------------------------------------------------------------
    // 2. LOGIN & THEME
    // --------------------------------------------------------------
    document.getElementById('adminLoginBtn').addEventListener('click', () => {
        const email = document.getElementById('adminEmail').value.trim();
        const pwd = document.getElementById('adminPassword').value;
        const user = get('ghost_users').find(u => u.email === email && u.password === pwd && (u.role === 'full_admin' || u.role === 'admin'));
        if (user) {
            localStorage.setItem('adminSession', 'true');
            document.getElementById('adminLoginModal').style.display = 'none';
            document.getElementById('adminDashboard').style.display = 'block';
            buildAdminInterface();
        } else {
            document.getElementById('adminLoginError').innerText = '❌ ACCESS DENIED';
        }
    });
    document.getElementById('logoutAdminBtn').addEventListener('click', () => { localStorage.removeItem('adminSession'); window.location.reload(); });
    document.getElementById('themeToggle').addEventListener('click', () => {
        document.body.classList.toggle('light');
        const btn = document.getElementById('themeToggle');
        btn.textContent = document.body.classList.contains('light') ? '🩸 BLOOD MODE' : '🌙 BLOOD MODE';
        if (document.body.classList.contains('light')) document.body.style.background = '#2a0a0a';
        else document.body.style.background = '';
    });

    // --------------------------------------------------------------
    // 3. BUILD ENTIRE ADMIN INTERFACE (dynamic, but all clicks work)
    // --------------------------------------------------------------
    function buildAdminInterface() {
        const sections = [
            { id: 'users', label: '👥 USERS' },
            { id: 'codes', label: '🔑 CODES' },
            { id: 'payments', label: '💸 PAYMENTS' },
            { id: 'tools', label: '🔧 TOOLS' },
            { id: 'promos', label: '🔥 PROMO' },
            { id: 'websites', label: '🌐 WEBSITES' },
            { id: 'esim', label: '📱 eSIM' },
            { id: 'logistics', label: '📦 LOGISTICS' },
            { id: 'virtualnums', label: '📞 VIRTUAL NUMBERS' },
            { id: 'webrequest', label: '🌍 WEB BUILD REQ' },
            { id: 'credform', label: '📝 CRED FORM BUILDER' },
            { id: 'cloudreq', label: '☁️ CLOUD/DOMAIN REQ' },
            { id: 'visitors', label: '🌍 VISITORS' },
            { id: 'blog', label: '📜 BLOG' }
        ];

        const navDiv = document.getElementById('adminNavButtons');
        navDiv.innerHTML = '';
        sections.forEach(sec => {
            const btn = document.createElement('button');
            btn.className = 'admin-nav-btn';
            btn.textContent = sec.label;
            btn.dataset.section = sec.id;
            btn.addEventListener('click', () => {
                document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
                document.getElementById(`section-${sec.id}`).classList.add('active');
                document.querySelectorAll('.admin-nav-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                // re-render the active section to ensure fresh data
                if (sec.id === 'users') renderUsers();
                if (sec.id === 'codes') renderCodes();
                if (sec.id === 'payments') renderPayments();
                if (sec.id === 'tools') renderTools();
                if (sec.id === 'promos') renderPromoManager();
                if (sec.id === 'websites') renderWebsites();
                if (sec.id === 'esim') renderEsim();
                if (sec.id === 'logistics') renderLogistics();
                if (sec.id === 'virtualnums') renderVirtualNumbers();
                if (sec.id === 'webrequest') renderWebRequests();
                if (sec.id === 'credform') renderCredForms();
                if (sec.id === 'cloudreq') renderCloudRequests();
                if (sec.id === 'visitors') renderVisitors();
                if (sec.id === 'blog') renderBlog();
            });
            navDiv.appendChild(btn);
        });

        const container = document.getElementById('sectionsContainer');
        container.innerHTML = ''; // rebuild sections

        // USERS SECTION
        container.innerHTML += `
            <section id="section-users" class="admin-section active">
                <div class="card">
                    <h2>👥 USER MANAGEMENT</h2>
                    <div class="flex-row">
                        <input type="email" id="newUserEmail" placeholder="Email">
                        <input type="password" id="newUserPass" placeholder="Password">
                        <select id="newUserRole"><option value="user">User</option><option value="full_admin">Admin</option></select>
                        <button class="btn" id="addUserBtn">➕ ADD USER</button>
                    </div>
                    <div id="userTableContainer"></div>
                    <button class="btn" id="exportCsvBtn">📀 EXPORT USERS CSV</button>
                </div>
            </section>
            <section id="section-codes" class="admin-section"><div class="card"><h2>🔑 ACCESS CODES</h2><button class="btn" id="generateCodesBtn">⚡ GENERATE 50 CODES</button><div id="codesTableContainer"></div></div></section>
            <section id="section-payments" class="admin-section"><div class="card"><h2>💸 PAYMENTS</h2><button class="btn" id="addPaymentBtn">➕ ADD MOCK PAYMENT</button><div id="paymentsContainer"></div></div></section>
            <section id="section-tools" class="admin-section"><div class="card"><h2>🔧 MARKETPLACE TOOLS</h2><button class="btn" id="addToolBtn">➕ ADD TOOL</button><div id="adminToolsContainer"></div></div><div id="toolFormModal" class="card" style="display:none;"><h3>✍️ TOOL</h3><input type="text" id="toolName" placeholder="Name"><input type="number" id="toolPrice" placeholder="Price"><input type="text" id="toolPromoName" placeholder="Promo Name"><input type="number" id="toolPromoPrice" placeholder="Promo Price"><button class="btn" id="saveToolBtn">💀 SAVE</button><button class="btn" id="cancelToolBtn">CANCEL</button><input type="hidden" id="editingToolId"></div></section>
            <section id="section-promos" class="admin-section"><div class="card"><h2>🔥 ACTIVE PROMOTIONS</h2><div id="promoManagerContainer"></div></div></section>
            <section id="section-websites" class="admin-section"><div class="card"><h2>🌐 WEBSITES FOR SALE</h2><button class="btn" id="addWebsiteBtn">➕ ADD WEBSITE</button><div id="websiteTableContainer"></div></div><div id="websiteFormModal" class="card" style="display:none;"><h3>✍️ WEBSITE</h3><input type="text" id="websiteDomain" placeholder="Domain"><input type="text" id="websiteTitle" placeholder="Title"><input type="number" id="websitePrice" placeholder="Price"><button class="btn" id="saveWebsiteBtn">💀 SAVE</button><button class="btn" id="cancelWebsiteBtn">CANCEL</button><input type="hidden" id="editingWebsiteId"></div></section>
            <section id="section-esim" class="admin-section"><div class="card"><h2>📱 eSIM PLANS</h2><button class="btn" id="addEsimBtn">➕ ADD PLAN</button><div id="esimTableContainer"></div></div><div id="esimFormModal" class="card" style="display:none;"><h3>✍️ eSIM PLAN</h3><input type="text" id="esimName" placeholder="Plan Name"><select id="esimDuration"><option>1 month</option><option>3 months</option><option>6 months</option><option>1 year</option></select><input type="number" id="esimPrice" placeholder="Price"><input type="text" id="esimData" placeholder="Data (e.g., 10GB)"><input type="text" id="esimVoice" placeholder="Voice (e.g., Unlimited)"><button class="btn" id="saveEsimBtn">💀 SAVE</button><button class="btn" id="cancelEsimBtn">CANCEL</button><input type="hidden" id="editingEsimId"></div></section>
            <section id="section-logistics" class="admin-section"><div class="card"><h2>📦 LOGISTICS (DELIVERY ORDERS)</h2><button class="btn" id="addLogisticsBtn">➕ CREATE ORDER</button><div id="logisticsTableContainer"></div></div><div id="logisticsFormModal" class="card" style="display:none;"><h3>✍️ DELIVERY ORDER</h3><input type="text" id="logisticsSender" placeholder="Sender"><input type="text" id="logisticsReceiver" placeholder="Receiver"><input type="text" id="logisticsAddress" placeholder="Address (City, Country)"><input type="text" id="logisticsPackage" placeholder="Package"><input type="number" id="logisticsWeight" placeholder="Weight (kg)"><input type="number" id="logisticsPrice" placeholder="Fee (USD)"><select id="logisticsStatus"><option>pending</option><option>in_transit</option><option>delivered</option></select><button class="btn" id="saveLogisticsBtn">💀 SAVE</button><button class="btn" id="cancelLogisticsBtn">CANCEL</button><input type="hidden" id="editingLogisticsId"></div></section>
            <section id="section-virtualnums" class="admin-section"><div class="card"><h2>📞 VIRTUAL NUMBERS FOR SALE</h2><button class="btn" id="addVirtualBtn">➕ ADD NUMBER</button><div id="virtualNumbersContainer"></div></div><div id="virtualFormModal" class="card" style="display:none;"><h3>✍️ VIRTUAL NUMBER</h3><input type="text" id="virtualNumber" placeholder="Phone Number"><input type="text" id="virtualCountry" placeholder="Country"><input type="text" id="virtualService" placeholder="Service (SMS/Voice)"><input type="number" id="virtualPrice" placeholder="Price (USD)"><input type="text" id="virtualPartner" placeholder="Partner Site"><button class="btn" id="saveVirtualBtn">💀 SAVE</button><button class="btn" id="cancelVirtualBtn">CANCEL</button><input type="hidden" id="editingVirtualId"></div></section>
            <section id="section-webrequest" class="admin-section"><div class="card"><h2>🌍 WEB BUILDING REQUESTS</h2><button class="btn" id="addWebRequestBtn">➕ NEW REQUEST</button><div id="webRequestsContainer"></div></div><div id="webRequestFormModal" class="card" style="display:none;"><h3>✍️ WEB REQUEST</h3><input type="text" id="webClientName" placeholder="Client"><input type="email" id="webClientEmail" placeholder="Email"><input type="text" id="webType" placeholder="Type (ecommerce, blog)"><textarea id="webRequirements" placeholder="Requirements" rows="3"></textarea><input type="number" id="webBudget" placeholder="Budget (USD)"><button class="btn" id="saveWebRequestBtn">💀 SAVE</button><button class="btn" id="cancelWebRequestBtn">CANCEL</button><input type="hidden" id="editingWebRequestId"></div></section>
            <section id="section-credform" class="admin-section"><div class="card"><h2>📝 CREDENTIAL FORM BUILDER</h2><button class="btn" id="addCredFormBtn">➕ NEW FORM</button><div id="credFormsContainer"></div></div><div id="credFormModal" class="card" style="display:none;"><h3>✍️ FORM</h3><input type="text" id="formName" placeholder="Form Name"><textarea id="formFields" placeholder='JSON fields: [{"label":"Name","type":"text"}]' rows="4"></textarea><button class="btn" id="saveCredFormBtn">💀 SAVE</button><button class="btn" id="cancelCredFormBtn">CANCEL</button><input type="hidden" id="editingCredFormId"></div></section>
            <section id="section-cloudreq" class="admin-section"><div class="card"><h2>☁️ CLOUD & DOMAIN SETUP REQUESTS</h2><button class="btn" id="addCloudReqBtn">➕ NEW REQUEST</button><div id="cloudRequestsContainer"></div><p style="color:#ff8888;">⚠️ Requests are sent to Telegram Bot (simulated).</p></div><div id="cloudReqFormModal" class="card" style="display:none;"><h3>✍️ CLOUD/DOMAIN REQUEST</h3><input type="text" id="cloudCustomer" placeholder="Customer"><input type="email" id="cloudEmail" placeholder="Email"><select id="cloudServiceType"><option>Domain Registration</option><option>Web Hosting</option><option>VPS / Cloud Server</option><option>SSL Certificate</option></select><input type="text" id="cloudDomain" placeholder="Domain"><textarea id="cloudDetails" placeholder="Details" rows="3"></textarea><button class="btn" id="saveCloudReqBtn">💀 SEND TO TELEGRAM BOT</button><button class="btn" id="cancelCloudReqBtn">CANCEL</button><input type="hidden" id="editingCloudReqId"></div></section>
            <section id="section-visitors" class="admin-section"><div class="card"><h2>🌍 VISITOR LOGS</h2><div id="visitorsTableContainer"></div></div></section>
            <section id="section-blog" class="admin-section"><div class="card"><h2>📜 BLOG POSTS</h2><button class="btn" id="addPostBtn">➕ NEW POST</button><div id="blogPostsContainer"></div></div><div id="postFormModal" class="card" style="display:none;"><h3>✍️ BLOG POST</h3><input type="text" id="postTitle" placeholder="Title"><textarea id="postContent" placeholder="Content (HTML)" rows="8"></textarea><button class="btn" id="savePostBtn">💀 SAVE</button><button class="btn" id="cancelPostBtn">CANCEL</button><input type="hidden" id="editingPostId"></div></section>
        `;

        // Now attach all event listeners after DOM elements exist
        attachAllEventListeners();

        // Render default active section (users)
        renderUsers();
        renderCodes();
        renderPayments();
        renderTools();
        renderPromoManager();
        renderWebsites();
        renderEsim();
        renderLogistics();
        renderVirtualNumbers();
        renderWebRequests();
        renderCredForms();
        renderCloudRequests();
        renderVisitors();
        renderBlog();

        // highlight first nav button as active
        const firstBtn = document.querySelector('.admin-nav-btn');
        if (firstBtn) firstBtn.classList.add('active');
    }

    // --------------------------------------------------------------
    // 4. RENDER FUNCTIONS (all use global get/set)
    // --------------------------------------------------------------
    function renderUsers() {
        const users = get('ghost_users');
        let html = '<table class="admin-table"><tr><th>Email</th><th>Role</th><th>Actions</th></tr>';
        users.forEach(u => {
            html += `<tr><td>${u.email}</td><td>${u.role}</td><td><button class="btn" onclick="window.deleteUser('${u.id}')">💀 DELETE</button> <button class="btn" onclick="window.promoteUser('${u.id}')">👑 MAKE ADMIN</button></td></tr>`;
        });
        html += '</table>';
        document.getElementById('userTableContainer').innerHTML = html;
    }
    window.deleteUser = (id) => { set('ghost_users', get('ghost_users').filter(u => u.id !== id)); renderUsers(); };
    window.promoteUser = (id) => { let users = get('ghost_users'); let idx = users.findIndex(u => u.id === id); if(idx !== -1) { users[idx].role = 'full_admin'; set('ghost_users', users); renderUsers(); } };
    document.getElementById('addUserBtn').addEventListener('click', () => {
        let email = document.getElementById('newUserEmail').value.trim();
        let pass = document.getElementById('newUserPass').value;
        let role = document.getElementById('newUserRole').value;
        if (!email || !pass) return alert('Email and password required');
        let users = get('ghost_users');
        if (users.find(u => u.email === email)) return alert('User exists');
        users.push({ id: Date.now().toString(), email, password: pass, role });
        set('ghost_users', users);
        renderUsers();
        document.getElementById('newUserEmail').value = '';
        document.getElementById('newUserPass').value = '';
    });
    document.getElementById('exportCsvBtn').addEventListener('click', () => {
        let csv = get('ghost_users').map(u => u.email).join('\n');
        let blob = new Blob([csv], {type:'text/csv'});
        let a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'users.csv'; a.click();
    });

    function renderCodes() { let codes = get('ghost_codes'); let html = '<table class="admin-table"><tr><th>Code</th><th>Created</th></tr>'; codes.forEach(c => { html += `<tr><td>${c.code}</td><td>${new Date(c.createdAt).toLocaleString()}</td></tr>`; }); html += '</table>'; document.getElementById('codesTableContainer').innerHTML = html; }
    document.getElementById('generateCodesBtn').addEventListener('click', () => { let codes = get('ghost_codes'); for(let i=0;i<50;i++) codes.push({ code: 'DEATH-'+Math.random().toString(36).substring(2,10).toUpperCase(), createdAt: new Date().toISOString() }); set('ghost_codes', codes); renderCodes(); });

    // Helper to attach all event listeners that are not already attached via inline onclick
    function attachAllEventListeners() {
        // Most listeners are already defined inside the functions above,
        // but we also need to ensure that the save/cancel buttons for each modal have their listeners
        // They are defined in the respective render functions when the modal is created.
        // However, since the modals exist from the start, we attach them here as well (idempotent).
        // (Already done above, but we call them again for safety)
        if (document.getElementById('addUserBtn')) document.getElementById('addUserBtn').onclick = null;
        if (document.getElementById('saveToolBtn')) document.getElementById('saveToolBtn').onclick = null;
        // ... but we already set them in the render calls. To avoid duplication, we rely on the fact that those buttons are static.
        // For dynamic buttons (like edit/delete inside tables), we use window functions.
    }

    // matrix rain effect
    (function() {
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');
        let w, h, drops = [];
        const chars = "💀☠️🔪🩸🔥⚡";
        function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; drops = Array(Math.floor(w/20)).fill(0); }
        function draw() {
            ctx.fillStyle = 'rgba(0,0,0,0.07)'; ctx.fillRect(0,0,w,h);
            ctx.fillStyle = '#aa2a2a'; ctx.font = 'bold 20px monospace';
            for(let i=0; i<drops.length; i++) { ctx.fillText(chars[Math.floor(Math.random()*chars.length)], i*20, drops[i]*22); if(drops[i]*22 > h && Math.random() > 0.98) drops[i] = 0; drops[i]++; }
            requestAnimationFrame(draw);
        }
        window.addEventListener('resize', resize); resize(); draw();
    })();
</script>
