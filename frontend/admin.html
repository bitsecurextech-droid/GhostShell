<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GHOST SHELL • ADMIN (LOCALSTORAGE)</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="https://res.cloudinary.com/dkomucpin/image/upload/v1778394573/BDJEUqx_zqkyuc.png">
    <style>
        .admin-section { display: none; }
        .admin-section.active { display: block; }
        .admin-nav { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
        .admin-nav-btn { background: rgba(20,0,0,0.6); border: 1px solid #330000; color: #999; cursor: pointer; font-family: var(--font-mono); font-size: 0.75rem; padding: 8px 14px; border-radius: 4px; transition: all 0.3s; }
        .admin-nav-btn:hover, .admin-nav-btn.active { border-color: var(--red); color: #fff; box-shadow: 0 0 8px rgba(255,0,0,0.5); background: rgba(255,0,0,0.1); }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 650px; background: #0a0101; border: 2px solid #ff0000; padding: 20px; z-index: 1000; max-height: 90vh; overflow-y: auto; }
        .admin-table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
        .admin-table th, .admin-table td { border: 1px solid #3a1a1a; padding: 8px; text-align: left; }
        .admin-table th { background: #2a0000; color: #ff8888; }
        .flex-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        .card { background: rgba(10,5,5,0.9); border: 1px solid #8a0303; padding: 20px; margin-bottom: 20px; }
        .login-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .login-card {
            background: #0a0000;
            border: 2px solid #8a0303;
            padding: 30px;
            max-width: 400px;
            text-align: center;
        }
        .error-msg { color: #ff5555; margin-top: 10px; }
    </style>
</head>
<body>
<canvas id="matrixCanvas" style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:0; opacity:0.3; pointer-events:none;"></canvas>

<!-- LOGIN MODAL -->
<div id="loginScreen" class="login-container">
    <div class="login-card">
        <img src="https://res.cloudinary.com/dkomucpin/image/upload/v1778394573/BDJEUqx_zqkyuc.png" style="height:60px;">
        <h1 style="color:#ff4444;">ADMIN COMMAND</h1>
        <input type="email" id="loginEmail" placeholder="Admin Email">
        <input type="password" id="loginPassword" placeholder="Password">
        <button class="btn" id="loginBtn" style="width:100%;">AUTHENTICATE</button>
        <div id="loginError" class="error-msg"></div>
        <div style="margin-top:15px; font-size:0.7rem;">Default: admin@ghostshell.com / admin123</div>
    </div>
</div>

<!-- MAIN DASHBOARD -->
<div id="adminDashboard" style="display:none;">
    <header class="header">
        <div class="logo-area"><img src="https://res.cloudinary.com/dkomucpin/image/upload/v1778394573/BDJEUqx_zqkyuc.png" class="logo-img"><span class="site-name">GHOST SHELL</span></div>
        <nav class="nav-links" id="mainNav"></nav>
        <button class="btn" id="themeToggle">🌓</button>
        <button class="btn" id="logoutBtn">EXIT</button>
    </header>

    <div style="padding:20px;">
        <h1 style="color:var(--red);">⚙️ ADMIN COMMAND CENTER (LOCAL)</h1>
        <div class="admin-nav" id="adminNav"></div>
        <div id="sectionsContainer"></div>
    </div>
</div>

<script src="js/matrix.js"></script>
<script>
    // ========== LOCALSTORAGE ADMIN (NO BACKEND NEEDED) ==========
    const STORAGE_KEYS = {
        users: 'ghost_users',
        codes: 'ghost_codes',
        payments: 'ghost_payments',
        tools: 'ghost_tools',
        websites: 'ghost_websites',
        esim: 'ghost_esim',
        logistics: 'ghost_logistics',
        virtualnums: 'ghost_virtualnums',
        webrequests: 'ghost_webrequests',
        credforms: 'ghost_credforms',
        cloudreqs: 'ghost_cloudreqs',
        visitors: 'ghost_visitors',
        blog: 'ghost_blog',
        gifts: 'ghost_gifts'
    };

    // Initialize default data
    function initData() {
        if (!localStorage.getItem(STORAGE_KEYS.users)) {
            localStorage.setItem(STORAGE_KEYS.users, JSON.stringify([
                { id: '1', email: 'admin@ghostshell.com', password: 'admin123', role: 'full_admin', createdAt: new Date().toISOString() }
            ]));
        }
        if (!localStorage.getItem(STORAGE_KEYS.codes)) localStorage.setItem(STORAGE_KEYS.codes, '[]');
        if (!localStorage.getItem(STORAGE_KEYS.payments)) localStorage.setItem(STORAGE_KEYS.payments, '[]');
        if (!localStorage.getItem(STORAGE_KEYS.tools)) localStorage.setItem(STORAGE_KEYS.tools, '[]');
        if (!localStorage.getItem(STORAGE_KEYS.websites)) localStorage.setItem(STORAGE_KEYS.websites, '[]');
        if (!localStorage.getItem(STORAGE_KEYS.esim)) localStorage.setItem(STORAGE_KEYS.esim, '[]');
        if (!localStorage.getItem(STORAGE_KEYS.logistics)) localStorage.setItem(STORAGE_KEYS.logistics, '[]');
        if (!localStorage.getItem(STORAGE_KEYS.virtualnums)) localStorage.setItem(STORAGE_KEYS.virtualnums, '[]');
        if (!localStorage.getItem(STORAGE_KEYS.webrequests)) localStorage.setItem(STORAGE_KEYS.webrequests, '[]');
        if (!localStorage.getItem(STORAGE_KEYS.credforms)) localStorage.setItem(STORAGE_KEYS.credforms, '[]');
        if (!localStorage.getItem(STORAGE_KEYS.cloudreqs)) localStorage.setItem(STORAGE_KEYS.cloudreqs, '[]');
        if (!localStorage.getItem(STORAGE_KEYS.visitors)) localStorage.setItem(STORAGE_KEYS.visitors, JSON.stringify([
            { ip: '127.0.0.1', time: new Date().toISOString(), page: '/admin.html' }
        ]));
        if (!localStorage.getItem(STORAGE_KEYS.blog)) localStorage.setItem(STORAGE_KEYS.blog, '[]');
        if (!localStorage.getItem(STORAGE_KEYS.gifts)) localStorage.setItem(STORAGE_KEYS.gifts, JSON.stringify([
            { id: 'g1', name: '🍕 Pizza Combo', price: 29, description: 'Hot pizza delivered in 45min', imageUrl: 'https://via.placeholder.com/150?text=Pizza' },
            { id: 'g2', name: '💐 Flower Bouquet', price: 45, description: 'Fresh roses, same day delivery', imageUrl: 'https://via.placeholder.com/150?text=Flowers' },
            { id: 'g3', name: '💍 Engagement Ring', price: 199, description: 'Elegant ring with gift box', imageUrl: 'https://via.placeholder.com/150?text=Ring' },
            { id: 'g4', name: '🖼️ Personalized Frame', price: 35, description: 'Custom engraving available', imageUrl: 'https://via.placeholder.com/150?text=Frame' },
            { id: 'g5', name: '🧸 Plush Teddy Bear', price: 25, description: 'Soft, huggable bear', imageUrl: 'https://via.placeholder.com/150?text=Teddy' },
            { id: 'g6', name: '🎁 Custom Gift Basket', price: 75, description: 'Pick your own items', imageUrl: 'https://via.placeholder.com/150?text=Gift' }
        ]));
    }
    initData();

    function get(key) { return JSON.parse(localStorage.getItem(key)); }
    function set(key, val) { localStorage.setItem(key, JSON.stringify(val)); }

    // -------------------- LOGIN (using localStorage) --------------------
    function login(email, password) {
        const users = get(STORAGE_KEYS.users);
        const user = users.find(u => u.email === email && u.password === password && (u.role === 'full_admin' || u.role === 'admin'));
        if (user) {
            localStorage.setItem('adminLocal', JSON.stringify({ email: user.email, role: user.role }));
            return true;
        }
        return false;
    }

    function isLoggedIn() {
        return !!localStorage.getItem('adminLocal');
    }

    function logout() {
        localStorage.removeItem('adminLocal');
        window.location.reload();
    }

    // -------------------- HEADER & THEME --------------------
    function buildHeaderNav() {
        const nav = document.getElementById('mainNav');
        const pages = [
            { name: 'dashboard', label: '⌖ Ops Center', href: 'dashboard.html' },
            { name: 'tools', label: '⚔️ Cyber Tools', href: 'tools.html' },
            { name: 'chat', label: '💬 Secure Comms', href: 'chat.html' },
            { name: 'ai', label: '🧠 AI Assistant', href: 'ai.html' },
            { name: 'marketplace', label: '🛒 Marketplace', href: 'marketplace.html' },
            { name: 'esim', label: '📱 eSIM', href: 'esim-shop.html' },
            { name: 'virtual', label: '📞 Virtual Numbers', href: 'virtual-numbers.html' },
            { name: 'logistics', label: '📦 Logistics', href: 'logistics-tracking.html' },
            { name: 'blog', label: '💀 Blog', href: 'blog.html' },
            { name: 'admin', label: '⚙️ Admin', href: 'admin.html' }
        ];
        nav.innerHTML = '';
        pages.forEach(p => {
            const btn = document.createElement('button');
            btn.className = 'nav-link' + (p.name === 'admin' ? ' active' : '');
            btn.textContent = p.label;
            btn.addEventListener('click', () => window.location.href = p.href);
            nav.appendChild(btn);
        });
    }

    function initThemeToggle() {
        const themeBtn = document.getElementById('themeToggle');
        if (localStorage.getItem('theme') === 'light') document.body.classList.add('light');
        themeBtn.addEventListener('click', () => {
            document.body.classList.toggle('light');
            themeBtn.textContent = document.body.classList.contains('light') ? '☀️' : '🌓';
            localStorage.setItem('theme', document.body.classList.contains('light') ? 'light' : 'dark');
        });
    }

    document.getElementById('logoutBtn')?.addEventListener('click', logout);

    function showDashboard() {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('adminDashboard').style.display = 'block';
        buildHeaderNav();
        initThemeToggle();
        buildAdminUI();
    }

    // -------------------- BUILD ADMIN UI (CRUD) --------------------
    function buildAdminUI() {
        const sections = ['users', 'codes', 'payments', 'tools', 'websites', 'esim', 'logistics', 'virtualnums', 'webrequest', 'credform', 'cloudreq', 'gifts', 'visitors', 'blog'];
        const labels = {
            users:'👥 Users', codes:'🔑 Codes', payments:'💸 Payments', tools:'🔧 Tools',
            websites:'🌐 Websites', esim:'📱 eSIM', logistics:'📦 Logistics', virtualnums:'📞 Virtual Numbers',
            webrequest:'🌍 Web Req', credform:'📝 Cred Forms', cloudreq:'☁️ Cloud/Domain',
            gifts:'🎁 Gifts', visitors:'🌍 Visitors', blog:'📝 Blog'
        };
        const adminNav = document.getElementById('adminNav');
        adminNav.innerHTML = '';
        sections.forEach(sec => {
            const btn = document.createElement('button');
            btn.className = 'admin-nav-btn';
            btn.textContent = labels[sec];
            btn.dataset.section = sec;
            btn.addEventListener('click', () => {
                document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
                document.getElementById(`section-${sec}`).classList.add('active');
                document.querySelectorAll('.admin-nav-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                refreshSection(sec);
            });
            adminNav.appendChild(btn);
        });

        const container = document.getElementById('sectionsContainer');
        container.innerHTML = `
            <div id="section-users" class="admin-section active"><div class="card"><h2>👥 Users</h2><div id="usersTable"></div><button class="btn" id="addUserBtn">+ Add User</button></div></div>
            <div id="section-codes" class="admin-section"><div class="card"><h2>🔑 Access Codes</h2><button class="btn" id="genCodesBtn">Generate 50 Codes</button><div id="codesTable"></div></div></div>
            <div id="section-payments" class="admin-section"><div class="card"><h2>💸 Payments</h2><div id="paymentsTable"></div><button class="btn" id="addPaymentBtn">+ Mock Payment</button></div></div>
            <div id="section-tools" class="admin-section"><div class="card"><h2>🔧 Tools</h2><button class="btn" id="addToolBtn">+ Add Tool</button><div id="toolsTable"></div></div><div id="toolModal" class="modal"><h3>Tool</h3><input id="toolName" placeholder="Name"><input id="toolPrice" type="number" placeholder="Price"><input id="toolDiscount" type="number" placeholder="Discount %"><input id="toolDownload" placeholder="Download URL"><button class="btn" id="saveToolBtn">Save</button><button class="btn" id="cancelToolBtn">Cancel</button><input type="hidden" id="editingToolId"></div></div>
            <div id="section-websites" class="admin-section"><div class="card"><h2>🌐 Websites</h2><button class="btn" id="addWebsiteBtn">+ Add</button><div id="websitesTable"></div></div><div id="websiteModal" class="modal"><h3>Website</h3><input id="websiteDomain" placeholder="Domain"><input id="websiteTitle" placeholder="Title"><input id="websitePrice" type="number" placeholder="Price"><button class="btn" id="saveWebsiteBtn">Save</button><button class="btn" id="cancelWebsiteBtn">Cancel</button><input type="hidden" id="editingWebsiteId"></div></div>
            <div id="section-esim" class="admin-section"><div class="card"><h2>📱 eSIM Plans</h2><button class="btn" id="addEsimBtn">+ Add</button><div id="esimTable"></div></div><div id="esimModal" class="modal"><h3>eSIM Plan</h3><input id="esimName" placeholder="Name"><select id="esimDuration"><option>1 month</option><option>3 months</option><option>6 months</option><option>1 year</option></select><input id="esimPrice" type="number" placeholder="Price"><input id="esimData" placeholder="Data"><input id="esimVoice" placeholder="Voice"><button class="btn" id="saveEsimBtn">Save</button><button class="btn" id="cancelEsimBtn">Cancel</button><input type="hidden" id="editingEsimId"></div></div>
            <div id="section-logistics" class="admin-section"><div class="card"><h2>📦 Logistics</h2><button class="btn" id="addLogisticsBtn">+ Add Order</button><div id="logisticsTable"></div></div><div id="logisticsModal" class="modal"><h3>Order</h3><input id="logSender" placeholder="Sender"><input id="logReceiver" placeholder="Receiver"><input id="logAddress" placeholder="Address"><input id="logPackage" placeholder="Package"><input id="logWeight" type="number" placeholder="Weight (kg)"><input id="logPrice" type="number" placeholder="Price"><select id="logStatus"><option>pending</option><option>in_transit</option><option>delivered</option></select><button class="btn" id="saveLogisticsBtn">Save</button><button class="btn" id="cancelLogisticsBtn">Cancel</button><input type="hidden" id="editingLogisticsId"></div></div>
            <div id="section-virtualnums" class="admin-section"><div class="card"><h2>📞 Virtual Numbers</h2><button class="btn" id="addVirtualBtn">+ Add</button><div id="virtualTable"></div></div><div id="virtualModal" class="modal"><h3>Virtual Number</h3><input id="virtualNumber" placeholder="Number"><input id="virtualCountry" placeholder="Country"><input id="virtualService" placeholder="Service"><input id="virtualPrice" type="number" placeholder="Price"><input id="virtualPartner" placeholder="Partner"><button class="btn" id="saveVirtualBtn">Save</button><button class="btn" id="cancelVirtualBtn">Cancel</button><input type="hidden" id="editingVirtualId"></div></div>
            <div id="section-webrequest" class="admin-section"><div class="card"><h2>🌍 Web Requests</h2><button class="btn" id="addWebReqBtn">+ Add</button><div id="webReqsTable"></div></div><div id="webReqModal" class="modal"><h3>Request</h3><input id="webClient" placeholder="Client"><input id="webEmail" placeholder="Email"><input id="webType" placeholder="Type"><textarea id="webReqs" rows="3" placeholder="Requirements"></textarea><input id="webBudget" type="number" placeholder="Budget"><button class="btn" id="saveWebReqBtn">Save</button><button class="btn" id="cancelWebReqBtn">Cancel</button><input type="hidden" id="editingWebReqId"></div></div>
            <div id="section-credform" class="admin-section"><div class="card"><h2>📝 Cred Forms</h2><button class="btn" id="addCredFormBtn">+ Add</button><div id="credFormsTable"></div></div><div id="credFormModal" class="modal"><h3>Form</h3><input id="formName" placeholder="Name"><textarea id="formFields" rows="4" placeholder='[{"label":"Name","type":"text"}]'></textarea><button class="btn" id="saveCredFormBtn">Save</button><button class="btn" id="cancelCredFormBtn">Cancel</button><input type="hidden" id="editingCredFormId"></div></div>
            <div id="section-cloudreq" class="admin-section"><div class="card"><h2>☁️ Cloud/Domain Reqs</h2><button class="btn" id="addCloudReqBtn">+ Add</button><div id="cloudReqsTable"></div></div><div id="cloudReqModal" class="modal"><h3>Request</h3><input id="cloudCustomer" placeholder="Customer"><input id="cloudEmail" placeholder="Email"><select id="cloudService"><option>Domain</option><option>Hosting</option><option>VPS</option><option>SSL</option></select><input id="cloudDomain" placeholder="Domain"><textarea id="cloudDetails" rows="3"></textarea><button class="btn" id="saveCloudReqBtn">Save</button><button class="btn" id="cancelCloudReqBtn">Cancel</button><input type="hidden" id="editingCloudReqId"></div></div>
            <div id="section-gifts" class="admin-section"><div class="card"><h2>🎁 Gifts (for Logistics Store)</h2><button class="btn" id="addGiftBtn">+ Add Gift</button><div id="giftsTable"></div></div><div id="giftModal" class="modal"><h3>Gift</h3><input id="giftName" placeholder="Name"><textarea id="giftDesc" rows="2" placeholder="Description"></textarea><input id="giftPrice" type="number" placeholder="Price"><input id="giftImageUrl" placeholder="Image URL"><button class="btn" id="saveGiftBtn">Save</button><button class="btn" id="cancelGiftBtn">Cancel</button><input type="hidden" id="editingGiftId"></div></div>
            <div id="section-visitors" class="admin-section"><div class="card"><h2>🌍 Visitors</h2><div id="visitorsTable"></div></div></div>
            <div id="section-blog" class="admin-section"><div class="card"><h2>📝 Blog Posts</h2><button class="btn" id="addPostBtn">+ Add</button><div id="blogTable"></div></div><div id="blogModal" class="modal"><h3>Post</h3><input id="postTitle" placeholder="Title"><textarea id="postContent" rows="8" placeholder="HTML content"></textarea><button class="btn" id="savePostBtn">Save</button><button class="btn" id="cancelPostBtn">Cancel</button><input type="hidden" id="editingPostId"></div></div>
        `;

        attachModalListeners();
        refreshSection('users');
        const firstTab = document.querySelector('.admin-nav-btn');
        if (firstTab) firstTab.classList.add('active');
    }

    function refreshSection(section) {
        if (section === 'users') renderUsers();
        if (section === 'codes') renderCodes();
        if (section === 'payments') renderPayments();
        if (section === 'tools') renderTools();
        if (section === 'websites') renderWebsites();
        if (section === 'esim') renderEsim();
        if (section === 'logistics') renderLogistics();
        if (section === 'virtualnums') renderVirtual();
        if (section === 'webrequest') renderWebReqs();
        if (section === 'credform') renderCredForms();
        if (section === 'cloudreq') renderCloudReqs();
        if (section === 'gifts') renderGifts();
        if (section === 'visitors') renderVisitors();
        if (section === 'blog') renderBlog();
    }

    // -------------------- RENDER FUNCTIONS (all localStorage) --------------------
    function renderUsers() {
        let users = get(STORAGE_KEYS.users);
        let html = '<table class="admin-table"><thead><tr><th>Email</th><th>Role</th><th>Actions</th></tr></thead><tbody>';
        users.forEach(u => {
            html += `<tr>
                        <td>${u.email}</td>
                        <td>${u.role}</td>
                        <td><button class="btn" onclick="deleteUser('${u.id}')">Delete</button> <button class="btn" onclick="promoteUser('${u.id}')">Promote</button></td>
                    </tr>`;
        });
        html += '</tbody></table>';
        document.getElementById('usersTable').innerHTML = html;
    }
    window.deleteUser = (id) => { let users = get(STORAGE_KEYS.users).filter(u => u.id !== id); set(STORAGE_KEYS.users, users); renderUsers(); };
    window.promoteUser = (id) => { let users = get(STORAGE_KEYS.users); let idx = users.findIndex(u => u.id === id); if(idx!==-1) users[idx].role = 'full_admin'; set(STORAGE_KEYS.users, users); renderUsers(); };
    document.getElementById('addUserBtn')?.addEventListener('click', () => {
        let email = prompt('Email:'); if(!email) return;
        let password = prompt('Password:');
        let users = get(STORAGE_KEYS.users);
        users.push({ id: Date.now().toString(), email, password, role: 'user', createdAt: new Date().toISOString() });
        set(STORAGE_KEYS.users, users);
        renderUsers();
    });

    function renderCodes() {
        let codes = get(STORAGE_KEYS.codes);
        let html = '<table class="admin-table"><thead><tr><th>Code</th><th>Created</th><th>Action</th></tr></thead><tbody>';
        codes.forEach(c => {
            html += `<tr>
                        <td>${c.code}</td>
                        <td>${new Date(c.createdAt).toLocaleString()}</td>
                        <td><button class="btn" onclick="revokeCode('${c.code}')">Revoke</button></td>
                    </tr>`;
        });
        html += '</tbody></td>';
        document.getElementById('codesTable').innerHTML = html;
    }
    window.revokeCode = (code) => { let codes = get(STORAGE_KEYS.codes).filter(c => c.code !== code); set(STORAGE_KEYS.codes, codes); renderCodes(); };
    document.getElementById('genCodesBtn')?.addEventListener('click', () => {
        let codes = get(STORAGE_KEYS.codes);
        for(let i=0; i<50; i++) codes.push({ code: 'GHOST-' + Math.random().toString(36).substring(2,10).toUpperCase(), createdAt: new Date().toISOString() });
        set(STORAGE_KEYS.codes, codes);
        renderCodes();
    });

    function renderPayments() {
        let payments = get(STORAGE_KEYS.payments);
        let html = '<table class="admin-table"><thead><tr><th>User</th><th>Amount</th><th>Status</th><th>Action</th></tr></thead><tbody>';
        payments.forEach(p => {
            html += `<tr>
                        <td>${p.userId}</td>
                        <td>$${p.amount}</td>
                        <td>${p.status}</td>
                        <td><button class="btn" onclick="approvePayment('${p.id}')">Approve</button> <button class="btn" onclick="deletePayment('${p.id}')">Delete</button></td>
                    </tr>`;
        });
        html += '</tbody></td>';
        document.getElementById('paymentsTable').innerHTML = html;
    }
    window.approvePayment = (id) => { let payments = get(STORAGE_KEYS.payments); let idx = payments.findIndex(p=>p.id===id); if(idx!==-1) payments[idx].status = 'approved'; set(STORAGE_KEYS.payments, payments); renderPayments(); };
    window.deletePayment = (id) => { let payments = get(STORAGE_KEYS.payments).filter(p=>p.id!==id); set(STORAGE_KEYS.payments, payments); renderPayments(); };
    document.getElementById('addPaymentBtn')?.addEventListener('click', () => {
        let payments = get(STORAGE_KEYS.payments);
        payments.push({ id: Date.now().toString(), userId: 'guest', amount: 99, status: 'pending' });
        set(STORAGE_KEYS.payments, payments);
        renderPayments();
    });

    function renderTools() {
        let tools = get(STORAGE_KEYS.tools);
        let html = '<table class="admin-table"><thead><tr><th>Name</th><th>Price</th><th>Actions</th></tr></thead><tbody>';
        tools.forEach(t => {
            html += `<tr>
                        <td>${t.name}</td>
                        <td>$${t.price}</td>
                        <td><button class="btn" onclick="editTool('${t.id}')">Edit</button> <button class="btn" onclick="deleteTool('${t.id}')">Delete</button></td>
                    </tr>`;
        });
        html += '</tbody><tr>';
        document.getElementById('toolsTable').innerHTML = html;
    }
    window.editTool = (id) => {
        let tools = get(STORAGE_KEYS.tools);
        let t = tools.find(t=>t.id===id);
        if(t){
            document.getElementById('toolName').value = t.name;
            document.getElementById('toolPrice').value = t.price;
            document.getElementById('toolDiscount').value = t.discount || 0;
            document.getElementById('toolDownload').value = t.download || '';
            document.getElementById('editingToolId').value = id;
            document.getElementById('toolModal').style.display = 'block';
        }
    };
    window.deleteTool = (id) => { let tools = get(STORAGE_KEYS.tools).filter(t=>t.id!==id); set(STORAGE_KEYS.tools, tools); renderTools(); };
    document.getElementById('addToolBtn')?.addEventListener('click', () => {
        document.getElementById('toolModal').style.display = 'block';
        document.getElementById('editingToolId').value = '';
        document.getElementById('toolName').value = '';
        document.getElementById('toolPrice').value = '';
        document.getElementById('toolDiscount').value = '';
        document.getElementById('toolDownload').value = '';
    });
    document.getElementById('saveToolBtn')?.addEventListener('click', () => {
        let id = document.getElementById('editingToolId').value;
        let data = {
            name: document.getElementById('toolName').value,
            price: parseFloat(document.getElementById('toolPrice').value),
            discount: parseInt(document.getElementById('toolDiscount').value)||0,
            download: document.getElementById('toolDownload').value
        };
        if(!data.name) return alert('Name required');
        let tools = get(STORAGE_KEYS.tools);
        if(id){
            let idx = tools.findIndex(t=>t.id===id);
            if(idx!==-1) tools[idx] = {...tools[idx], ...data};
        } else {
            data.id = Date.now().toString();
            tools.push(data);
        }
        set(STORAGE_KEYS.tools, tools);
        document.getElementById('toolModal').style.display = 'none';
        renderTools();
    });
    document.getElementById('cancelToolBtn')?.addEventListener('click', () => document.getElementById('toolModal').style.display = 'none');

    // Generic CRUD for other sections (websites, esim, logistics, virtualnums, webrequests, credforms, cloudreqs, gifts, blog)
    function createCRUD(storageKey, renderFn, modalId, fieldMapping, idField) {
        window[`edit_${storageKey}`] = (id) => {
            let items = get(storageKey);
            let item = items.find(i=>i.id===id);
            if(item){
                for(let [fieldId, prop] of Object.entries(fieldMapping)){
                    let el = document.getElementById(fieldId);
                    if(el) el.value = item[prop] !== undefined ? item[prop] : '';
                }
                document.getElementById(idField).value = id;
                document.getElementById(modalId).style.display = 'block';
            }
        };
        window[`delete_${storageKey}`] = (id) => { set(storageKey, get(storageKey).filter(i=>i.id!==id)); renderFn(); };
        document.getElementById(`add${modalId.replace('Modal','')}Btn`)?.addEventListener('click', () => {
            for(let [fieldId] of Object.entries(fieldMapping)) document.getElementById(fieldId).value = '';
            document.getElementById(idField).value = '';
            document.getElementById(modalId).style.display = 'block';
        });
        document.getElementById(`save${modalId.replace('Modal','')}Btn`)?.addEventListener('click', () => {
            let id = document.getElementById(idField).value;
            let data = {};
            for(let [fieldId, prop] of Object.entries(fieldMapping)){
                let val = document.getElementById(fieldId).value;
                if(prop === 'price' || prop === 'budget' || prop === 'weight') val = parseFloat(val) || 0;
                data[prop] = val;
            }
            if(!data.name && !data.domain && !data.number && !data.client && !data.customer && !data.title) return alert('Please fill required fields');
            let items = get(storageKey);
            if(id){
                let idx = items.findIndex(i=>i.id===id);
                if(idx!==-1) items[idx] = {...items[idx], ...data};
            } else {
                data.id = Date.now().toString();
                items.push(data);
            }
            set(storageKey, items);
            document.getElementById(modalId).style.display = 'none';
            renderFn();
        });
        document.getElementById(`cancel${modalId.replace('Modal','')}Btn`)?.addEventListener('click', () => document.getElementById(modalId).style.display = 'none');
    }

    function attachModalListeners() {
        const themeBtn = document.getElementById('themeToggle');
        if (localStorage.getItem('theme') === 'light') document.body.classList.add('light');
        themeBtn.addEventListener('click', () => {
            document.body.classList.toggle('light');
            themeBtn.textContent = document.body.classList.contains('light') ? '☀️' : '🌓';
            localStorage.setItem('theme', document.body.classList.contains('light') ? 'light' : 'dark');
        });
        document.getElementById('logoutBtn')?.addEventListener('click', logout);
    }

    // -------------------- LOGIN HANDLER --------------------
    document.getElementById('loginBtn').addEventListener('click', () => {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        if (login(email, password)) {
            showDashboard();
        } else {
            document.getElementById('loginError').innerText = '❌ Invalid credentials';
        }
    });

    // Auto-show dashboard if already logged in
    if (isLoggedIn()) {
        showDashboard();
    }
