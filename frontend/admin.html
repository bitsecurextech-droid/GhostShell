<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GHOST SHELL • ADMIN (FULLY WORKING)</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="https://res.cloudinary.com/dkomucpin/image/upload/v1778394573/BDJEUqx_zqkyuc.png">
    <style>
        * { box-sizing: border-box; }
        body { background: radial-gradient(circle at 20% 30%, #0a0000, #000000); font-family: 'Courier New', monospace; color: #ccc; margin:0; padding:0; }
        .admin-wrapper { max-width: 1400px; margin: 0 auto; padding: 20px; position: relative; z-index: 10; }
        .header { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.8); border-bottom: 2px solid #8a0303; padding: 15px 20px; margin-bottom: 30px; }
        .logo-area { display: flex; align-items: center; gap: 15px; }
        .logo-img { height: 45px; filter: drop-shadow(0 0 5px red); }
        .site-name { font-size: 1.6rem; color: #c0392b; text-shadow: 0 0 8px #ff0000; }
        .btn { background: #1a0000; border: 1px solid #8a0303; color: #ff6666; padding: 6px 14px; cursor: pointer; font-family: monospace; font-weight: bold; margin: 4px; }
        .btn:hover { background: #5e0000; color: white; box-shadow: 0 0 10px red; }
        .admin-tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid #3a1a1a; padding-bottom: 8px; }
        .tab-btn { background: #0a0000; border: 1px solid #5a1a1a; color: #aa5555; padding: 8px 16px; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: #4a0000; color: white; border-color: #ff4444; box-shadow: 0 0 8px red; }
        .card { background: rgba(10,5,5,0.9); border: 1px solid #8a0303; padding: 20px; margin-bottom: 25px; }
        .card h2 { color: #ff6666; margin-bottom: 15px; }
        input, select, textarea { background: #1a0a0a; border: 1px solid #8a0303; color: #ff9999; padding: 8px; width: 100%; margin: 6px 0; font-family: monospace; }
        .admin-table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
        .admin-table th, .admin-table td { border: 1px solid #3a1a1a; padding: 8px; text-align: left; }
        .admin-table th { background: #2a0000; color: #ff8888; }
        .flex-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
        .section { display: none; }
        .section.active { display: block; }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 650px; background: #0a0101; border: 2px solid #ff0000; padding: 20px; z-index: 1000; max-height: 90vh; overflow-y: auto; }
        .modal-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); z-index: 999; }
        #matrixCanvas { position: fixed; top:0; left:0; width:100%; height:100%; z-index:0; opacity:0.3; pointer-events:none; }
        .login-container { position: fixed; top:0; left:0; width:100%; height:100%; background: black; display: flex; justify-content: center; align-items: center; z-index: 2000; }
        .login-card { background: #0a0000; border: 2px solid #8a0303; padding: 30px; max-width: 400px; text-align: center; }
        .error-msg { color: #ff5555; margin-top: 10px; }
    </style>
</head>
<body>
<canvas id="matrixCanvas"></canvas>

<!-- LOGIN SCREEN -->
<div id="loginScreen" class="login-container">
    <div class="login-card">
        <img src="https://res.cloudinary.com/dkomucpin/image/upload/v1778394573/BDJEUqx_zqkyuc.png" style="height:60px;">
        <h1 style="color:#ff4444;">ADMIN COMMAND</h1>
        <input type="email" id="loginEmail" placeholder="Admin Email">
        <input type="password" id="loginPassword" placeholder="Password">
        <button class="btn" id="loginBtn" style="width:100%;">AUTHENTICATE</button>
        <div id="loginError" class="error-msg"></div>
        <div style="margin-top:10px; font-size:0.7rem;">Default: admin@ghostshell.com / admin123</div>
    </div>
</div>

<!-- MAIN DASHBOARD -->
<div id="adminDashboard" style="display:none;">
    <div class="admin-wrapper">
        <div class="header">
            <div class="logo-area"><img src="https://res.cloudinary.com/dkomucpin/image/upload/v1778394573/BDJEUqx_zqkyuc.png" class="logo-img"><span class="site-name">GHOST SHELL • ADMIN</span></div>
            <div><button class="btn" id="themeToggle">🌓</button><button class="btn" id="logoutBtn">EXIT</button></div>
        </div>
        <div class="admin-tabs" id="adminTabs"></div>
        <div id="sectionsContainer"></div>
    </div>
</div>

<script>
    // ========== LOCALSTORAGE INIT ==========
    function initData() {
        if (!localStorage.getItem('ghost_users')) {
            localStorage.setItem('ghost_users', JSON.stringify([
                { id: '1', email: 'admin@ghostshell.com', password: 'admin123', role: 'full_admin' }
            ]));
        }
        if (!localStorage.getItem('ghost_codes')) localStorage.setItem('ghost_codes', '[]');
        if (!localStorage.getItem('ghost_payments')) localStorage.setItem('ghost_payments', '[]');
        if (!localStorage.getItem('ghost_tools')) localStorage.setItem('ghost_tools', '[]');
        if (!localStorage.getItem('ghost_websites')) localStorage.setItem('ghost_websites', '[]');
        if (!localStorage.getItem('ghost_esim')) localStorage.setItem('ghost_esim', '[]');
        if (!localStorage.getItem('ghost_logistics')) localStorage.setItem('ghost_logistics', '[]');
        if (!localStorage.getItem('ghost_virtualnums')) localStorage.setItem('ghost_virtualnums', '[]');
        if (!localStorage.getItem('ghost_webrequests')) localStorage.setItem('ghost_webrequests', '[]');
        if (!localStorage.getItem('ghost_credforms')) localStorage.setItem('ghost_credforms', '[]');
        if (!localStorage.getItem('ghost_cloudreqs')) localStorage.setItem('ghost_cloudreqs', '[]');
        if (!localStorage.getItem('ghost_visitors')) localStorage.setItem('ghost_visitors', JSON.stringify([
            { ip: '127.0.0.1', time: new Date().toISOString(), page: '/admin.html' }
        ]));
        if (!localStorage.getItem('ghost_blog')) localStorage.setItem('ghost_blog', '[]');
    }
    initData();

    const get = (k) => JSON.parse(localStorage.getItem(k));
    const set = (k, v) => localStorage.setItem(k, JSON.stringify(v));

    // ========== LOGIN ==========
    const loginScreen = document.getElementById('loginScreen');
    const dashboard = document.getElementById('adminDashboard');
    document.getElementById('loginBtn').addEventListener('click', () => {
        const email = document.getElementById('loginEmail').value.trim();
        const pwd = document.getElementById('loginPassword').value;
        const user = get('ghost_users').find(u => u.email === email && u.password === pwd && (u.role === 'full_admin' || u.role === 'admin'));
        if (user) {
            loginScreen.style.display = 'none';
            dashboard.style.display = 'block';
            buildAdminUI();
        } else {
            document.getElementById('loginError').innerText = '❌ Invalid credentials';
        }
    });
    document.getElementById('logoutBtn').addEventListener('click', () => window.location.reload());

    // ========== BUILD UI ==========
    function buildAdminUI() {
        const sections = [
            'users','codes','payments','tools','websites','esim','logistics','virtualnums',
            'webrequest','credform','cloudreq','visitors','blog'
        ];
        const labels = {
            users:'👥 Users', codes:'🔑 Codes', payments:'💸 Payments', tools:'🔧 Tools',
            websites:'🌐 Websites', esim:'📱 eSIM', logistics:'📦 Logistics', virtualnums:'📞 Virtual Numbers',
            webrequest:'🌍 Web Req', credform:'📝 Cred Forms', cloudreq:'☁️ Cloud/Domain',
            visitors:'🌍 Visitors', blog:'📝 Blog'
        };
        const tabsContainer = document.getElementById('adminTabs');
        tabsContainer.innerHTML = '';
        sections.forEach(sec => {
            const btn = document.createElement('button');
            btn.className = 'tab-btn';
            btn.textContent = labels[sec];
            btn.dataset.section = sec;
            btn.addEventListener('click', () => {
                document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
                document.getElementById(`section-${sec}`).classList.add('active');
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                refreshSection(sec);
            });
            tabsContainer.appendChild(btn);
        });

        // Create sections HTML (modals included)
        const container = document.getElementById('sectionsContainer');
        container.innerHTML = `
            <!-- USERS -->
            <div id="section-users" class="section active"><div class="card"><h2>👥 Users</h2><div id="usersTable"></div><button class="btn" id="addUserBtn">+ Add User</button></div></div>
            <!-- CODES -->
            <div id="section-codes" class="section"><div class="card"><h2>🔑 Access Codes</h2><button class="btn" id="genCodesBtn">Generate 50 Codes</button><div id="codesTable"></div></div></div>
            <!-- PAYMENTS -->
            <div id="section-payments" class="section"><div class="card"><h2>💸 Payments</h2><div id="paymentsTable"></div><button class="btn" id="addPaymentBtn">+ Mock Payment</button></div></div>
            <!-- TOOLS -->
            <div id="section-tools" class="section"><div class="card"><h2>🔧 Tools</h2><button class="btn" id="addToolBtn">+ Add Tool</button><div id="toolsTable"></div></div>
            <div id="toolModal" class="modal"><h3>Tool</h3><input id="toolName" placeholder="Name"><input id="toolPrice" type="number" placeholder="Price"><input id="toolDiscount" type="number" placeholder="Discount %"><input id="toolDownload" placeholder="Download URL"><button class="btn" id="saveToolBtn">Save</button><button class="btn" id="cancelToolBtn">Cancel</button><input type="hidden" id="editingToolId"></div></div>
            <!-- WEBSITES -->
            <div id="section-websites" class="section"><div class="card"><h2>🌐 Websites</h2><button class="btn" id="addWebsiteBtn">+ Add</button><div id="websitesTable"></div></div>
            <div id="websiteModal" class="modal"><h3>Website</h3><input id="websiteDomain" placeholder="Domain"><input id="websiteTitle" placeholder="Title"><input id="websitePrice" type="number" placeholder="Price"><button class="btn" id="saveWebsiteBtn">Save</button><button class="btn" id="cancelWebsiteBtn">Cancel</button><input type="hidden" id="editingWebsiteId"></div></div>
            <!-- eSIM -->
            <div id="section-esim" class="section"><div class="card"><h2>📱 eSIM Plans</h2><button class="btn" id="addEsimBtn">+ Add</button><div id="esimTable"></div></div>
            <div id="esimModal" class="modal"><h3>eSIM Plan</h3><input id="esimName" placeholder="Name"><select id="esimDuration"><option>1 month</option><option>3 months</option><option>6 months</option><option>1 year</option></select><input id="esimPrice" type="number" placeholder="Price"><input id="esimData" placeholder="Data"><input id="esimVoice" placeholder="Voice"><button class="btn" id="saveEsimBtn">Save</button><button class="btn" id="cancelEsimBtn">Cancel</button><input type="hidden" id="editingEsimId"></div></div>
            <!-- LOGISTICS -->
            <div id="section-logistics" class="section"><div class="card"><h2>📦 Logistics</h2><button class="btn" id="addLogisticsBtn">+ Add Order</button><div id="logisticsTable"></div></div>
            <div id="logisticsModal" class="modal"><h3>Order</h3><input id="logSender" placeholder="Sender"><input id="logReceiver" placeholder="Receiver"><input id="logAddress" placeholder="Address"><input id="logPackage" placeholder="Package"><input id="logWeight" type="number" placeholder="Weight (kg)"><input id="logPrice" type="number" placeholder="Price"><select id="logStatus"><option>pending</option><option>in_transit</option><option>delivered</option></select><button class="btn" id="saveLogisticsBtn">Save</button><button class="btn" id="cancelLogisticsBtn">Cancel</button><input type="hidden" id="editingLogisticsId"></div></div>
            <!-- VIRTUAL NUMBERS -->
            <div id="section-virtualnums" class="section"><div class="card"><h2>📞 Virtual Numbers</h2><button class="btn" id="addVirtualBtn">+ Add</button><div id="virtualTable"></div></div>
            <div id="virtualModal" class="modal"><h3>Virtual Number</h3><input id="virtualNumber" placeholder="Number"><input id="virtualCountry" placeholder="Country"><input id="virtualService" placeholder="Service"><input id="virtualPrice" type="number" placeholder="Price"><input id="virtualPartner" placeholder="Partner"><button class="btn" id="saveVirtualBtn">Save</button><button class="btn" id="cancelVirtualBtn">Cancel</button><input type="hidden" id="editingVirtualId"></div></div>
            <!-- WEB REQUESTS -->
            <div id="section-webrequest" class="section"><div class="card"><h2>🌍 Web Requests</h2><button class="btn" id="addWebReqBtn">+ Add</button><div id="webReqsTable"></div></div>
            <div id="webReqModal" class="modal"><h3>Request</h3><input id="webClient" placeholder="Client"><input id="webEmail" placeholder="Email"><input id="webType" placeholder="Type"><textarea id="webReqs" rows="3" placeholder="Requirements"></textarea><input id="webBudget" type="number" placeholder="Budget"><button class="btn" id="saveWebReqBtn">Save</button><button class="btn" id="cancelWebReqBtn">Cancel</button><input type="hidden" id="editingWebReqId"></div></div>
            <!-- CRED FORMS -->
            <div id="section-credform" class="section"><div class="card"><h2>📝 Cred Forms</h2><button class="btn" id="addCredFormBtn">+ Add</button><div id="credFormsTable"></div></div>
            <div id="credFormModal" class="modal"><h3>Form</h3><input id="formName" placeholder="Name"><textarea id="formFields" rows="4" placeholder='[{"label":"Name","type":"text"}]'></textarea><button class="btn" id="saveCredFormBtn">Save</button><button class="btn" id="cancelCredFormBtn">Cancel</button><input type="hidden" id="editingCredFormId"></div></div>
            <!-- CLOUD REQUESTS -->
            <div id="section-cloudreq" class="section"><div class="card"><h2>☁️ Cloud/Domain Reqs</h2><button class="btn" id="addCloudReqBtn">+ Add</button><div id="cloudReqsTable"></div></div>
            <div id="cloudReqModal" class="modal"><h3>Request</h3><input id="cloudCustomer" placeholder="Customer"><input id="cloudEmail" placeholder="Email"><select id="cloudService"><option>Domain</option><option>Hosting</option><option>VPS</option><option>SSL</option></select><input id="cloudDomain" placeholder="Domain"><textarea id="cloudDetails" rows="3"></textarea><button class="btn" id="saveCloudReqBtn">Save & Simulate Telegram</button><button class="btn" id="cancelCloudReqBtn">Cancel</button><input type="hidden" id="editingCloudReqId"></div></div>
            <!-- VISITORS -->
            <div id="section-visitors" class="section"><div class="card"><h2>🌍 Visitors</h2><div id="visitorsTable"></div></div></div>
            <!-- BLOG -->
            <div id="section-blog" class="section"><div class="card"><h2>📝 Blog Posts</h2><button class="btn" id="addPostBtn">+ Add</button><div id="blogTable"></div></div>
            <div id="blogModal" class="modal"><h3>Post</h3><input id="postTitle" placeholder="Title"><textarea id="postContent" rows="8" placeholder="HTML content"></textarea><button class="btn" id="savePostBtn">Save</button><button class="btn" id="cancelPostBtn">Cancel</button><input type="hidden" id="editingPostId"></div></div>
        `;

        // Attach all event listeners after HTML is in the DOM
        attachAllEventListeners();
        // Initial render of active section (users)
        refreshSection('users');
        // Activate first tab
        const firstTab = document.querySelector('.tab-btn');
        if (firstTab) firstTab.classList.add('active');
    }

    function refreshSection(section) {
        if (section === 'users') renderUsers();
        if (section === 'codes') renderCodes();
        if (section === 'payments') renderPayments();
        if (section === 'tools') renderTools();
        if (section === 'websites') renderWebsites();
        if (section === 'esim') renderEsim();
        if (section === 'logistics') renderLogistics();
        if (section === 'virtualnums') renderVirtual();
        if (section === 'webrequest') renderWebReqs();
        if (section === 'credform') renderCredForms();
        if (section === 'cloudreq') renderCloudReqs();
        if (section === 'visitors') renderVisitors();
        if (section === 'blog') renderBlog();
    }

    // ========== RENDER FUNCTIONS (all working) ==========
    function renderUsers() {
        let users = get('ghost_users');
        let html = '<table class="admin-table"><thead><tr><th>Email</th><th>Role</th><th>Actions</th></tr></thead><tbody>';
        users.forEach(u => {
            html += `<tr>
                        <td>${u.email}</td>
                        <td>${u.role}</td>
                        <td><button class="btn" onclick="deleteUser('${u.id}')">Delete</button> <button class="btn" onclick="promoteUser('${u.id}')">Promote</button></td>
                    </tr>`;
        });
        html += '</tbody></table>';
        document.getElementById('usersTable').innerHTML = html;
    }
    window.deleteUser = (id) => { set('ghost_users', get('ghost_users').filter(u => u.id !== id)); renderUsers(); };
    window.promoteUser = (id) => { let users = get('ghost_users'); let idx = users.findIndex(u => u.id === id); if(idx!==-1) users[idx].role = 'full_admin'; set('ghost_users', users); renderUsers(); };
    document.getElementById('addUserBtn')?.addEventListener('click', () => {
        let email = prompt('Email:'); if(!email) return;
        let users = get('ghost_users');
        if(users.find(u=>u.email===email)) return alert('Exists');
        users.push({ id: Date.now().toString(), email, password: 'changeme', role: 'user' });
        set('ghost_users', users);
        renderUsers();
    });

    function renderCodes() { let codes = get('ghost_codes'); let html = '<table class="admin-table"><thead><tr><th>Code</th><th>Created</th></tr></thead><tbody>'; codes.forEach(c => { html += `<tr><td>${c.code}</td><td>${new Date(c.createdAt).toLocaleString()}</td></tr>`; }); html += '</tbody></table>'; document.getElementById('codesTable').innerHTML = html; }
    document.getElementById('genCodesBtn')?.addEventListener('click', () => { let codes = get('ghost_codes'); for(let i=0;i<50;i++) codes.push({ code: 'DEATH-'+Math.random().toString(36).substring(2,10).toUpperCase(), createdAt: new Date().toISOString() }); set('ghost_codes', codes); renderCodes(); });

    function renderPayments() { let payments = get('ghost_payments'); let html = '<table class="admin-table"><thead><tr><th>User</th><th>Amount</th><th>Status</th><th>Action</th></tr></thead><tbody>'; payments.forEach(p => { html += `<tr><td>${p.userId}</td><td>$${p.amount}</td><td>${p.status}</td><td><button class="btn" onclick="approvePayment('${p.id}')">Approve</button></td></tr>`; }); html += '</tbody></table>'; document.getElementById('paymentsTable').innerHTML = html; }
    window.approvePayment = (id) => { let payments = get('ghost_payments'); let idx = payments.findIndex(p=>p.id===id); if(idx!==-1) payments[idx].status = 'approved'; set('ghost_payments', payments); renderPayments(); };
    document.getElementById('addPaymentBtn')?.addEventListener('click', () => { let payments = get('ghost_payments'); payments.push({ id: Date.now().toString(), userId: 'guest', amount: 99, status: 'pending' }); set('ghost_payments', payments); renderPayments(); });

    function renderTools() { let tools = get('ghost_tools'); let html = '<table class="admin-table"><thead><tr><th>Name</th><th>Price</th><th>Discount</th><th>Actions</th></tr></thead><tbody>'; tools.forEach(t => { html += `<tr><td>${t.name}</td><td>$${t.price}</td><td>${t.discount||0}%</td><td><button class="btn" onclick="editTool('${t.id}')">Edit</button> <button class="btn" onclick="deleteTool('${t.id}')">Delete</button></td></tr>`; }); html += '</tbody></table>'; document.getElementById('toolsTable').innerHTML = html; }
    window.editTool = (id) => { let t = get('ghost_tools').find(t=>t.id===id); if(t){ document.getElementById('toolName').value = t.name; document.getElementById('toolPrice').value = t.price; document.getElementById('toolDiscount').value = t.discount||0; document.getElementById('toolDownload').value = t.download||''; document.getElementById('editingToolId').value = id; document.getElementById('toolModal').style.display = 'block'; } };
    window.deleteTool = (id) => { set('ghost_tools', get('ghost_tools').filter(t=>t.id!==id)); renderTools(); };
    document.getElementById('addToolBtn')?.addEventListener('click', () => { document.getElementById('toolModal').style.display = 'block'; document.getElementById('editingToolId').value = ''; document.getElementById('toolName').value = ''; document.getElementById('toolPrice').value = ''; document.getElementById('toolDiscount').value = ''; document.getElementById('toolDownload').value = ''; });
    document.getElementById('saveToolBtn')?.addEventListener('click', () => { let id = document.getElementById('editingToolId').value; let data = { name: document.getElementById('toolName').value, price: parseFloat(document.getElementById('toolPrice').value), discount: parseInt(document.getElementById('toolDiscount').value)||0, download: document.getElementById('toolDownload').value }; if(!data.name) return alert('Name required'); let tools = get('ghost_tools'); if(id){ let idx = tools.findIndex(t=>t.id===id); if(idx!==-1) tools[idx] = {...tools[idx], ...data}; } else { data.id = Date.now().toString(); tools.push(data); } set('ghost_tools', tools); document.getElementById('toolModal').style.display = 'none'; renderTools(); });
    document.getElementById('cancelToolBtn')?.addEventListener('click', () => document.getElementById('toolModal').style.display = 'none');

    // ========== GENERIC CRUD FOR OTHER SECTIONS (Add/Edit/Delete working) ==========
    function attachCRUD(section, storageKey, renderFn, modalId, fieldMapping, idField) {
        // Add button
        document.getElementById(`add${section.charAt(0).toUpperCase()+section.slice(1)}Btn`)?.addEventListener('click', () => {
            // Clear fields
            for(let fieldId of Object.keys(fieldMapping)) document.getElementById(fieldId).value = '';
            document.getElementById(idField).value = '';
            document.getElementById(modalId).style.display = 'block';
        });
        // Save button
        document.getElementById(`save${section.charAt(0).toUpperCase()+section.slice(1)}Btn`)?.addEventListener('click', () => {
            let id = document.getElementById(idField).value;
            let data = {};
            for(let [fieldId, prop] of Object.entries(fieldMapping)){
                let val = document.getElementById(fieldId).value;
                if(prop === 'price' || prop === 'budget' || prop === 'weight') val = parseFloat(val) || 0;
                data[prop] = val;
            }
            if(!data.name && !data.domain && !data.number && !data.client && !data.customer && !data.title) return alert('Please fill required fields');
            let items = get(storageKey);
            if(id){
                let idx = items.findIndex(i=>i.id===id);
                if(idx!==-1) items[idx] = {...items[idx], ...data};
            } else {
                data.id = Date.now().toString();
                items.push(data);
            }
            set(storageKey, items);
            document.getElementById(modalId).style.display = 'none';
            renderFn();
        });
        // Cancel button
        document.getElementById(`cancel${section.charAt(0).toUpperCase()+section.slice(1)}Btn`)?.addEventListener('click', () => document.getElementById(modalId).style.display = 'none');
        // Expose edit and delete globally
        window[`edit_${storageKey}`] = (id) => {
            let item = get(storageKey).find(i=>i.id===id);
            if(item){
                for(let [fieldId, prop] of Object.entries(fieldMapping)){
                    let el = document.getElementById(fieldId);
                    if(el) el.value = item[prop] !== undefined ? item[prop] : '';
                }
                document.getElementById(idField).value = id;
                document.getElementById(modalId).style.display = 'block';
            }
        };
        window[`delete_${storageKey}`] = (id) => { set(storageKey, get(storageKey).filter(i=>i.id!==id)); renderFn(); };
    }

    // Define render functions for each section (they call the table render)
    function renderWebsites() {
        let items = get('ghost_websites');
        let html = '<table class="admin-table"><thead><tr><th>Domain</th><th>Title</th><th>Price</th><th>Actions</th></tr></thead><tbody>';
        items.forEach(i => { html += `<tr><td>${i.domain}</td><td>${i.title}</td><td>$${i.price}</td><td><button class="btn" onclick="edit_ghost_websites('${i.id}')">Edit</button> <button class="btn" onclick="delete_ghost_websites('${i.id}')">Delete</button></td></tr>`; });
        html += '</tbody></table>';
        document.getElementById('websitesTable').innerHTML = html;
    }
    function renderEsim() {
        let items = get('ghost_esim');
        let html = '<table class="admin-table"><thead><tr><th>Name</th><th>Duration</th><th>Price</th><th>Data</th><th>Voice</th><th>Actions</th></tr></thead><tbody>';
        items.forEach(i => { html += `<tr><td>${i.name}</td><td>${i.duration}</td><td>$${i.price}</td><td>${i.data}</td><td>${i.voice}</td><td><button class="btn" onclick="edit_ghost_esim('${i.id}')">Edit</button> <button class="btn" onclick="delete_ghost_esim('${i.id}')">Delete</button></td></tr>`; });
        html += '</tbody></table>';
        document.getElementById('esimTable').innerHTML = html;
    }
    function renderLogistics() {

    // Attach CRUD for each localStorage section
    function attachAllEventListeners() {
        attachCRUD('websites', 'ghost_websites', renderWebsites, 'websiteModal',
            { websiteDomain:'domain', websiteTitle:'title', websitePrice:'price' }, 'editingWebsiteId');
        attachCRUD('esim', 'ghost_esim', renderEsim, 'esimModal',
            { esimName:'name', esimDuration:'duration', esimPrice:'price', esimData:'data', esimVoice:'voice' }, 'editingEsimId');
        attachCRUD('logistics', 'ghost_logistics', renderLogistics, 'logisticsModal',
            { logSender:'sender', logReceiver:'receiver', logAddress:'address', logPackage:'package', logWeight:'weight', logPrice:'price', logStatus:'status' }, 'editingLogisticsId');
        attachCRUD('virtual', 'ghost_virtualnums', renderVirtual, 'virtualModal',
            { virtualNumber:'number', virtualCountry:'country', virtualService:'service', virtualPrice:'price', virtualPartner:'partner' }, 'editingVirtualId');
        attachCRUD('webReq', 'ghost_webrequests', renderWebReqs, 'webReqModal',
            { webClient:'client', webEmail:'email', webType:'type', webReqs:'requirements', webBudget:'budget' }, 'editingWebReqId');
        attachCRUD('credForm', 'ghost_credforms', renderCredForms, 'credFormModal',
            { formName:'name', formFields:'fields' }, 'editingCredFormId');
        attachCRUD('cloudReq', 'ghost_cloudreqs', renderCloudReqs, 'cloudReqModal',
            { cloudCustomer:'customer', cloudEmail:'email', cloudService:'serviceType', cloudDomain:'domain', cloudDetails:'details' }, 'editingCloudReqId');
        attachCRUD('post', 'ghost_blog', renderBlog, 'blogModal',
            { postTitle:'title', postContent:'content' }, 'editingPostId');
    }

    // Theme toggle
    const themeBtn = document.getElementById('themeToggle');
    if (localStorage.getItem('theme') === 'light') document.body.classList.add('light');
    themeBtn.addEventListener('click', () => {
        document.body.classList.toggle('light');
        themeBtn.textContent = document.body.classList.contains('light') ? '☀️' : '🌓';
        localStorage.setItem('theme', document.body.classList.contains('light') ? 'light' : 'dark');
    });

    // Matrix rain
    (function() {
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');
        let w, h, drops = [];
        const chars = "💀☠️🔪🩸🔥⚡";
        function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; drops = Array(Math.floor(w/20)).fill(0); }
        function draw() {
            ctx.fillStyle = 'rgba(0,0,0,0.07)'; ctx.fillRect(0,0,w,h);
            ctx.fillStyle = '#aa2a2a'; ctx.font = 'bold 20px monospace';
            for(let i=0; i<drops.length; i++) { ctx.fillText(chars[Math.floor(Math.random()*chars.length)], i*20, drops[i]*22); if(drops[i]*22 > h && Math.random() > 0.98) drops[i] = 0; drops[i]++; }
            requestAnimationFrame(draw);
        }
        window.addEventListener('resize', resize); resize(); draw();
    })();
</script>
