<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GHOST SHELL // STANDALONE TOOLS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --bg: #0a0c0f;
            --card: #111316;
            --red: #ff1a1a;
            --green: #00ff41;
            --glow-red: 0 0 10px rgba(255,26,26,0.5);
            --glow-green: 0 0 8px rgba(0,255,65,0.5);
            --font-mono: 'Courier New', 'Consolas', monospace;
        }
        body {
            background: var(--bg);
            font-family: var(--font-mono);
            color: #ccc;
            padding: 20px;
        }
        canvas#matrixCanvas {
            position: fixed;
            top:0; left:0;
            width:100%; height:100%;
            z-index:-1;
            opacity:0.3;
            pointer-events:none;
        }
        .header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            background: #000000aa;
            backdrop-filter: blur(8px);
            padding: 12px 20px;
            border-bottom: 1px solid var(--red);
            margin-bottom: 25px;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-img {
            width: 40px;
            border-radius: 50%;
            border: 1px solid var(--red);
        }
        .site-name {
            font-size: 1.4rem;
            font-weight: bold;
            color: var(--red);
            text-shadow: var(--glow-red);
        }
        .nav-links {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        .nav-link, .btn {
            background: transparent;
            border: 1px solid var(--red);
            color: var(--red);
            padding: 6px 14px;
            font-family: var(--font-mono);
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .nav-link:hover, .btn:hover {
            background: var(--red);
            color: black;
            box-shadow: var(--glow-red);
        }
        .tool-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 12px;
            margin: 25px 0;
        }
        .tool-card {
            background: var(--card);
            border: 1px solid #2a2e36;
            padding: 12px 8px;
            text-align: center;
            cursor: pointer;
            transition: 0.1s linear;
            font-size: 0.85rem;
        }
        .tool-card:active { transform: scale(0.97); background: #1f232a; }
        .card {
            background: var(--card);
            border: 1px solid #2a2e36;
            padding: 18px;
            margin-top: 20px;
        }
        input, select, textarea {
            background: #1e2128;
            border: 1px solid #3a3f4a;
            color: #0f0;
            padding: 8px;
            font-family: monospace;
            width: 100%;
            margin: 6px 0;
        }
        button.btn {
            margin: 5px 5px 0 0;
        }
        h3 { color: var(--green); margin-bottom: 12px; }
        .tool-icon { font-size: 1.4rem; display: block; margin-bottom: 6px; }
    </style>
</head>
<body>
<canvas id="matrixCanvas"></canvas>

<div id="mainDashboard">
    <header class="header">
        <div class="logo-area">
            <img src="https://res.cloudinary.com/dkomucpin/image/upload/v1778394573/BDJEUqx_zqkyuc.png" class="logo-img" alt="logo">
            <span class="site-name">GHOST SHELL</span>
        </div>
        <nav class="nav-links" id="mainNav"></nav>
        <button class="btn" id="logoutBtn" style="margin-left:10px;">EXIT</button>
    </header>

    <h2 style="color:var(--red); letter-spacing:2px;">⚔️ CYBER TOOLS ARSENAL</h2>

    <div class="tool-grid" id="toolGrid">
        <!-- tools injected by JS -->
    </div>

    <div id="toolOutput" class="card">
        <p style="color:#888;">🔻 Click any tool above to launch 🔻</p>
    </div>
</div>

<script>
    // ------------- mock navigation (standalone, no backend) -------------
    const pages = [
        { name: 'dashboard', label: '⌖ Ops Center', href: 'dashboard.html' },
        { name: 'tools', label: '⚔️ Cyber Tools', href: '#' },
        { name: 'chat', label: '💬 Secure Comms', href: 'chat.html' },
        { name: 'ai', label: '🧠 AI Assistant', href: 'ai.html' },
        { name: 'marketplace', label: '🛒 Marketplace', href: 'marketplace.html' },
        { name: 'admin', label: '⚙️ Admin', href: 'admin.html' }
    ];
    const nav = document.getElementById('mainNav');
    pages.forEach(p => {
        const btn = document.createElement('button');
        btn.className = 'nav-link' + (p.name === 'tools' ? ' active' : '');
        btn.textContent = p.label;
        if (p.href === '#') btn.style.opacity = '0.6';
        else btn.addEventListener('click', () => window.location.href = p.href);
        nav.appendChild(btn);
    });
    document.getElementById('logoutBtn').addEventListener('click', () => {
        localStorage.clear();
        window.location.href = 'index.html';
    });

    // -------------------- TOOLS LIST (all client-side) --------------------
    const toolsList = [
        { id: 'phishing', icon: '🎣', name: 'Phishing Detector' },
        { id: 'ip', icon: '🌍', name: 'IP Lookup' },
        { id: 'phone', icon: '📱', name: 'Phone Tracker' },
        { id: 'password', icon: '🔑', name: 'Password Strength' },
        { id: 'encrypt', icon: '🔐', name: 'AES Encryption' },
        { id: 'hash', icon: '#️⃣', name: 'Hash Generator' },
        { id: 'port', icon: '🔍', name: 'Port Scanner' },
        { id: 'ssl', icon: '🔒', name: 'SSL Checker' },
        { id: 'headers', icon: '🛡', name: 'Security Headers' },
        { id: 'qrcode', icon: '📱', name: 'QR Generator' },
        { id: 'dns', icon: '📋', name: 'DNS Lookup' },
        { id: 'whois', icon: '🔎', name: 'WHOIS Lookup' },
        { id: 'fileintegrity', icon: '📄', name: 'File Integrity' },
        { id: 'speedtest', icon: '⏱', name: 'Speed Test' },
        { id: 'steganography', icon: '👁', name: 'Steganography' },
        { id: 'ping', icon: '📶', name: 'Ping' },
        { id: 'traceroute', icon: '🗺', name: 'Traceroute' },
        { id: 'vulnerability', icon: '💣', name: 'Vuln Score' },
        { id: 'exploit', icon: '💥', name: 'Exploit Search' },
        { id: 'emailheader', icon: '📧', name: 'Email Header' },
        { id: 'cvelookup', icon: '🔖', name: 'CVE Lookup' },
        { id: 'macvendor', icon: '🖧', name: 'MAC Vendor' },
        { id: 'useragent', icon: '🕵️', name: 'User-Agent' },
        { id: 'urlencode', icon: '🔗', name: 'URL En/Decode' },
        { id: 'base64', icon: '📝', name: 'Base64' },
        { id: 'binarytext', icon: '0️⃣1️⃣', name: 'Binary ↔ Text' },
        { id: 'rot13', icon: '🔃', name: 'ROT13' },
        { id: 'caesar', icon: '🧩', name: 'Caesar Cipher' },
        { id: 'vigenere', icon: '🔠', name: 'Vigenère' },
        { id: 'reverse', icon: '↩️', name: 'Reverse' },
        { id: 'morse', icon: '📡', name: 'Morse Code' },
        { id: 'timestamp', icon: '🕒', name: 'Timestamp' },
        { id: 'httpstatus', icon: '🌐', name: 'HTTP Status' }
    ];

    const toolGrid = document.getElementById('toolGrid');
    toolsList.forEach(t => {
        const card = document.createElement('div');
        card.className = 'tool-card';
        card.setAttribute('data-tool', t.id);
        card.innerHTML = `<span class="tool-icon">${t.icon}</span>${t.name}`;
        card.addEventListener('click', () => showTool(t.id));
        toolGrid.appendChild(card);
    });

    // ---------- Helper: update output area ----------
    function setOutput(html) {
        document.getElementById('toolOutput').innerHTML = `<div style="max-height:500px; overflow:auto;">${html}</div>`;
    }

    // ---------- Tool implementations (fully client-side) ----------
    function showTool(toolId) {
        const out = document.getElementById('toolOutput');
        const backBtn = `<button class="btn" style="margin-bottom:15px;" onclick="document.getElementById('toolGrid').scrollIntoView({behavior:'smooth'}); setOutput('<p style=\\'color:#888;\\'>🔻 Click any tool above 🔻</p>');">← Back to Tools</button>`;
        
        switch(toolId) {
            case 'phishing':
                setOutput(`${backBtn}<h3>🎣 Phishing URL Detector</h3><input type="text" id="phishUrl" placeholder="https://example.com"><button class="btn" id="checkPhishBtn">Analyze</button><div id="phishResult"></div>`);
                document.getElementById('checkPhishBtn').onclick = () => {
                    const url = document.getElementById('phishUrl').value;
                    const suspicious = url.includes('secure-login') || url.includes('verify-account') || url.match(/bit\.ly|tinyurl/i);
                    document.getElementById('phishResult').innerHTML = suspicious ? '<span style="color:red;">⚠️ LIKELY PHISHING</span>' : '<span style="color:var(--green);">✅ Looks clean (no obvious red flags)</span>';
                };
                break;
            case 'ip':
                setOutput(`${backBtn}<h3>🌍 IP Lookup (mock data)</h3><input type="text" id="ipInput" placeholder="8.8.8.8"><button class="btn" id="lookupIpBtn">Lookup</button><div id="ipResult"></div>`);
                document.getElementById('lookupIpBtn').onclick = () => {
                    const ip = document.getElementById('ipInput').value;
                    document.getElementById('ipResult').innerHTML = `<pre>IP: ${ip}\nCountry: US\nCity: Mountain View\nISP: Google LLC\nRisk: Low</pre>`;
                };
                break;
            case 'phone':
                setOutput(`${backBtn}<h3>📱 Phone Tracker (demo)</h3><input type="text" id="phoneNumber" placeholder="+1234567890"><button class="btn" id="lookupPhoneBtn">Track</button><div id="phoneResult"></div>`);
                document.getElementById('lookupPhoneBtn').onclick = () => {
                    const num = document.getElementById('phoneNumber').value;
                    document.getElementById('phoneResult').innerHTML = `<pre>Number: ${num}\nCarrier: Demo Network\nLocation: (simulated) Los Angeles, CA</pre>`;
                };
                break;
            case 'password':
                setOutput(`${backBtn}<h3>🔑 Password Strength</h3><input type="text" id="pwdInput" placeholder="Enter password"><button class="btn" id="analyzePwdBtn">Analyze</button><div id="pwdResult"></div>`);
                document.getElementById('analyzePwdBtn').onclick = () => {
                    const pwd = document.getElementById('pwdInput').value;
                    let score = 0;
                    if (pwd.length >= 8) score++;
                    if (/[A-Z]/.test(pwd)) score++;
                    if (/[0-9]/.test(pwd)) score++;
                    if (/[^a-zA-Z0-9]/.test(pwd)) score++;
                    const strength = ['Weak','Fair','Good','Strong'][score] || 'Very Weak';
                    document.getElementById('pwdResult').innerHTML = `Strength: ${strength}<br>Length: ${pwd.length}`;
                };
                break;
            case 'encrypt':
                setOutput(`${backBtn}<h3>🔐 AES-GCM (client side)</h3><input type="text" id="encryptText" placeholder="Secret"><input type="password" id="encryptPass" placeholder="Password"><button class="btn" id="encryptBtn">Encrypt</button><button class="btn" id="decryptBtn">Decrypt</button><div id="encryptResult"></div>`);
                (async () => {
                    let storedCipher = '';
                    document.getElementById('encryptBtn').onclick = async () => {
                        const text = document.getElementById('encryptText').value;
                        const pass = document.getElementById('encryptPass').value;
                        const enc = new TextEncoder();
                        const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(pass), {name:'PBKDF2'}, false, ['deriveKey']);
                        const key = await crypto.subtle.deriveKey({name:'PBKDF2', salt:enc.encode('salt'), iterations:100000, hash:'SHA-256'}, keyMaterial, {name:'AES-GCM', length:256}, false, ['encrypt','decrypt']);
                        const iv = crypto.getRandomValues(new Uint8Array(12));
                        const encrypted = await crypto.subtle.encrypt({name:'AES-GCM', iv}, key, enc.encode(text));
                        const combined = new Uint8Array(iv.length + encrypted.byteLength);
                        combined.set(iv,0); combined.set(new Uint8Array(encrypted), iv.length);
                        storedCipher = btoa(String.fromCharCode(...combined));
                        document.getElementById('encryptResult').innerHTML = `<strong>Encrypted:</strong> ${storedCipher}`;
                    };
                    document.getElementById('decryptBtn').onclick = async () => {
                        if(!storedCipher) return;
                        const pass = document.getElementById('encryptPass').value;
                        try {
                            const enc = new TextEncoder();
                            const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(pass), {name:'PBKDF2'}, false, ['deriveKey']);
                            const key = await crypto.subtle.deriveKey({name:'PBKDF2', salt:enc.encode('salt'), iterations:100000, hash:'SHA-256'}, keyMaterial, {name:'AES-GCM', length:256}, false, ['encrypt','decrypt']);
                            const combined = new Uint8Array(atob(storedCipher).split('').map(c=>c.charCodeAt(0)));
                            const iv = combined.slice(0,12);
                            const data = combined.slice(12);
                            const decrypted = await crypto.subtle.decrypt({name:'AES-GCM', iv}, key, data);
                            document.getElementById('encryptResult').innerHTML = `<strong>Decrypted:</strong> ${new TextDecoder().decode(decrypted)}`;
                        } catch(e) { document.getElementById('encryptResult').innerHTML = 'Decryption failed (wrong password)'; }
                    };
                })();
                break;
            case 'hash':
                setOutput(`${backBtn}<h3>#️⃣ Hash Generator</h3><input type="text" id="hashText"><select id="hashAlgo"><option>SHA-256</option><option>SHA-512</option><option>SHA-1</option><option>MD5</option></select><button class="btn" id="hashBtn">Generate</button><div id="hashResult"></div>`);
                document.getElementById('hashBtn').onclick = async () => {
                    const text = document.getElementById('hashText').value;
                    const algo = document.getElementById('hashAlgo').value;
                    const enc = new TextEncoder();
                    let hash;
                    if(algo === 'MD5') {
                        // simple mock MD5 (not real but for demo)
                        hash = "mock_md5_" + btoa(text).slice(0,32);
                    } else {
                        const buf = await crypto.subtle.digest(algo, enc.encode(text));
                        hash = Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
                    }
                    document.getElementById('hashResult').innerHTML = `<strong>${algo}:</strong> ${hash}`;
                };
                break;
            case 'port':
                setOutput(`${backBtn}<h3>🔍 Port Scanner (educational)</h3><input type="text" id="portIp" placeholder="192.168.1.1"><input type="text" id="portRange" placeholder="80,443,22"><button class="btn" id="scanPortsBtn">Simulate Scan</button><div id="portResult"></div>`);
                document.getElementById('scanPortsBtn').onclick = () => {
                    const ports = document.getElementById('portRange').value.split(',').map(p=>parseInt(p));
                    let html = '';
                    ports.forEach(p => html += `Port ${p}: ${Math.random()>0.6 ? '<span style="color:var(--green);">OPEN</span>' : '<span style="color:#888;">CLOSED</span>'}<br>`);
                    document.getElementById('portResult').innerHTML = html;
                };
                break;
            case 'ssl':
                setOutput(`${backBtn}<h3>🔒 SSL Checker (demo)</h3><input type="text" id="sslDomain" placeholder="google.com"><button class="btn" id="checkSslBtn">Check</button><div id="sslResult"></div>`);
                document.getElementById('checkSslBtn').onclick = () => {
                    document.getElementById('sslResult').innerHTML = `✅ Certificate valid until Dec 2025<br>Issuer: Let's Encrypt (mock)`;
                };
                break;
            case 'headers':
                setOutput(`${backBtn}<h3>🛡 Security Headers</h3><input type="text" id="headersDomain"><button class="btn" id="checkHeadersBtn">Scan</button><div id="headersResult"></div>`);
                document.getElementById('checkHeadersBtn').onclick = () => {
                    document.getElementById('headersResult').innerHTML = `✅ X-Frame-Options: DENY<br>✅ CSP: default-src 'self'<br>❌ HSTS not set`;
                };
                break;
            case 'qrcode':
                setOutput(`${backBtn}<h3>📱 QR Generator</h3><input type="text" id="qrText" placeholder="Text/URL"><button class="btn" id="genQrBtn">Generate</button><div id="qrResult"></div>`);
                document.getElementById('genQrBtn').onclick = () => {
                    const text = document.getElementById('qrText').value;
                    const img = new Image();
                    img.src = `https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(text)}`;
                    img.style.border = '1px solid var(--red)';
                    document.getElementById('qrResult').innerHTML = ''; document.getElementById('qrResult').appendChild(img);
                };
                break;
            case 'dns':
                setOutput(`${backBtn}<h3>📋 DNS Lookup</h3><input type="text" id="dnsDomain"><select id="dnsType"><option>A</option><option>AAAA</option><option>MX</option></select><button class="btn" id="dnsLookupBtn">Lookup</button><div id="dnsResult"></div>`);
                document.getElementById('dnsLookupBtn').onclick = () => {
                    const domain = document.getElementById('dnsDomain').value;
                    document.getElementById('dnsResult').innerHTML = `<pre>${domain} A → 93.184.216.34 (mock)</pre>`;
                };
                break;
            case 'whois':
                setOutput(`${backBtn}<h3>🔎 WHOIS Lookup</h3><input type="text" id="whoisDomain"><button class="btn" id="whoisLookupBtn">Lookup</button><div id="whoisResult"></div>`);
                document.getElementById('whoisLookupBtn').onclick = () => {
                    document.getElementById('whoisResult').innerHTML = `<pre>Domain: ${document.getElementById('whoisDomain').value}\nRegistrar: Namecheap\nCreation: 2020-01-01</pre>`;
                };
                break;
            case 'fileintegrity':
                setOutput(`${backBtn}<h3>📄 File Integrity (SHA-256)</h3><input type="file" id="integrityFile"><button class="btn" id="checkIntegrityBtn">Calculate</button><div id="integrityResult"></div>`);
                document.getElementById('checkIntegrityBtn').onclick = async () => {
                    const file = document.getElementById('integrityFile').files[0];
                    if(!file) return;
                    const buf = await file.arrayBuffer();
                    const hash = await crypto.subtle.digest('SHA-256', buf);
                    const hex = Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,'0')).join('');
                    document.getElementById('integrityResult').innerHTML = `SHA-256: ${hex}`;
                };
                break;
            case 'speedtest':
                setOutput(`${backBtn}<h3>⏱ Speed Test (estimated)</h3><button class="btn" id="startSpeedTest">Start</button><div id="speedResult"></div>`);
                document.getElementById('startSpeedTest').onclick = () => {
                    const start = Date.now();
                    fetch('https://api.qrserver.com/v1/create-qr-code/?size=1x1&data=ping').then(() => {
                        const ms = Date.now() - start;
                        document.getElementById('speedResult').innerHTML = `Latency: ${ms} ms<br>Download: ~${(500/ms).toFixed(1)} Mbps (rough)`;
                    }).catch(() => document.getElementById('speedResult').innerHTML = 'Network test failed');
                };
                break;
            case 'steganography':
                setOutput(`${backBtn}<h3>👁 Text Steganography</h3><textarea id="stegoInput" rows="2" placeholder="Cover text"></textarea><input type="text" id="stegoHidden" placeholder="Hidden message"><button class="btn" id="encodeStego">Encode</button><button class="btn" id="decodeStego">Decode</button><div id="stegoResult"></div>`);
                document.getElementById('encodeStego').onclick = () => {
                    const cover = document.getElementById('stegoInput').value;
                    const hidden = document.getElementById('stegoHidden').value;
                    const encoded = cover.split('').join('\u200B') + '\u200C' + hidden.split('').join('\u200B');
                    document.getElementById('stegoResult').innerHTML = `<strong>Encoded:</strong><br><textarea rows="2">${encoded}</textarea>`;
                };
                document.getElementById('decodeStego').onclick = () => {
                    const txt = document.getElementById('stegoInput').value;
                    const parts = txt.split('\u200C');
                    if(parts.length>1) {
                        const msg = parts[1].replace(/\u200B/g,'');
                        document.getElementById('stegoResult').innerHTML = `Hidden: ${msg}`;
                    } else document.getElementById('stegoResult').innerHTML = 'No hidden data';
                };
                break;
            case 'ping':
                setOutput(`${backBtn}<h3>📶 Ping (simulated)</h3><input type="text" id="pingHost" value="google.com"><button class="btn" id="pingBtn">Ping</button><div id="pingResult"></div>`);
                document.getElementById('pingBtn').onclick = () => {
                    const host = document.getElementById('pingHost').value;
                    document.getElementById('pingResult').innerHTML = `PING ${host}: 56 bytes, time=24ms TTL=54<br>Reply from ${host}: time=23ms`;
                };
                break;
            case 'traceroute':
                setOutput(`${backBtn}<h3>🗺 Traceroute (demo)</h3><input type="text" id="traceHost"><button class="btn" id="traceBtn">Trace</button><div id="traceResult"></div>`);
                document.getElementById('traceBtn').onclick = () => {
                    let out = '';
                    for(let i=1;i<=6;i++) out += `${i}  * * *<br>`;
                    document.getElementById('traceResult').innerHTML = out;
                };
                break;
            case 'vulnerability':
                setOutput(`${backBtn}<h3>💣 Vuln Score</h3><input placeholder="Product" id="vulnProduct"><input placeholder="Version" id="vulnVersion"><button class="btn" id="vulnCheckBtn">Check</button><div id="vulnResult"></div>`);
                document.getElementById('vulnCheckBtn').onclick = () => {
                    document.getElementById('vulnResult').innerHTML = `CVSS: 7.5 (HIGH) – Remote code execution possible`;
                };
                break;
            case 'exploit':
                setOutput(`${backBtn}<h3>💥 Exploit Search</h3><input id="exploitQuery" placeholder="Apache Struts"><button class="btn" id="exploitSearchBtn">Search</button><div id="exploitResult"></div>`);
                document.getElementById('exploitSearchBtn').onclick = () => {
                    document.getElementById('exploitResult').innerHTML = `<div>CVE-2023-1234 – RCE exploit available</div><div>CVE-2022-5678 – DoS</div>`;
                };
                break;
            default:
                setOutput(`${backBtn}<p>Tool not implemented yet, but the click works!</p>`);
        }
    }

    // Simple Matrix effect
    (function() {
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');
        let w, h, drops = [];
        const chars = "01アイウエオカキクケコ";
        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            drops = Array(Math.floor(w/15)).fill(0);
        }
        function draw() {
            ctx.fillStyle = 'rgba(0,0,0,0.05)';
            ctx.fillRect(0,0,w,h);
            ctx.fillStyle = '#0f0';
            ctx.font = '12px monospace';
            for(let i=0;i<drops.length;i++) {
                const text = chars[Math.floor(Math.random()*chars.length)];
                ctx.fillText(text, i*15, drops[i]*15);
                if(drops[i]*15 > h && Math.random()>0.98) drops[i]=0;
                drops[i]++;
            }
            requestAnimationFrame(draw);
        }
        window.addEventListener('resize', resize);
        resize();
        draw();
    })();
</script>
</body>
</html>
