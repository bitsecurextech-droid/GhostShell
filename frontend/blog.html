<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GHOST SHELL // BLOG – Tactical Cyber Insights</title>
    <meta name="description" content="GHOST SHELL Blog – tactical cybersecurity insights, changelog, tutorials, and news from the frontlines.">
    <meta name="keywords" content="cyber blog, hacking blog, cybersecurity news, GHOST SHELL, tutorials, changelog">
    <meta name="author" content="GHOST SHELL">
    <meta name="robots" content="index, follow">

    <!-- Open Graph / Social Preview -->
    <meta property="og:title" content="GHOST SHELL | Blog">
    <meta property="og:description" content="Tactical cybersecurity insights, changelog, and tutorials from GHOST SHELL.">
    <meta property="og:image" content="https://res.cloudinary.com/dkomucpin/image/upload/v1778394573/BDJEUqx_zqkyuc.png">
    <meta property="og:url" content="https://ghostshell-whe8.onrender.com/blog.html">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="GHOST SHELL | Blog">
    <meta name="twitter:description" content="Tactical cybersecurity insights, changelog, and tutorials.">
    <meta name="twitter:image" content="https://res.cloudinary.com/dkomucpin/image/upload/v1778394573/BDJEUqx_zqkyuc.png">

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#ff1a1a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="GHOST SHELL">
    <link rel="apple-touch-icon" href="https://res.cloudinary.com/dkomucpin/image/upload/v1778394573/BDJEUqx_zqkyuc.png">

    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="https://res.cloudinary.com/dkomucpin/image/upload/v1778394573/BDJEUqx_zqkyuc.png">
    <style>
        /* extra scary blog styles */
        .blog-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(320px, 1fr)); gap:20px; margin-top:20px; }
        .blog-card {
            background: rgba(5,5,5,0.85);
            border: 1px solid rgba(255,0,0,0.25);
            border-radius: 12px;
            padding: 20px;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }
        .blog-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,0,0,0.05) 0%, transparent 70%);
            animation: rotateHolo 12s linear infinite;
        }
        @keyframes rotateHolo { to { transform: rotate(360deg); } }
        .blog-card:hover {
            border-color: var(--red);
            box-shadow: var(--red-glow);
            transform: translateY(-5px);
        }
        .blog-card h3 {
            font-family: var(--font-mono);
            color: var(--red);
            font-size: 1.2rem;
            margin-bottom: 8px;
            letter-spacing: 1px;
            text-shadow: 0 0 8px rgba(255,0,0,0.5);
            animation: glitchText 3s infinite;
        }
        .blog-meta {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            color: #666;
            margin-bottom: 12px;
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .blog-category {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .cat-changelog { background: rgba(0,180,255,0.15); color: #00b4ff; border:1px solid #00b4ff; }
        .cat-tutorial { background: rgba(0,255,65,0.15); color: var(--green); border:1px solid var(--green); }
        .cat-news { background: rgba(255,0,0,0.15); color: var(--red); border:1px solid var(--red); }
        .cat-general { background: rgba(255,170,0,0.15); color: #ffaa00; border:1px solid #ffaa00; }
        .blog-excerpt {
            font-family: 'Segoe UI', sans-serif;
            font-size: 0.85rem;
            color: #aaa;
            line-height: 1.5;
        }
        .blog-card .read-more {
            display: inline-block;
            margin-top: 12px;
            color: var(--red);
            text-decoration: underline;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            cursor: pointer;
        }
        /* single post view */
        .single-post { max-width: 800px; margin: 0 auto; }
        .single-post .back-btn { margin-bottom: 20px; }
        /* skeleton */
        .skeleton .skel-bar { background:#1a1a1a; border-radius:3px; animation:pulse 1.5s infinite; }
        @keyframes pulse { 0%,100%{opacity:0.4;} 50%{opacity:0.8;} }
    </style>
</head>
<body>
    <canvas id="matrixCanvas"></canvas>
    <div id="mainDashboard" style="position:relative; z-index:2;">
        <header class="header">
            <div class="logo-area">
                <img src="https://res.cloudinary.com/dkomucpin/image/upload/v1778394573/BDJEUqx_zqkyuc.png" class="logo-img" alt="GHOST SHELL logo">
                <span class="site-name">GHOST SHELL</span>
            </div>
            <nav class="nav-links" id="mainNav" aria-label="Main navigation"></nav>
            <button class="btn" id="themeToggle" style="border-color:#ffaa00; color:#ffaa00; margin-left:10px;">🌓</button>
            <button class="btn" id="logoutBtn" style="margin-left:auto; border-color:#ffab00; color:#ffab00;" aria-label="Logout">EXIT</button>
        </header>

        <main class="page active">
            <h1 style="color:var(--red); font-family:var(--font-mono); letter-spacing:3px; text-shadow:0 0 15px rgba(255,0,0,0.6);">💀 GHOST BLOG</h1>
            <p style="color:#666; font-family:var(--font-mono); font-size:0.8rem; margin-bottom:10px;">Tactical insights from the shadows.</p>
            <!-- blog list view -->
            <div id="blogList" class="blog-grid"></div>
            <!-- single post view (hidden by default) -->
            <div id="singlePost" class="single-post" style="display:none;"></div>
        </main>
    </div>

    <script src="js/matrix.js"></script>
    <script>
        const API = '/api';
        let currentUser = null;

        (async () => {
            const token = localStorage.getItem('ghost_token');
            if (!token) { window.location.href = 'index.html'; return; }
            const res = await fetch(`${API}/verify`, { headers: { 'Authorization': `Bearer ${token}` } });
            if (!res.ok) { localStorage.removeItem('ghost_token'); window.location.href = 'index.html'; return; }
            currentUser = (await res.json()).user;

            // Logout
            document.getElementById('logoutBtn').addEventListener('click', () => {
                localStorage.removeItem('ghost_token');
                window.location.href = 'index.html';
            });

            // Theme toggle
            const themeBtn = document.getElementById('themeToggle');
            if (localStorage.getItem('theme') === 'light') {
                document.body.classList.add('light');
                themeBtn.textContent = '☀️';
            }
            themeBtn.addEventListener('click', () => {
                document.body.classList.toggle('light');
                const isLight = document.body.classList.contains('light');
                themeBtn.textContent = isLight ? '☀️' : '🌓';
                localStorage.setItem('theme', isLight ? 'light' : 'dark');
            });

            // Build navigation
            const nav = document.getElementById('mainNav');
            const pages = [
                { name: 'dashboard', label: '⌖ Ops Center', href: 'dashboard.html' },
                { name: 'tools', label: '⚔️ Cyber Tools', href: 'tools.html' },
                { name: 'chat', label: '💬 Secure Comms', href: 'chat.html' },
                { name: 'ai', label: '🧠 AI Assistant', href: 'ai.html' },
                { name: 'marketplace', label: '🛒 Marketplace', href: 'marketplace.html' },
                { name: 'blog', label: '💀 Blog', href: 'blog.html' }
            ];
            if (currentUser.role === 'admin') pages.push({ name: 'admin', label: '⚙️ Admin', href: 'admin.html' });
            nav.innerHTML = '';
            pages.forEach(p => {
                const btn = document.createElement('button');
                btn.className = 'nav-link' + (p.name === 'blog' ? ' active' : '');
                btn.textContent = p.label;
                btn.addEventListener('click', () => window.location.href = p.href);
                nav.appendChild(btn);
            });

            loadPosts();
        })();

        async function loadPosts() {
            const container = document.getElementById('blogList');
            // Skeleton loaders
            container.innerHTML = '';
            for (let i = 0; i < 4; i++) {
                const skel = document.createElement('div');
                skel.className = 'blog-card skeleton';
                skel.innerHTML = `
                    <div class="skel-bar" style="width:70%; height:1.2rem; margin-bottom:10px;"></div>
                    <div class="skel-bar" style="width:40%; height:0.7rem; margin-bottom:15px;"></div>
                    <div class="skel-bar" style="width:100%; height:0.8rem; margin-bottom:6px;"></div>
                    <div class="skel-bar" style="width:90%; height:0.8rem; margin-bottom:6px;"></div>
                    <div class="skel-bar" style="width:60%; height:0.8rem;"></div>
                `;
                container.appendChild(skel);
            }

            const res = await fetch(`${API}/blog`);
            const posts = await res.json();
            container.innerHTML = posts.length ? '' : '<p style="color:#666; grid-column:1/-1; text-align:center;">No posts yet. Shadows are silent.</p>';

            posts.forEach(post => {
                const card = document.createElement('div');
                card.className = 'blog-card';
                card.onclick = () => showSinglePost(post);
                const excerpt = stripHtml(post.content).substring(0, 150) + '...';
                card.innerHTML = `
                    <h3>${post.title}</h3>
                    <div class="blog-meta">
                        <span>By ${post.author || 'Anonymous'}</span>
                        <span>${new Date(post.createdAt).toLocaleDateString()}</span>
                        <span class="blog-category cat-${post.category || 'general'}">${post.category || 'general'}</span>
                    </div>
                    <div class="blog-excerpt">${excerpt}</div>
                    <span class="read-more">READ MORE ⟫</span>
                `;
                container.appendChild(card);
            });
        }

        function stripHtml(html) {
            const tmp = document.createElement('div');
            tmp.innerHTML = html;
            return tmp.textContent || tmp.innerText || '';
        }

        function showSinglePost(post) {
            document.getElementById('blogList').style.display = 'none';
            const single = document.getElementById('singlePost');
            single.style.display = 'block';
            single.innerHTML = `
                <button class="btn back-btn" onclick="backToList()">← BACK</button>
                <div class="card">
                    <h2 style="color:var(--red); font-family:var(--font-mono);">${post.title}</h2>
                    <div class="blog-meta">
                        <span>By ${post.author || 'Anonymous'}</span>
                        <span>${new Date(post.createdAt).toLocaleString()}</span>
                        <span class="blog-category cat-${post.category || 'general'}">${post.category || 'general'}</span>
                    </div>
                    <div style="margin-top:15px; font-size:0.9rem; line-height:1.7; color:#ccc;">${post.content}</div>
                </div>
            `;
            window.scrollTo(0,0);
        }

        function backToList() {
            document.getElementById('blogList').style.display = 'grid';
            document.getElementById('singlePost').style.display = 'none';
        }
    </script>

    <!-- Service Worker for PWA -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }
    </script>
</body>
</html>
