<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GHOST SHELL // BLOG – Tactical Cyber Insights</title>
    <meta name="description" content="GHOST SHELL Blog – tactical cybersecurity insights, changelog, tutorials, and news from the frontlines.">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="https://res.cloudinary.com/dkomucpin/image/upload/v1778394573/BDJEUqx_zqkyuc.png">
    <style>
        .blog-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(320px, 1fr)); gap:20px; margin-top:20px; }
        .blog-card {
            background: rgba(5,5,5,0.85);
            border: 1px solid rgba(255,0,0,0.25);
            border-radius: 12px;
            padding: 20px;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            cursor: pointer;
        }
        .blog-card:hover { border-color: var(--red); box-shadow: var(--red-glow); transform: translateY(-5px); }
        .blog-card h3 { font-family: var(--font-mono); color: var(--red); font-size: 1.2rem; margin-bottom: 8px; text-transform: uppercase; }
        .blog-meta { font-family: var(--font-mono); font-size: 0.7rem; color: #aaa; margin-bottom: 12px; display: flex; gap: 15px; flex-wrap: wrap; }
        .blog-category { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 0.65rem; text-transform: uppercase; font-weight: bold; }
        .cat-changelog { background: rgba(0,180,255,0.15); color: #00b4ff; border:1px solid #00b4ff; }
        .cat-tutorial { background: rgba(0,255,65,0.15); color: var(--green); border:1px solid var(--green); }
        .cat-news { background: rgba(255,0,0,0.15); color: var(--red); border:1px solid var(--red); }
        .cat-general { background: rgba(255,170,0,0.15); color: #ffaa00; border:1px solid #ffaa00; }
        .blog-excerpt { font-family: 'Segoe UI', sans-serif; font-size: 0.9rem; color: #ddd; line-height: 1.6; }
        .blog-card .read-more { display: inline-block; margin-top: 12px; color: var(--red); text-decoration: underline; font-family: var(--font-mono); font-size: 0.8rem; cursor: pointer; font-weight: bold; }
        .single-post { max-width: 800px; margin: 0 auto; }
        .single-post .back-btn { margin-bottom: 20px; }
        .skeleton .skel-bar { background:#1a1a1a; border-radius:3px; animation:pulse 1.5s infinite; }
        @keyframes pulse { 0%,100%{opacity:0.4;} 50%{opacity:0.8;} }
    </style>
</head>
<body>
<canvas id="matrixCanvas"></canvas>

<div id="mainDashboard" style="position:relative; z-index:2;">
    <header class="header">
        <div class="logo-area"><img src="https://res.cloudinary.com/dkomucpin/image/upload/v1778394573/BDJEUqx_zqkyuc.png" class="logo-img"><span class="site-name">GHOST SHELL</span></div>
        <nav class="nav-links" id="mainNav"></nav>
        <button class="btn" id="themeToggle">🌓</button>
        <button class="btn" id="logoutBtn">EXIT</button>
    </header>

    <main class="page active">
        <div style="display:flex; align-items:center; gap:15px; margin-bottom:15px;">
            <img src="https://res.cloudinary.com/dkomucpin/image/upload/v1778394573/BDJEUqx_zqkyuc.png" alt="GHOST SHELL" style="height:65px; filter:drop-shadow(0 0 12px #ff0000aa);">
            <h1 style="color:var(--red); font-family:var(--font-mono); letter-spacing:4px; text-shadow:0 0 15px rgba(255,0,0,0.6); font-size:2rem; font-weight:900;">GHOST BLOG</h1>
        </div>
        <p style="color:#ccc; font-family:var(--font-mono); font-size:0.85rem; margin-bottom:25px; font-weight:bold; letter-spacing:1px;">⚡ TACTICAL INSIGHTS FROM THE SHADOWS — STAY SHARP, STAY DANGEROUS.</p>
        <div id="blogList" class="blog-grid"></div>
        <div id="singlePost" class="single-post" style="display:none;"></div>
    </main>

    <footer class="footer">
        <a href="disclaimer.html">⚠️ DISCLAIMER</a> |
        <a href="privacy.html">🔒 PRIVACY POLICY</a> |
        <a href="agreement.html">📜 EDUCATIONAL AGREEMENT</a> |
        <a href="faq.html">❓ FAQ</a> |
        <span style="color:#666;">© GHOST SHELL – Tactical Cyber Operations</span>
    </footer>
</div>

<script src="js/matrix.js"></script>
<script src="js/common.js"></script>
<script>
    (async () => {
        const ok = await initCommon();
        if (!ok) return;

        const API = '/api';

        async function loadPosts() {
            const container = document.getElementById('blogList');
            container.innerHTML = '<div class="skeleton" style="height:200px;"></div>';
            try {
                const res = await fetch(`${API}/blog`);
                const posts = await res.json();
                if (!posts.length) { container.innerHTML = '<p>No posts yet. Shadows are silent.</p>'; return; }
                let html = '';
                posts.forEach(post => {
                    const excerpt = stripHtml(post.content).substring(0, 180) + '...';
                    html += `
                        <div class="blog-card" onclick="showSinglePost(${JSON.stringify(post).replace(/</g, '\\u003c')})">
                            <h3>⚡ ${escapeHtml(post.title)}</h3>
                            <div class="blog-meta">
                                <span>👤 ${escapeHtml(post.author || 'Anonymous')}</span>
                                <span>📅 ${new Date(post.createdAt).toLocaleDateString()}</span>
                                <span class="blog-category cat-${post.category || 'general'}">${post.category || 'general'}</span>
                            </div>
                            <div class="blog-excerpt">${excerpt}</div>
                            <span class="read-more">⟫ READ FULL REPORT ⟪</span>
                        </div>
                    `;
                });
                container.innerHTML = html;
            } catch(e) { container.innerHTML = '<p>Failed to load posts.</p>'; }
        }

        window.showSinglePost = (post) => {
            document.getElementById('blogList').style.display = 'none';
            const single = document.getElementById('singlePost');
            single.style.display = 'block';
            single.innerHTML = `
                <button class="btn back-btn" onclick="backToList()">← BACK TO BLOG</button>
                <div class="card" style="border-color:var(--red); box-shadow:var(--red-glow);">
                    <h2 style="color:var(--red); font-family:var(--font-mono);">⚡ ${escapeHtml(post.title)}</h2>
                    <div class="blog-meta" style="margin-top:10px;">
                        <span>👤 ${escapeHtml(post.author || 'Anonymous')}</span>
                        <span>📅 ${new Date(post.createdAt).toLocaleString()}</span>
                        <span class="blog-category cat-${post.category || 'general'}">${post.category || 'general'}</span>
                    </div>
                    <div style="margin-top:20px; line-height:1.8;">${post.content}</div>
                </div>
            `;
            window.scrollTo(0,0);
        };

        window.backToList = () => {
            document.getElementById('blogList').style.display = 'grid';
            document.getElementById('singlePost').style.display = 'none';
        };

        function stripHtml(html) {
            const tmp = document.createElement('div');
            tmp.innerHTML = html;
            return tmp.textContent || tmp.innerText || '';
        }
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;');
        }

        await loadPosts();
    })();
</script>
    <script src="js/matrix.js"></script>
<script src="js/common.js"></script>
<script src="js/blog.js"></script>
</body>
</html>
